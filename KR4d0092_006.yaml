body:
  text: 濟南集卷六宋李豸撰論兵法竒正論臣聞天下之事有能以勝不能有術以勝無術皆有能矣能之精者又勝焉皆有術矣術之多者又勝焉借以羿與般而譬之羿善射般善工學射者有彀的善工者有規矩特其大略也般之所以巧又有巧焉故學羿之射既與羿之巧均則有勝羿之心焉必曰吾與乃技相若羿不勝其忿而鬬技果相若則為羿之過失於盡其巧而傳之故郤視般之教示以巧而不盡其所以巧者誠為自勝之計也兵始於黃帝法成於太公黃帝而上兵未設以有兵勝無兵太公而上法未備以有法勝無法太公而後何其紛紛耶用兵者既頻學兵者既衆一定之法不足以相勝故管仲穰苴孫武吳起尉繚留侯孔明李靖之徒始出而論竒正竒正者因古以御時依體以立用千變萬化以制勝兵策用之之法可觀也而所以用之者不可見也戰之理可諭也而所以戰者不可陳也勝之道可制也而所以勝者不可傳也彼用兵之書布在方册既己人人皆可習矣用兵之法試於行陳既已人人皆能布矣人人皆習我亦習焉人人皆能我亦能焉是亦衆人也以衆人敵衆人尚何能必勝故竒正之理古人議而不辨竒正之法古人論而不議竒正之變古人存而不論非不論也不可論也不可論故不敝而常新以俟後世君子俾因襲致用可以神遇而不可以智知可以道運而不可以迹究法猶奕之局也兵猶奕之棊也竒正猶奕之智也智無一揆棊無定形觀其黑白不相容新故不相仍咫尺數路情狀萬變勝負得失在於一子然則竒正之形所以使敵人前後不相及衆寡不相待貴賤不相救上下不相扶亦一二䇿而已故四為正四為竒黃帝握竒之文也一術為正一術為竒曹公新書之義也前向為正後郤為竒太宗所以勝宋老生也先合為正後出為竒曹公所以辨孫武也方為正圓為竒步為正騎為竒受於君者為正將所自出者為竒固曰妙矣然人既用之則為故智不足襲蹈何哉不惟世之人知之而夷狄亦知之故當益為變化以出意外所謂形人而我無形致人而不致於人者非陳迹相沿而能勝也苟惟止此固亦粗矣能求竒正之義於意外古今幾人哉故學兵雖衆不足畏之誠以勝之又勝者猶在人也臣觀唐太宗與李靖論竒正之理所謂無不正無不竒又曰竒亦勝正亦勝善夫能知變通故其論左石逢原莫非竒正之變其言曰以竒為正以正為竒吾之竒使敵視之以為正吾之正使敵視之以為竒因其漢長於弩而蕃長於馬則為之法使馬亦有正弩亦有竒變其號而易其服也則為之法使蕃而示之以漢為竒漢而示之以蕃為竒方其陳之散也以合為竒方其陳之合也以散為竒觸類長之變而通之使竒正相生生生不窮竒正相變變變不測惟欲多方誤敵乖其所之豈復膠柱哉郤視孫子所謂以正合以竒勝猶為膠柱矣李靖論韓擒虎以為能識正為正竒為竒不知竒正之相變知竒正之相變者其知神之幾乎故早晏者天之隂陽左右者人之隂陽竒正者天人相變之隂陽相生也無窮如天地相因也無竭如江河相濟也終而復始如日月相成也死而復生如四時相代也味止於五五味之變不可勝食聲止於五五聲之變不可勝聽色止於五五色之變不可勝視兵雖竒正竒正之變不可勝窮巧厯不能盡其數聖智不能極其端此之謂兵妙或曰竒正固有宜分合固有變如之何以訓偏裨如之何以教士卒臣曰簡其節目異其號令正為一法竒為一法或進或退各以何别或分或合各以何驗吾以號令使之號令所指變亦隨之既一吾之耳目又變敵之耳目兵惟知有號令不知為竒正車果何出騎果何來徒果何從敵人雖知吾有竒正不知竒正所在士卒雖為吾用知吾以竒正取勝不知竒正何先方料吾以正而吾忽以竒方意吾以竒而吾止以正不惟敵之不知而士卒亦莫之知孫子曰見勝不過衆人之所知非善之善也戰勝而天下曰善非善之善也知吾有制勝之形而不知吾所以制勝之形非善之善不足以與於此或曰竒正之情何如臣曰兵家之要貴我專而敵分為竒正者在我故專應竒正者在敵故分以知吾之有竒正也則備我備前則後寡備左則右寡備我者所以寡彼也無所不備者無所不寡也我專為一彼分為十以十擊一者也我專則安彼分則擾以安擊擾者也勝負之理不可言喻故能正不能竒守將也能竒不能正鬬將也守將可以用竒劫鬬將可以用正老能竒能正乃國之輔今夫以武為業動纍億萬鬬力勇而已鮮知兵之法學兵之法動纍數千分行陳而已鮮知兵之理窮兵之理動纍數十分強弱而已鮮知竒正借或有人但能知竒為竒知正為正而已鮮知竒正之變臣故曰兵法貴勝勝之所以勝以竒正法可傳而竒正不可傳學兵雖衆不足畏者以勝之所以勝者猶在人也或曰羊叔子之平吳也不為掩襲之計尅日而後戰奈何專論竒正哉臣曰乃所以為竒正也償米縱俘歸禽饋藥竒正之用也以懷其心逮祜死而王濬舟師東下一舉而俘其主夷其社孰知夫正在荆州而竒在益州耶茲竒正之大者也人君俾賢將之用竒正必若羊叔子則成功必大矣浮圖論論曰臣嘗歷觀前世之弊及其甚也必有有為之主以拯救之獨千世承襲其弊而安受之者浮圖而已浮圖非無可觀也百氏之家一家之説也非不可為教也蠻夷之國一國之俗也不幸王者迹熄之後聖人道微之時乘間竊入中國當時君臣辨之不早制之不剛俾盤根滋蔓為弊于後東漢明帝之罪也其間非無英睿剛克之君忠義正直之臣欲除其弊終亦不能者何哉蓋銷之不以道制之不以漸故也蓋英睿剛克之君灼見非有益於吾民也必欲掃除之正如欲華陀之治醫也將剖膚鑿骨湔腸洗胃以去其疾豈不雄哉奈何臣下或獻禍福之一言則惶懼隨之亟且罷不敢復言矣必曰姑且聽之惟其姑且聽之此其所以長存也前日武宗是也毁天下寺宇四千餘區冠笄僧尼二十餘萬豈不快歟東西京藩府輔郡猶量留寺與僧豈禍福之説已二於胸中耶何使絶無而僅有邪宣懿之世則一切復之終令彼勝於此乃所謂銷之不以道制之不以漸故乃爾也忠義正直之臣極言其有損而無補也必欲掃除之正如近時水官之治河也欲竭太行之土淇園之竹以塞怒流不已疏哉奈何人主疑禍福之多端則恚惡及之遂及誅竄者矣必曰爾敢非聖人惟其謂之聖人此其徒聞而益盛也前日韓愈是也憲宗遣使迎佛骨於鳳翔王公大人灼體膚委珍貝以惑其法愈極詆其道且欲以佛骨付之水火憲宗怒欲誅愈以謝佛裴度崔羣力救其死猶貶海南濵於死所令彼盛於此乃所謂銷之不以道制之不以漸故乃爾也初欲抑之乃所以揚之初欲沮之乃所以長之故根日益大蔓日益滋以至于今日國家不惟安受千世之弊而不知救又從而昌大之遂使賊人乘時所尚公肆厥姦與國爭雄彼華堂大宇丹楹刻桷敢踰制於王宫撞鐘伐鼓聚黨數千敢僣禮於朝位已為可禁雖然彼所以侈其居盛其徒者本欲以誘愚夫愚婦而已奈何王公卿士競登其門而師之朝衣朝冠或立侍於其座或跪拜於其庭咸尊之如天神欽之如父祖彼有道之士以學佛隱者固亦有矣而姦人假學佛以欺世者常多固不當事之如此以虧國體臣恐孔子復生於今日則羣公卿士忌􅎱者衆矣不應如是以奉事之也孟子曰用夏變夷未聞變於夷者也又曰未聞下喬木而入於幽谷今昌大浮圖之教豈欲以堂堂之中夏以變於夷乎凡學孔孟之道者相率而入於幽谷乎可不謂之大惑歟臣今不復更以傅奕之辨韓愈之疏言之直以文中子之言為信曰佛者西方之聖人也果為聖人豈不惡其徒憑藉其説以猖狂妄行於今之世哉為今之計不必推罪於佛惟治其徒苟惟治其徒之罪又何難哉臣願陛下盛言其佛之長極言其徒之短臣請敘其説曰蓋聞佛者西方之聖人也以清淨寂滅為心戒定慈忍為行色空為道禪律為法凡願學佛者必當檢身周慎持法謹嚴枯稿其形骸齋戒其心志自治其身自求其道不可輒出户庭不可雜交民俗戒牒之文其密如縷苟能此雖異道不害為君子乃者學佛之人類皆遊佚之輩或惰農之鄙夫或怠績之愚婦或好蕩之儇子或好倡之冶女居金碧之室食稻粱之膳幸災樂禍自為風俗姦非不義自為朋黨訊其何以謂之禪何以謂之律則罔聞知者十常八九如此則大設寺宇乃為爾等作容姦之地嵗度徒衆乃為爾等置畔道之人既蠧於國實敗汝德自今以前吾一洗之勿問自今以始吾將使汝不出户庭專治其佛之説而躬行之所受戒文令禮部著以為令刑部防之以法期汝必行如不能然一聽歸俗有願如舊真能奉其師之説聽其君之令者也然後以常住衣食之可謂待汝之意厚既仍舊為僧尼乃敢尚為過惡許人人得以告捕是不從君之教而背其師之説誅之刑之齋供禱祠任民自然不可以擾親戚故舊不可以私其所昵男雖父兄不可適尼之居女雖諸母不可適僧之舍人人得以告捕抵法陛下果以此説下詔假學佛之衣服以藏姦詐假學佛之衣服以墮農績皆不能自信而願去不可勝數良家子女觀其法之峻嚴烏敢違父母之養舍室家之倫避妄逸從枯稿哉如此則良民自願為其奴婢者自寡矣雖然固亦有為之者矣不加多也莊子言魯多儒國君下令而敢儒服者一人而已亦是意歟此乃銷之有道制之有漸以嵗月之久俟其自衰而已譬之以醫則緩藥石以治之俟其自平乃止不必用華陀之術也譬之以治水則固隄防以導之使復故道乃止不必橫塞其怒流也或曰子痛詆佛而抑其徒則吾徒獨不然乎一皆如孔子耶臣曰稂莠與五穀並生於田為之農者當鋤治其稂莠乎將鋤治其五穀乎雖未必皆頴栗堅好要之吾種也今千萬年無佛何加何損一日無吾道則如之何或曰子不畏禍福歟臣曰佛既為聖人則所當論者道也於其書而考之固亦粲然矣至於禍福報應之論特後之譯者妄爾雖或言之如莊周之寓言乎鄒衍之談天乎公孫龍之詭辭乎皆可稽考之耶願陛下勿惑禍福而忽臣之説聖學論臣聞效一官可謂卑矣古之人必曰學而優則仕治一邑可謂微矣古之人必曰君子學道則愛人子使漆雕開仕曰吾斯之未能信蓋以學之弗優不敢效官尹何為邑子産以為未聞政學蓋以學而後從政乃可治邑彼子路使子羔宰費孔子以為賊夫人之子子路復曰有人民社稷焉何必讀書然後為學孔子惡其佞夫效官治邑必由學而後可况奄有四海為天下君乎一日二日萬幾何以俾有條而不紊萬邦有衆何以俾樂推而不厭一言其幾興喪繫之好惡所示靡然成俗如之何俾百工熙哉庶事康哉嗚呼為君實難可不學歟乾之九二曰學以聚之問以辨之寬以居之仁以行之君德也古之聖君任賢所以能不二去邪所以能不疑作福所以能賞善作威所以能罰惡蓋以聖人之道折衷之斷然晳矣所以能折衷聖人之道者由其中有學問以為之主也髙宗既舊學於甘盤復師資於傅説觀其好學之誠意則曰爾交修豫罔豫棄豫惟克邁乃訓可謂勤矣此所以為商之髙宗成王席文王之大謨繼武王之大烈觀其好學之誠意則曰日就月將學有緝熙於光明佛時仔肩示我顯德行可謂勤矣此所以為周之成王於皇有宋本支百世世有哲王故天縱陛下之聖德溫文日就天誘陛下之宸衷睿智夙成仁愛孝恭出於天性是皆生知天育受道之質矣重念承平纍聖之業御兹九有之師欲致乎治必先乎學學也者致治之道也古之聖賢不可得而見矣其言具在方册要之皆王者事爾人臣學之期以致君人君學之自致其治故天地之情隂陽之理吉凶之變失得之故備在乎易而卦者時也一治一亂或美或惡初不可齊亂可使治惡可使美察理之變為理之主惟君乃能之臣願陛下學易則體乾御坤進陽退隂觀道設教運神合德使天下之時常為泰而無至于否常為晉而無至于剝天子之學易固當如此一國之事繫諸侯之本天下之事形四方之風美盛德告成功者皆在於詩四詩之名各辨其實不敢誣也臣願陛下學詩則為政之大而無入於小雅為政以正而無淪於變雅無若東周降於國風必使功德終美於頌天子之學詩固當如此夫尊王正法謹始善終詳天地之災祥著君臣之美惡者無尚於春秋臣願陛下學春秋則師治而戒亂賞善而罰罪常為知孔子者無為罪孔子者夫堯舜禹湯文武成康之世其典謨訓誥誓命之文百王之心迹治亂之大略者無尚于書臣願陛下學書則考稽古之得失操制今之法令皇步帝驟王馳霸騖一皆得之陛下欲以正六職以治六官必也學夫周禮然後百工允釐庶績咸熙巍巍乎其有成功矣陛下欲以正其威儀詳其辭令必也學夫儀禮然後五禮之合制見於典章文物之間六儀之中節見於動容周旋之際煥乎其有文章矣陛下又當發揮孔孟之正道鋤剃百家之邪説在亹亹而已乾之象曰天行健君子以自強不息詩曰勉勉我王綱紀四方惟陛下不倦以終之則日進無疆聖益聖矣天下幸甚伏惟陛下有聖人之材而居聖人之位能進聖人之學以充聖人之道則功利天地澤及萬世可侔德商宗周成矣雖然陛下有好學之誠而無進學之説陛下有望道之意而無明道之人則或博而寡要勞而無功故陪卿之列賔師之選不可不慎臣願不可與迂儒共學迂儒好為太髙不經之論將使陛下畏道之難行或自畫矣不可與佞儒共學佞儒好為苟合過情之譽將使陛下志滿假而輕道術或自聖矣願陛下妙選忠義正直博學守道之士以備顧問則用力少而見功多適道正而為利溥天下幸甚慎兵論臣聞兵不可好好兵者嗜殺人者也戰不可忘忘戰者棄民者也臣嘗原兵之理我克敵敵克我要之各有相傷為民父母奈何使民兩自相傷中道無罪而隕生哉萬一正不獲意則權必用武乃濟然後哀矜愴惻而用之以犯難難平即止非復可玩此以殺止殺以戰去戰之術也司馬法曰不違時不歷民病所以愛民也不加喪不因凶所以愛夫民也冬夏不興師所以兼愛其民也後之人君豈恤是哉爭城則戰矣爭地則戰矣爭長則戰矣爭利則戰矣小忿則戰矣違言則戰矣代翕代張代存代亡民不加多率以戰死獨何辜哉今日暴原野之白骨乃昔日暴原野白骨之子孫也人君當視人猶己以已推人則好戰之心自平夫士卒之痛思已之痛士卒之傷思已之傷矢石在前白刃在左右法令在後萬死之間幸於一生其危心如何彼貴賤雖異位而喜懼好惡之心無二况復殺乎殺一人則父母妻子失所而無依者數人或至於殺其子孫則嗣續遂絶者夫推愛物之心猶不忍暴殄天物况人乎不戰而屈人兵者正慎於此故觀無衣之詩然後見興師之情觀揚之水之詩然後見屯戍之思觀葛生之詩然後見戰殁之感逮夫民日益寡國日益削力日益屈財日益殫於是惻然哀恫其前非殆矣主父偃曰務戰勝窮武事未有不悔者豈特悔而已禍亦隨之夫三世為將道家猶且忌之况好兵之主乎故禍莫大乎好兵好兵之心有二曰幸曰侈孔子曰不仁者不可以長處樂不可以久處約惟樂與約處之實難自匹夫至於天下國家其召禍之漸均生於有餘不足有餘則侈心生不足則幸心生幸心之禍在厥身侈心之禍在子孫今夫國迫小而鮮長慮財𥚹急而多妄計貪而無謀勇而無禮惟試僥幸於一戰萬一償志於是乎幸心生矣幸心一生故不量力不度德而所較非其敵志徒大心徒勞而所求非其道如卵投石如指撓沸自求危難屠其城夷其社覆其宗絶其嗣者踵相及孟子所謂緣木求魚必無後災以若所為求若所欲後必有災是也不足為有天下者道若夫燕安間暇財豐力富旁視四顧無一不可惟外事四夷然後快意於是侈心生矣侈心一生故好大喜功而不以生息元元為念窮兵黷武惟以無戰伐功為愧自求憂患困役傷財得寸損尺怨滿天地而禍及子孫衆仲所謂兵猶火也不戢將自焚者是也前王既以此致凶咎後王當以此為龜鑑古之好兵無功而其主非賢者不足道好兵而賢且有功者莫若漢孝武唐太宗夫孝武席髙祖文景之餘休太倉有紅腐之粟內府有貫朽之錢故放心肆欲玩兵耀武以事疆埸內則有期門羽林孤兒佽飛騎士之兵外則有六郡良家材官之士總節制以統軍則有衛將軍之智提孤軍以深噪則有若霍驃騎之勇又有李廣程不識蘇建二師安國嚴助李息徐自荀彘之徒以帥偏師楊僕路博德李蔡王恢李陵李沮公孫賀公孫敖之徒以將别部擊胸奴救東甌平南粵誅昆邪平西羌伐朝鮮征大宛乃置朔方滄海武威儋耳牂牁樂浪等二十四郡厥勛偉哉太宗以英雄神武戡定禍難以基王業自偏禆小校至於為帝大小戰無慮纍百未嘗挫衄有若李績李靖柴紹衛孝節薛萬徹之徒以平突厥有若道宗道彥樊興宗段志玄髙甑生之徒以平吐谷渾有若侯君集薛萬均之徒以平髙昌有若李襲譽李大亮之徒以平延陀有若牛進達之徒以平吐蕃有若郭孝恪之徒以平焉耆有若李子和齊善張士貴張德寶上官懷仁之徒以平諸獠有若契苾何力阿史那社爾之徒以平龜茲邦國既底定諸盜既勦絶其餘勇故氣猶未肯寧晚命馬周李績張儉張亮為將統十六總管之兵復逺駕遼海征髙麗厥勛偉哉以漢武唐太宗之伐功度越前世所殺敵人固不可億數然士卒物故亦已多矣故君子曰戾太子父子庶人承乾兄弟之釁實由於此臣故曰兵不可好禍莫大于好兵好兵之禍雖無近殃必有逺憂則慎用兵而重民命者其得福必永矣或曰子論兵而以好兵之禍為先奈何為驚人主心兵可去乎臣曰知戰可慎民可愛兵可暫而不可玩禍可去福可就然後可以用兵矣書所謂知稼穡之難乃逸之意歟故曰仁者愛人惡人之害人義者循理惡人之亂紀以茲為兵意是乃仁術又安可去太祖皇帝昭受昊天之成命市不易肆兵不血刃與漢唐百戰以得天下固已異道五宗相承奉之以德雖間用兵兵出有名未嘗有漢唐之侈心則基福而逺禍也其已久矣陛下紹大統繼大烈可垂拱無為以荷天休然內寧必戒外居安必慮危故戰不可忘兵未可去戰雖不可忘當念民命之可重兵雖未可去當念好兵之貽禍鑒視漢唐之侈心緝熙祖宗之多福故有曰今太平可恃四夷無虞宜毁兵革銷鋒鏑者自敝之論也願陛下勿聽或有曰今太平有餘四夷可討除宜興師旅闢土地是招禍之論也願陛下勿聽臣願陛下妙選將帥必求其良訓練士馬必致其精謹烽堠繕甲械積芻粟完城壘以待四圉不害中國之為強脫若嬰吾憲吾以逸待勞以直待曲真天子之兵也將材論臣聞牛羊欲其茁壯也必其善牧車馬欲其習服也必其善御矧軍旅之事將帥之職畀之以師律付之以疆場內欲重吾國外欲克吾敵顧不慎哉不可以三軍之元帥姑且備其員兩國之民命聊且試其技不考其可必為國禍不求其良必為民殃故當築壇告廟之始必觀是人果足以稱此禮乎至推轂授鉞之際又觀是人果足以勝吾任乎昔在戰國之紛紛不惟君可以擇臣而臣亦可以擇君當是時英雄挾其長遊視諸侯能用我者然後仕之故欲求將不可遽得今天下為家四海為畿罔匪臣僕英雄盡入于彀中多士咸在衆技自獻惟君王所擇所謂能稱築壇告廟之禮能勝推轂授鉞之任者固亦有之在所選而已昔之論將者其材有五曰勇曰智曰仁曰信曰忠將何以貴乎勇蓋直以養氣威以克愛剛以致其敢義以致其心蔑視敵國而砥礪三軍吾之所指曷敢不從死吾之所麾曷敢不從移非勇不能也勇則不可犯矣將何以貴乎智蓋使貪使愚各求其所須使勇使智各效其長技彼敵常為客而不足我常為王而有餘我常致人而人必應人不可致我而我自如為勝敗之政如神默運制竒正之術如環無端非智不能也智則不可亂矣將何以貴乎仁蓋以慈養其惠以惠養其威寬以御衆衆罔不盡其心悅以使民民罔不盡其力忘勞而供武服犯難而圖戰多欲與之可赴深溪必自我視之如嬰兒欲與之可俱效死必自我視之如愛子則非仁何以懷之仁則能愛人故也人不可無信而將之信為重蓋方其蒞師也國不自外理國容于是乎不入軍軍不從中御軍容于是乎不入國將軍之權於是乎專矣如之何交厥孚于上下布至誠于逺邇故貴乎信信則不欺人故也事君皆以忠而將之忠為大蓋方其用師也上不制于天下不制于地中不制于人將軍之志自用矣如之何惟君是圖而忘其身惟國是憂而忘其家故貴乎忠忠則無二心故也夫有爵有僇士心所屬可安可危君慮所隨士心所屬以賞刑之柄繫焉賞刑之所繫成敗如轉掌君慮所隨愛憎之變會焉愛憎之所會禍福如發機惟信惟忠乃為建立勛名之權輿杜塞危疑之關鍵也以是五材泛觀于朝如持度以揆長短如操量以較多寡其分别差等殆無遺形大材如罍小材如杯以杯受罍過則溢以罍受杯綽乎兼容故古之人論將有妻子之將有十人之將有百人之將有千人之將有萬人之將有百萬之將其材相去逺甚然不離乎五者之間也雖然材必適其用用必適其宜執方而無權守一而不變雖用良材覆為纍德故太公之論將有十過孫武之論將有五危觀其過之所生究其危之所自其初皆五材之良其失皆五材之蔽有材而不能用至于軍敗國辱家殘身僇吁可哀也故為將之道既有五材以御三軍欲攬英雄之心則又當行之以三禮斷之以三至欲重廟堂之勝算則又持之以五慎審之以五權達事宜則有九變能通九變則置敵于全囚泥法制則有九拘毋執九拘則立我于全勝古之人論良將有曰剛則法天可望而不可干柔則像淵可觀而不可玩去如收電可見而不可追留如丘山可瞻而不可動有將如此則築壇告廟之禮推轂受鉞之任為不愧矣故初作三軍欲謀元帥惟郤縠説禮樂而敦詩書于是用于晉秦伐阿鄄而燕侵河上惟穰苴文附衆而武勝敵於是用于齊孫武十三篇之説闔閭試之以婦人卒以強吳吳起七十六戰之功魏武始于論兵器卒以強魏先軫以下軍之佐而超將中軍不以卑踰尊為疑郤氏狐氏以族人從軍不以親同職為間韓信奮于亡虜魏尚拔于囚徒充國自舉任之而不違伏波求用試之而不拒謝安薦姪而不沮其挾親竇憲請行而曲聽其補過所用者材也材可用焉不當牽左右近習之好惡不當徇士卒國人之議論挺然不疑斷以已意夫賢將之徒類皆英雄豪傑之士觀人君用已如此其重當如之何圖報哉谷永曰楚有子玉得臣文公為之側席而坐趙有廉頗馬服強秦不敢窺兵井陘國有賢將所恃如此惟陛下注意焉陸賈曰天下安注意相天下危注意將必至天下危然後注意將則不亦晚乎惟天下安乃注意將之時是謂治不忘亂安不忘危將心論臣聞有君子將有小人將君子將天下之將也小人將亡國之將也古之賢將原兵之意可以為仁術察武之用可以廣德心故以殺止殺非所以好殺以戰去戰非所以好戰司馬法曰殺人安人殺之可也攻其國愛其民攻之可也孫子曰全國為上破國次之全軍為上破軍次之何古人終始以愛存心歟故君子之將能師古人之意以不戰屈人兵為心小人之將違古人之意以嗜殺人為事以不戰屈人兵為心以天下為心者也非天下之將乎以嗜殺人為事亡國而不恤者也非亡國之將乎夫尉繚當梁惠王之時為兵之説曰善用兵者能殺士卒之半其次殺十之三其次殺十之一能殺其半者威加海內能殺其十之三者力加諸侯能殺其十之一者令行士卒信此説也則興師二十萬可自誅其十萬興師十萬可自誅其五萬矣且夫將軍心也士卒支指也心誠則支指應心危則支指違士樂附則將威今驅無罪之人以犯難悅以使之猶恐不得其心忍羅置罪罟以快意於刑戮乎誅其半欲其半之用命孰若全軍撫愛皆使之親其上死其長乎殺半用半雖勝何益孟子曰不仁哉梁惠王也糜爛其民而戰之爭地以戰殺人盈野爭城以戰殺人盈城嗚呼慘酷至此尉繚有以啓之歟臣於是求於古之君子善撫士卒而愛之者私竊慕焉其惟戰國之李牧蜀之諸葛亮唐之李靖乎臣請言其用兵之意夫李牧之居鴈門也罄軍市之租以養士力椎牛犒燕以養士心謹烽燧多間諜以養嚴入保示怯佯北致人以養氣謀熟勇全皆願一戰於是選車餘千選騎餘萬百金之士五萬彀者十萬一舉而滅襜襤走單于破東胡降林胡向使自殺其士卒之半則莫不怨毒矣孰肯自獻其勇以求一戰乎諸葛亮之禦張郃郃之衆號四十萬而亮之衆不滿一軍衆寡既不敵而強弱又相逺兩軍既陳而畨兵適交亮以用兵行師大信為本乃悉遣之且曰去者束裝以待期妻子企踵而計日則原其情而憫其勞懷以仁而厲以義可謂周矣故去者感激願留一戰住者憤怒人百其勇殺郃走懿以成其功向使自殺其士卒之半則聞聲而還矣孰肯忘死銜恩以決一戰乎李靖之與太宗論兵也太宗以嚴刑峻法使人畏我不畏敵為疑靖以卒未附而罰不行不可用為説太宗以愛克威威克愛為問靖以愛設於先威設於後為對則君臣之心何視卒如嬰兒乎又曰頃討􅊳厥總蕃漢之衆出塞千里未嘗戮一揚干斬一莊賈夫衛公於艱難草創之初剪刈凶渠以掃欃槍備延陀於關內伐􅊳厥於定襄蕩吐渾於西海夷蕭銑於江陵向使自殺其士卒之半則危國亡師之不暇况宣威信于絶域乎嗚呼安得今日守邊之將愛育士卒如此三子者乎夫天子之兵以仁為本以義為御天下之將以慈為主以勇為決郤視尉繚之説非亡國之兵小人之將乎秦以殘忍虎狼之心務殺伐屠戮以強天下又有殘忍虎狼之將能殺伐屠戮以快其意蒙驁王翦之父子世為秦人之民賊攻城克敵固已衆矣然未若白起之甚夫白起之為將也戰必勝攻必取誠莫可及以書考之凡攻某國拔之伐某所取之不言斬首若干坑卒若干者置而勿論論其直書斬首若干坑卒若干而計之凡殺敵國之兵八十四萬人然起戰卒死於敵者又當幾十萬總兩國供軍之民其誅求裒斂因以失業而死者又當幾十萬矣何晏曰白起降趙卒而坑豈徒酷暴之謂乎後亦難得志矣又曰裁四十萬之命而適足以強天下之戰要一日之攻而更堅諸侯之守又曰殺降之禍大於劇戰然則兵勝未幾而被戮國強未幾而為墟良以此乎臣於是乎求於古之君子能制閫外而懷柔者私竊慕焉其惟戰國之荀吳晉之羊祜唐之郭元振臣請言其用兵之説夫荀吳之伐鮮虞而圍鼓也鼓人欲叛其君而附已吳曰吾不可以欲城而市姦所喪滋多鼓人請降而有食色吳曰吾焉用邑以賈怠不如完舊食竭力盡克鼓而還不戮一人賢哉羊叔子之為荆州也慨然有平吳之心開布大信專修德義縱俘釋虜以示至仁歸禽償穀以示不擾潘景來冦追斬而厚葬之美其死節陸抗對壘抗病而饋之藥抗飲不疑內則授良謀於張華外則付成算於杜預卒能平吳賢哉郭元振之鎮西域也撫馭諸蕃專尚忠義走吐蕃之衆開涼州之圍會兵百萬以集湟州分兵十道以進青海贊普屈膝而請和突厥畏威而入貢會質勒而至於隕身弔婆葛而為之流涕賢哉嗚呼安得今日守邊之將綏撫敵國如此三子者乎夫天子之兵至信為主至公為輔天下之將附衆以文威敵以武卻視白起之功非亡國之兵小人之將乎夫為政至用兵棘矣用兵至於殺人可哀矣以可殺而以殺為事乃嗜好也嗜殺人者其心何如孟子曰始作俑者其無後乎為其象人而用之也懼後世以象人為未足有殉之以人者矣故必推原其理而深罪之奈何尉繚之法使後世藉口以殘忍乎孟子曰盡信書不如無書吾於武城取二三策而已何其血流之漂杵也懼後世以漂杵則忍心於屠殄矣故必推原其書而深詆之奈何起之事誘後世快意於殺伐乎陛下以仁政為重孝治為先則將之心術亦可戒矣彼一夫向隅而泣滿堂為之不樂東海殺一孝婦天降纍年之旱以罰之惟人命為可重也陛下念哉薦舉論臣聞薦得其人則受賞薦非其人則被罰古之道也必有賞以勸之然後可使舉善必有罰以威之然後可禁朋邪獨賞而已則競獵虛名冀僥幸以自進獨罰而已則雖有真賢皆疑畏而不敢進之鄂秋之於蕭何一言而爵通侯歡兜之於共工一言而放崇山何勸沮之較著也夫人之情喜賞而惡罰國之格難賞而易罰人之所喜國之所難也人之所惡國之所易也可以賞而賞之緩則人必相謂曰慎無舉賢徒勞人爾賢則欲我舉而恩則吝也况無賞乎苟可罰而必罰之則人必相謂曰慎無舉賢徒多纍耳賞則未必豫人而罰則信也况專用罰乎且古者進賢受上賞蔽賢蒙顯戮貢士之諸侯則至于加九錫不貢士之諸侯至于黜爵地以是推之惟恐有賢而不進也堯求若采而啓明之嚚訟乃被薦於放齊堯求治洪水而伯鯀之方命乃被薦於四嶽即其昧於知人則宜若歡兜之放可也堯則治而不問舜則不復罪之何也蓋人實不易知而嚚訟方命其惡在外而易辨靜言象恭其惡在心而難知以堯舜之聖猶且憂而畏之則放齊四嶽之過舉豈與歡兜同科以是推之雖或可罰猶當恕之有賢而必進進之未當恕之勿責則是聖人之於天下求賢之意深罪不肖之意淺用賞之意多用罰之意簡願治之意詳施刑之意略故忠厚之化格於民心而天下無遺賢今也於薦舉之制疑若罪不肖之意深求賢之意淺用罰之意嚴用賞之意簡施刑之意詳求治之意略如之何致天下之賢以為吾用哉故有司妄測朝廷之意例以進賢為末發有罪為本發有罪為有功無過進賢為有過無功朝廷授我黜陟之權者本以我為健吏耳不若峻法以寡恩朝廷俾我薦舉之職者特循故事耳今又無賞而有罰故雖有薦舉之名而無薦舉之實非徒無實而又市之何哉借若甲為長吏於此乙為長吏於彼甲舉乙之所私然後乙舉甲之所私非有意於所舉之人也甲乙自為施報也惟其自施報乃假手自舉其所私非謂市之歟夫薦舉之意豈不欲得有道之士乎有道之士安能容悅以自謙豈不欲得孤寒之士乎孤寒之士其誰憐恤而為援故凡所充舉類皆肉食者締交黨與彌縫倡和之人未嘗聞拔一滯淹擢一豪傑真可用者如是欲羣賢連茹而升有是理乎陛下聰明灼知邪正如别白黑則古之人所謂達視其所舉又曰觀近臣以其所為主者不待臣言而後喻也為今之計莫若先詔大臣議復薦賢之賞使天下無吝恩之議庶幾勸沮之道人皆信之然後使凡薦舉者必如擲發之詳得以考稽焉蓋今天下之長吏凡所擲發者必鋪陳其罪以聞于上曰某人嘗為某事可以抵罪期必抵罪而後已其所薦舉者則含糊其言假借其實文具而已未嘗鋪陳其事以聞于上曰某人嘗為某事可以任使期必任使而後已雖然固亦有鋪陳以聞上者必曰某人有幹才嘗於某處生財幾十萬某有機略嘗於某處鞫獄幾十次矣茍使薦舉之奏如擲發之奏則下臣之善安有不聞達者朝廷聞而用之後更器使踐華要必使自言曰非某所薦安能至此陳平封侯而魏無知因以受賞者旌薦舉之人無忘其功則其德厚矣彼周行而封列侯自諸侯而加九錫固不可指以為格願視其舉者之髙卑量為舉主之酬奬可也以今之法所舉之人一陷有罪則凡為舉主者坐之至有削品秩上印綬不少貸令舉主以所舉酬奬又何勸焉臣又竊以一郡論之夫一郡之內文武僚寀不啻百人而部刺史所舉之法嵗才二三而許之擲發者則無員數謂凡可擲發者必擲發也至于薦舉奚獨不然豈使員足矣爾後雖有可舉置而勿恤嗚呼是朝廷許其蔽賢矣故坐席未溫已舉所私所私皆畢餘見真可舉者則謂之曰非不知君奈何舉之人數已足矣臣願陛下既下薦賢之賞乃詔天下長吏見可舉者舉之不必限之以數或無可舉則已之又不必充數則庶幾無憾焉古昔逮今長吏以薦舉為恩下吏以奔競為俗或賣交以進已或賂人以借譽或飲食玩好以豢其親信或沽恩俯傴以媚其僕御或卑詞以足恭或面柔以求悅吮癰舐痔曽不以為羞指天誓心曽不以為愧自非宣哲見幾之士未有不墮其彀中而謬舉矣願詔長吏以阿大夫之所以烹即墨大夫之所以封者為之龜鑑勿妄許人以為國士也必欲公舉則使下吏明具功過於考績之書無崇虛文嵗終則取諸考課之書稽考而優劣之可舉者書其可舉之行能可黜者書其可黜之過惡揭於公堂使吏民得以議之以為可舉也然後舉之可黜也然後黜之則無僣無濫臣之説無遺慮矣然亦不可不防者天下被薦或多吏部病其難選也臣願以四科第之行同能偶也復以被薦多寡為差况朝廷必使真得其賢則又何多矣或多賢而多薦之無憚其勞此太平之光也序陳省副集序不朽有三曰立德曰立功曰立言有一於斯可以無愧于後世其德可尚不必有功其功可紀不必有言其言可傳不必其人之賢也况兼善而有之者乎異時聞彭城陳公之奮志髙行聞於鄉鄉人共師之以為先生東州耆舊論搢紳人物必以公為稱首藹藹乎為盛德之士矣仕於朝益勵竒節為御史人憚剛正讒邪震息昊賊警邊西方用師持節出使調度兵食完壘治械區處兵將忠獻韓公文正范公職是以立戰多掌度支鹽鐵籠天下利權民國皆阜凜凜乎功在王室矣所為文章深純爾雅言必有義字必有法一時望人皆咨嗟畏重以為絶倫嘗觀其書得其為人其文之氣蕭散簡逺知其有洪人之量其文之詞芬薌明雋知其有過人之才其文之理方嚴安重知其有正直不回之忠其文之意淵淡沖粹知其中和無邪之德曄曄乎其言有華國之文矣三不朽之事公皆優為之信乎賢於人逺矣豸生世晚不得從公遊然與公之孫師仲師道友善嘗獲見公遺藁乃世所謂鹽鐵府君之詩者也才二十一篇而已常以不多見為恨今公之外孫鞏大夫程因顯忠以全集示豸古律詩凡百九十首雜文一百四十六篇列為二十卷曰吾家父子集而録之雖殘編斷簡殆無遺矣至鞏將謄數十本傳於人間昔紫微顔舍人長道為序於前敢以後序諉吾子薦曰文之有前後如服之有冠履車之有蓋軨不可不慎今無以過舉乎因曰君從事於文久且辱與兩外兄遊可無辭故陳三不朽之説庶幾托名於無窮亦所榮也公名洎字亞之仕仁宗皇帝為尚書郎三司鹽鐵副使云程因百詩序河內從事程因謂友人李豸曰吾將見子之先生翰林眉山公焉吾作詩百篇以為贄非慕其勢也乃慕其德也非欲求援也將以求教也子以為如何某曰子之慕異乎人之慕子之贄異乎人之贄子之求異乎人之求惟我先生自布衣以至於今其正直之風忠義之節德行之實文章之望凜然著於四朝藹然聞於四海外薄裔夷下逮奴隸其稍有知者咸敬其名戴其德固有年矣然士大夫忌其賢而恥其不若輒沮而毁之者亦非一日而吾鄉二三友人抑有甚焉觀其學與才非可與先生並馳也德與行非可與先生同科也望與名非可與先生相上下功與實非可與先生相優劣而乃相為比周輒分朋黨其不度德不量力正如螳蜋之拒輪蚍蜉之撼樹曽何所傷而妄毁譽紛紛盈耳亦可惑衆茍其所養不厚所守不固者其心腹腎腸往往隨朋搖奪鮮不疑其所依矣今吾子乃能尊德信道不流不倚吾知其明足以辨道原其勇足以闢鄉訕而又研精極慮作是百詩不為權幸之禽犢而專以為我先生之贄其誠與勤皆已至矣又不願為富貴之媒而願為賢人之徒則又可賢也某故曰子之慕異乎人之慕子之贄異乎人之贄子之求異乎人之求謹序汝隂唱和集後序東坡先生再入翰林為學士承旨未閲嵗復請守郡得汝隂意甚喜之謝上章以宗資范孟博晏元獻公歐陽文忠公為言蓋以其主賔俱賢風烈可尚也士大夫以為宗范異代元獻公越在前朝文忠公雖近世未久然異方晚進之士或不及遊其門先生文章忠義為當世凖的其所寓山川國邑猶且使人懷慕想望矧其賔從寮寀有英偉雋傑者乎先生在汝隂友人陳師道履常為郡吏豸雖無位於朝廷欲挈婦攜子受廛為氓往從之遊先生止之曰吾將上書乞梓州欲過家上冢而去潁雖樂土非能久留豸遂不果行既而得秋陽賦於黃門蘇侍郎家趙德麟字説於翰林范學士家又知德麟為從事雖未識德麟已知其賢後於中書喬舍人家見汝隂倡和初見德麟之文章丰容秀發想見其風流標裁為神仙中人其後六年豸適吳越將道漢沔浮江而東遇德麟於襄陽慨然傾蓋如平生交德麟出汝隂倡和多嚮日所傳者三之二粲然盈目固足以使汝隂之人與夫它邦之人至汝隂者自今時至於百世皆懷慕想望以為一段佳事是必與歐陽子思潁諸詩俱傳於無窮豸益恨於是時不得操紙執筆從二三子後以奉觴詠之樂亦附名於不朽也今先生得罪竄南海異時門生故吏孰肯顧恤獨吾德麟之意不替平昔又取此詩使豸敘之其義甚髙非世俗所能為也或曰蘇公方在謫籍而德麟之意不替平昔無乃纍乎豸曰師友道缺富貴避貧賤迫於不得已其毁譽愛憎未始有定論者君子恥之毁譽愛憎未始有定論者將以事君可乎昔李夷簡以徐晦不負楊臨賀知其必不負國擢而用之然則德麟之意於東坡先生不替平昔乃所以事君也乃所以賢於衆人也傳張拱傳張拱字輔之浚儀人闓達警悟之士也少嗜學舉進士不第家日益索其母黨龔氏世為國醫師故拱亦善方術嘗於宜春門後坊陳藥為肆仍復不售元豐二年上休日日將出百官諸衛入賀同天節街塵不驚朝市未集一道士迎日而來目光瞭然射日不瞬徑往拱所顧而不揖振衣上坐拱方披衣櫛髮未盥頮意頗忿其倨作色語之曰鍊師何為者何所自而至於斯道士應之玉音琅然曰汝無詰吾所從來正欲見汝耳拱意以謂此誕人也京都似此者甚衆遽以一錢擲而與之且使之去道士笑曰吾無求者也以汝有道質仙緣故來教之何見拒之深也拱冠帶而出與之語論神仙則理致精微皆所未聞於是慚悔若不勝曰拱鄙人眼凡心惑豈圖仙君閔而見臨願卒教之道士笑曰志何求拱變色曰家貧饘粥不充儻使不食而飽則所願矣俄有鬻蒸棗者來道士乃以先所擲一錢買之得棗七枚顧謂拱曰神仙以辟穀為下然卻粒則無滓濁無滓濁則不漏由此亦可以入道子房諸人乃以丹藥療飢固亦迂矣儒者譏訶神仙以謂仙者不死則昔之延齡者皆安在哉蓋不知仙之為仙也夫仙者玄也玄者天也天者道也道者萬古以固存人能仙則雖死不死夫人以有纍欲體玄妙而傳之於身身者必盡之形安得以必盡之形而使之不死哉顧世之人死則神與質皆逝而仙者形則有生死而神則無變遷移時日改姓名而已如彼精金鼓鑄爐錘真性如故而昧者乃欲按摩吐納交媾服餌補益軀幹以求不死則愚矣汝欲得此道能自此不淫色可乎人能不淫俗念自息俗念既息仙之才也乃取七棗熟視而噓之曰汝啖此可終身不食人或強之食食亦無禁復欲不食則不食如初食與不食汝可自如但以汝有老母妻子未即相從然汝既啖此七棗當有七夢應之夢中所見豫為汝言拱皆記之後無不酬者謂拱曰他日汝事親既終婚嫁且畢已能不食復又何求宜便脫身詣名山中於懸絶處尋一石穴深廣有容者汝自纍石密塞其門一念不起坐臥行立於其間自有佳趣僅及半紀則汝之身如蟬出殼逍遙乎六合之內外矣過此非今可以語汝也言竟攝衣而起拱固留不可起出門則無睹拱乃知其非常人悵然有所失者纍月聞飲食之氣則嘔遂不食踰二年糞溺俱絶表裏清暢而神氣明爽步趨輕利因自試其力自晨抵暮緣都城外郛可匝者五蓋數百里矣衣袂軒軒超然蕭曠物外之一鶴也其母病痔幾二十許年厯用衆藥未損拱漫以七棗餘核而進之一夕遂愈拱既不御內則室家之愛漠然無心視若道路人其妻郭前朝名將軍進之後性亦剛果忿恚而卒其家以是益憂疑之逼而饋之食食輒兼數人爾後或食或不食無常朋友疑其詐者扄鐍於虛室以試拱不以為苦人或召醫則攜藥而往至則登病者之席止於牀隅趺坐而已或渝旬涉月杯水粒粟迄無所需今行年六十而顔色如四十許人喜飲酒好作詩豫嘗以詩贈之一時名公卿因豫詩而知拱者甚衆比聞其母已殁度其絶世而穴居當不久也豫與拱遊十有二年又與其親陳至端誠相友善至忠善立節為豫言拱所遇洵不誣故為作傳
