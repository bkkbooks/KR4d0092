body:
  text: 濟南集巻七宋李廌撰記芝堂記人有異質雖欲自比於衆人必發其曜物有異稟雖欲自同於凡物必擢其秀蓋其所以出類離羣者終莫得而掩也吾友西水陳叔易四世六公之宗子也隠居求志於南澗之上十有五年而名振於四方四方之士聞其風而髙之以謂陳子於今不易有當於古人中求之其躬耕養親以菽水自樂無愧于谷口之子真雖存畎畆意懐經綸庶幾乎隆中之孔明恢麗之文放乎莊騷䟽通之學參用儒佛蹤跡山海超然逺騖有禦冦子長之風談元辯理窮極幻妙則子綦庚桑之徒也持此數美乃能以退為進考槃丘樊與木石居鹿豕遊非南山之靈草堂之英為表其行出珍植之物以襃示于世則顦顇枯槁與虞衡草野之氓終無以異矣嵗辛未有芝生于竈户之側一本九莖葳蕤翕赩澤如渥丹曄如彤雲予觀之而謂人曰凡物可種之而生仍託于土壤者皆可以必致則可以易之草木可樹故材而用之百榖可藝故穫而飪之有求于世待世之用舍以為休戚者貴賤榮辱之權縣之于彼彼亦得而易之天下之所貴莫貴於人無得而易之也陳子之與此芝其亦類矣夫使此芝可種則無以異于蹲䲭儻附朽枿則或疑于蒸菌鄰于薪㸑發于灰燼所以示竒也或戱曰無處士之祥歟予應之曰而所謂者世俗之富貴耶世俗之富貴逹人觀之其以軒冕鐘鼎猶機穽桎梏故遁天之刑者惟懼嬰麗于已莫之勝脱又烏知造化不以是為災也盍以山林之士與朝廷之士析而論之孰勞孰佚孰肆孰拘勞而拘者重以憂患之虞肆而佚者全夫安愉之樂而况取民而賦其禄役民以奉其身上欲報其君而無負下欲答其民而不怍危其心以戒毁譽之來屈其身以狥愛憎之變固有慶者在堂而弔者在門或至于䘮元隕生僇孥覆族者矣與夫耕吾畆而食蠶吾桑而衣仰焉奉其親而有裕俯焉育其㓜而不匱無得失之患無利害之累頥真保和夭夀永究者其有間也然則陳子賢矣因序其説以為堂之記安老堂記甚哉老之難安也方少之時隂陽役之血氣使之心志誘其欲而迷其真勢利幻其前而悞其後未易能安之老且衰矣郤視向日之為宜其悔而求安然貪夫鄙人嗟老景之已至念短日之足惜悼前志之未充痛昔謀之匪良方且茍求無厭務得患失皇皇偷朝暮之生汲汲為子孫之計節義日衰亷恥盡䘮貪于富者則曰吾老矣講貨財較虧羡之術始詳矣未忍舍也擅兼并而亘阡陌巧梯航以絶山海籠物貨而無餘藏運籌算而無遺策甘心于錐刀之間盡瘁于錙銖之末負戴于道路轉徙于溝壑貪夫狥富死而後止貪于貴者則曰吾老矣結知遇賈名譽之術始明矣未忍止也履公門而矍鑠游闕庭而裴囘衒筋力彊飲啗染鬚鬢呈聰明職愈隆而意愈切禄愈豐而戀愈深故位愈重而望愈輕年愈髙而徳愈薄貪夫狥貴死而後止然則日暮途逺而倒行漏盡鐘鳴而未止類皆貪夫而富貴有以累之也故曰甚哉老之難安也居士新作西堂以安老為名然居士之安非惟老而後安安之也久矣郭外之田足以給饔餼郭内之圃足以給葅茹而未嘗求羡裘葛足以具伏臈禄食足以備婚嫁而未嘗求豐居士曰富不可妄致也吾老矣求安而已居士以文學知名于時聲聞藹場屋薦為禮部乙選遂擢上第名公鉅卿爭欲出已門下一唯諾足以得薦擢而恥于附炎平生故人多在相輔一舉首可以登臺省而恥于自售居士曰貴不可以妄致也吾老矣求安而已故雖起家為郎于朝有曼容之髙風端居十年不調有淵明之勁節或曰嵩少箕隗山水佳秀近列左右築室巖下足以專天下之雄觀奈何跼蹐于閭里之間居士曰吾求安者也舍易就難舍近就逺則内勞吾心外勞吾力但見夫勞而未知其樂不獲其安而撓吾天和矣此先人之故廬即而新之吾之心猶欿然吾行年六十有二人間富貴不妄求行吾所好行將挂冠懸車奉身以退歸老此堂志巳决矣人生七十雖居是堂以安吾老知復幾何時哉則居士之養可知故曰居士之安非惟老而後安安之也久矣夫安之為樂世之人未嘗知之及于病然後悔而求安及于勞然後慮而求安及于危然後懼而求安矣則向日求安之心皆妄未有能安其安者故老而能安已可尚矣非惟老而後安乃每以安老為心非逹觀勇退無妄君子不能也故曰居士之所養可知矣元祐二年八月初三日李廌記太宗皇帝御批記元祐天子錫宴東宫以御書古詩徧賜執政暨講筵諸臣各進表獻詩以謝著作郎兼侍講范祖禹曰臣願陛下篤志學問亦如好書益進道徳皆若游藝于是有以見人君大畧字書未足多尚臣聞太宗皇帝方側微已有書名擅于世及即位益專工鏤之金石藏之延閣布在天下不可勝數在前世中君已足稱述而帝以神武聖文左右太祖自布衣取天下以湯武拯濟之功全堯舜揖禪之美及紹大統遂集大勲巍巍成憲為宋太宗則其徳業睿智曄曄然與唐文皇争雄矣故文皇與帝雖以字學名于代而為餘事云因觀帝批天下兵馬元帥呉越國王錢俶表故作是記元祐三年八月十一日臣李廌記襄州光化縣重修縣學記飲則祭先酒食則祭先飯一飲一食而不忘報其先矧修身治民可㤀先聖人乎孔子載道欲濟天下而時君不能用故祖述堯舜憲章文武之實不試於當年然金聲玉振之徳發乎一身形於萬世萬世之下六合之間如天地之覆載日月之照臨尊為王公卑為庶士凡圓冠方屨者皆仰之以為師大而治天下小而治一已凡進徳修業者皆資之以為法蓋人無貴賤莫不為其徒事無巨細莫不用其道烏有為其徒而寢廟之奉不䖍用其道而教化之宫不飭者乎浮圖老子之道敢與吾聖人抗衡則以習其説者皆能嚴其居尊其師故塔廟參差緇黄雜遝彌滿天下孔子弟子乃顧學校廢興恝然於心可無愧乎酇漢相國蕭侯之故封其山川秀潔井邑豐富民氣醇雅為士者敬慎尚節義黟山洪侯復以忠厚中和之政整齊之一境藹然有古風烈洪侯初至謁孔子廟祠怪其堂序失次而風雨鳥䑕侵敗屋室土摧木腐瓴飄甓裂貎像欹殘噐用缺折乃喟然歎曰有土有民不可不視者三曰社曰稷曰孔子祠酇通邑也何為乃爾召耆舊而訽焉皆曰嘗為軍昔之為守與夫前為令者春秋釋菜纔一至焉文具苟簡以應故事或有營繕者不過補漏搘傾而止三嵗鄉舉㑹於督府饔飱之田督府取之故襃博之士不復講肄於其間絃歌之音不嗣久矣久則寖衰而寖弊也洪侯曰噫欲為政令必先教化欲明教化必尊聖人使民囘心向道我輩所務乃咨部使者暨荆州牧請新之然財用所給不能取具酇之士民相與議曰洪侯欲惠民於無窮學校成於酇酇士子居之酇之利也洪侯何有焉吾屬盍共成之乃衆請於庭侯曰縣官之貲亦可茍完諸生因欲壯大尤所願也於是願獻貲以助用者願獻地以益基者願新繪塑者願新祭器者願按圖指位則治材董工自作其處者板築樸斵塗泥丹雘惟恐或後門著肅然殿陛隆然貌像考於秩爵齒徴於書服章珪珮各稽於禮籩豆尊彛皆合於制所以奉先聖先哲者恭而嚴重堂沉然扉闔洞然藏書有府藏粟有庾廡序户牖一皆從便藩垣庖湢一皆有法所以待先生弟子者備而潔故歴階過位則人人有畏聖人之心竦然而起敬升堂處奥則人人有崇道徳之心亹然而自勸酇之士民舉欣欣然相賀且謂廌曰廟學之廢久矣非洪侯何以至此之巨麗也廌曰昔張老頌趙武之寢曰美哉輪焉美哉奐焉歌於斯哭於斯聚國族於斯而獻文子喜以謂是使武得全要領以從先大夫於九京嗚呼髙明之家方傾貲治第而基傾池平之歎巳興身外之感誠以寵辱在人而禍福無常故歌於寢不敢自慶哭於寢然后以牖下為幸孰若居有輪奂之美而通經於斯著書於斯求道窮理則為聖為賢為大君子亦於斯砥行立名為公為侯為卿大夫亦於斯有樂而無哀有得而無失也哉凡今酇人與其子孫無忘洪侯之徳洪侯名中孚字思誠歙之休寧人熈寧元豐間居太學有盛名擢進士所居見稱酇果為最庶幾古所謂三不欺者酇民䝉仁其績甚衆匪獨學校而已蓋王佐才也元符三年二月十有四日記濟美堂記天下治安世臣之裔能踐修前烈以世其家太平之盛節也蓋曰吾之先正嘗有嘉績顯於先王陪食太廟預享大烝載之旂常銘之鼎彛是將昭示後昆無㤀其功且夫封圻采邑俾有爵於國冕弁裳衣俾有列于朝賞之所延其澤甚逺盍思之今吾所事之君乃吾先正所事之君其子孫也今吾所使之民亦吾先正所使之民亦其子孫也或忝其先為愧滋甚盡夙夜之志殫股肱之勤必也復有勲勞在乎王室聲名風節奕顯於世然後無愧於心有宋名臣諌大夫贈司徒田公以忠諌立徳事太宗真宗讜言勁節凛凛岌岌如秋霜夏日為朝廷獻替可否進退賢不肖剴切上章敷奏治道天下穆然底於隆平士大夫曰唐文皇以貞觀之盛為鄭魏公勸行仁義之效淳化咸平之治亦繇公忠諌之力雖不登庸丞弼而嘉謨嘉猷惠于生民固足以為一代賢臣矣廌聞薦紳先生論國朝人物以謂有古遺直之風必以公為稱首竊嘗欣慕焉嵗丁丑自箕隗將適呉粤税駕荆州獲從公之曽孫世徳游世徳新作南堂謂廌曰臧孫逹所以有後於魯者以其君違不㤀諌之以徳也衍生世晩不逮事大王父而餘慶所被幸有位於朝惟是臣子之職不敢不勉蚤夜汲汲冀弗為門户羞又期我後之人必紹前躅故名是堂曰濟美誠欲如十六族之才能世濟其美不隕其名也廌曰元凱之賢非唐虞之世亦未必能成其功何哉異時功臣之世豈皆泯滅無聞苟非逢年遇合則自欲振起厥路無由深可太息况夫自求禍自速辜除其國圯其族轘其軀醢其肉鬼無血食家無炊火者乎今聖神在御孝治之化形于四海其於名卿之裔方且求是似之實而左右之以舉象賢之典世徳乃能飭戒砥礪欲世世承承濟司徒公之美於無窮則君臣之義篤於朝子孫之孝行於家顧不韙哉愚故曰天下治安世臣之裔能踐修先烈以世其家太平之盛節也合翠亭記王城之曲介汴渠有道稍南出金明背歴朱庶人之圃又西雖間有林亭沼沚皆樸􅈪沮洳不足以發翛然之興獨故將軍楊氏之僧居其北岡喬林蓊鬱蔽虧雲霄望之若不可通迹以登也乃于雜花香草中得㣲徑委蛇繞岡址以升遂于岡之巔得髙亭在喬林蓊鬱中無復見日惟蒼檜樛枝翳靡紛披使人㤀懐逺想如在䆳谷之巖上左右煙壑濃翠皆合不復知為市朝人也市朝之人連甍接㕓肩摩轂擊求息一木之隂不可得或有登兹亭者而復有吾今日之想乎元祐五年四月十三日與鄧程仲常陳至端誠同游飲酒賦詩于亭上二友請予名之因為記云唐州比陽縣新學記待民以厚可以化薄待民以薄無復歸厚古之君子將臨其民也必敬之愛之以謂皆賢人君子安吾之教令而同期於治其心既平其恕既廣其民心親而化其道借有不若者惟有哀矜而不憎怨不忍陷之於辟聽其自遷於善於是雖有偷薄可變於厚蓋所以待之者主於厚之也若乃將臨其民先儲威怒之意欲嚴刑峻法以刈制之故其忮惡忿恚之心無所徃而不逢民固不勝愈趨於薄然其政亦勞蹙而無成欲以求治不亦悖乎蓋所以待之者主於薄之也吾聞唐泌之墟五方之民聚焉先是守宰鄙其習俗厖駁一切劘之以威元豐間今翰林蜀公范公之守唐也其僚曰是邦冦攘嵗比滋繁願奏于朝治以重法范公曰吁何期吾民之薄也子姑俟之吾厚之以忠信彼當自愛我曽未閲嵗壄民無警囹圄遂空乃大興學校又從而教字之范公之徳其澤逺矣唐之士民獨憾屬縣大夫未有以范公之心為心者也其後十年吾友師文來比陽慨然有厚民之意率之以躬待之以誠鋤强扶弱主以豈弟威孚交加殊有古者循吏之風師文曰吾今之政足以靖一時未足以移易舊俗欲此邦之人囘心嚮道温温穆穆一變為孝秀之行其惟養之以學校乎顧吾邑鄉校摧圮已久肄習無所而營繕有制勿能復興之奈何邑之士民皆曰以大夫之賢猶能立祠植碑以頌遺愛况興黌舍以教養吾類乎異時奉釋老媚鬼神猶且殫力况孔子之宫乎乃胥勸胥傚相地基遂鳩工集材惟恐後時祠殿廊廡翼翼耽耽游於斯者藹然有慕仁義之心肅然有尊道徳之意况講習於斯弦誦於斯發聖賢之藴窮天人之奥以為揚名顯親崇功廣業之徒哉師文之澤是亦終不可諼也嗚呼古者家有塾黨有庠術有序國有學蓋地無小大以學校為本人無卑髙以教養為職後世學校不修其有以夫以為無損益於功利曽不若簿書期㑹可取善最飾厨傳稱過客可市名譽至於望之以長育人材則曰是君相之職何敢擅焉故倚仗承襲茍且成風以學校為心而欲孝秀之盛非俗吏之用心也余喜師文之徳教孚於比陽而嘉比陽之士民安於師文之徳教於是乎書以詔後人師文名譽姓閻氏材氣剛偉智識明敏好學有文擢進士第所治有聲少以勛名自任薦紳先生皆許以為國器比陽之治此其試也元祐五年八月初九日記登封縣令廳盡心堂記一人之心與夫千萬人之心先民之心與夫後世之心聖人之心與夫愚夫愚婦之心其所以然不然可不可者無或有異有社稷人民之寄欲設教布政而願治者能盡其心使人人之心皆以為然以為可則天下之理無徃而不當天下之情無徃而不通誠能奉之以悃愊之誠持之以黽勉之力思其理之所在必使之無遺藴慮其事之所安必使之無遺策自謂吾之心盡於是矣以之律身以之臨民以之事君以之事天地無愧無怍矣夫然後推之以及人其以為不然以為不可者乎陽翟管景文為登封大夫為政期月境内稱治吏畏威明民安教令迹其治効當得善最景文新作聽訟之堂取傳所謂刑者侀也侀者成也一成而不可變故君子盡心之説名之曰盡心可謂明慎欽恤而願治者歟民麗罪罟既陷刑辟桁楊狴犴之間徽纆箠楚之下彼不能盡心者或作聰明以自私於已或不事事而仰成於吏自私于已者徇其意之愛憎顧其身之利害所欲脱之則鑽毛出羽粉飾其詞所欲収之則洗垢求瘢傅置其議仰成於吏者不能知審克而信其舞文雖髙下其手而有所不察不能平反而縱其鬻獄惟貨惟來而有所不問以是而施刑於民俾罰之者自以為不寃奪之者没齒而無怨何可得乎然則知一成而不可變而盡其心非忠厚不茍有古昔長民之風者疇肯如是然君子之盡心何獨刑罰而已哉盡心以奉上守靖共正直之操盡心以馭下成豈弟和平之俗盡心以治賦府廪充牣無追胥之擾盡心以務農田野墾闢無愁歎之聲由是推而廣之至纎至悉心之所知皆為盡然而不治者未之有也景文之意以謂不惟其身當然後之為令者亦當然不惟為令者當然凡邑之有職事者亦當然不惟此邦當然凡有位於朝有職於官雖百執事小有司者亦當然於是屬贊皇李廌為之記郭宣徽祠堂記世之論將者難乎其人必曰制法審重如充國孔明料敵决勝如淮隂李靖撫愛慈祥如荀呉叔子威信著明如亷頗樂毅然後為全材繇古逮今世稱三郭焉曰唐代郭公元振汾陽王子儀我朝武衛上將軍贈雄武軍節度使司空公其人也忠義氣節勲勞聲望皆為一代宗臣然代國公歴中睿不綱之時仗節慷慨建西域之功汾陽王當藩鎮跋扈之際發身艱難定兩京之業司空公立治朝佐英主衛中國撫四夷在内則持本兵之柄以授廟筭在外則專師律之權以將天威論其世則有間矣公諱逵字仲通其先鉅鹿人少以天下之重自任沈鷙有謀博習羣書喜兵家之流學藝絶人慕范文正公仲淹而師之以故材氣成全有國士英雄之風興自小官致位二府更守八州六領方靣再為四路宣撫使自束髪從軍至於白首大小戰未嘗敗北從討保州一言降其衆授策古渭三戰㧞其城降下溪蠻彭仕羲以平湖北降武岡蠻楊昌透以平湖南移兵党羌則令征就禽問罪交趾則乾徳請命迹其戰多固已鮮儷其延安功烈尤著蓋力存綏州排沮姦謀撫育嵬名山招徠嚮化取李崇貴以復楊定之讎責薛宗道以屈党項之兵綏平之戰追犇出塞金湯之戰慶陽解圍神宗皇帝賜詔褒諭曰淵謀祕畧悉合事機有臣如此朕無西顧之憂矣延安之民于今受其賜天下知公與知兵者謂公持志守氣剛大充塞故臨機應變優㳺中節以全取勝百戰不殆然異時為將者常患乎上不為朝廷之見知下或無將吏之可用公被遇英祖神考顧問方畧虚已聽納言無不從雖總兵在外必遣近臣就議或設問目以咨之故謀行計施無或疑間選用偏禆置僚掾隨其器能付以事任南征西伐常以自隨故上下相安皆有成績用能保固封陲夾輔王室精神折衝萬里之外威聞所加莫不率服公嘗自謂吾雖為將仁徳多矣得太平良將之體至於奉使大遼刼之以威義不可奪全使臣之節守土臨民以學校農桑為先衎衎豈弟行循吏之實對揚庭論薦紳義其直奉親約已鄉閭敬其行華夷懐畏朝廷倚頼真天下之重臣也公逮事四朝周旋五紀龍光優渥士民宜之由侍衛馬歩軍殿前三司入拜檢校太保簽書樞密院事進宣徽院使檢校太尉更静難武信兩鎮節度觀察留後封天水郡開國公洎得罪安南屏居洛汭復領方鎮即堅辭告老以上將軍得謝於家雍容進退以功名始終賢哉元祐三年十二月十有四日薨於嘉慶里第之正寢享年六十有七訃聞天子輟視朝一日天下之人聞公之䘮識與不識皆咨嗟憤涕若悼李廣且惜其不果再用也初公之延安上旌其功勑建寺於先壠賜名資忠報本禪院紹聖三年公之子忠孝等作堂於其中繪公像以祠之屬其友陽翟李廌為記廌嘗觀王翦請田宅自汙彼以秦皇猜忍故為全身逺害之計霍去病辭治第欲滅匃奴以漢武喜好徇黷武窮兵之欲其於君臣之義蓋亦薄矣神宗皇帝寵公欲顯其親公事神宗皇帝能移其孝資忠於國則上有崇君父之義報本於家則下有以廣臣子之恩顧不美哉敬係之以銘曰天祐我宋克生人傑降畀大任俾輔鴻烈顯允郭公四朝老臣以仁為勇以徳為名乃登將壇乃佐樞極淵淵謨謀蹇蹇義直公在廟堂四圍兵寢公在疆埸天子奠枕錫賜佛祠時惟異恩非曰假寵惟以報勲於焉祀公益為顯親漢宣虎臣圖贊麟閣雲臺四七凌煙褒鄂公像在兹視古無怍圓圓故阡翼翼新廟邙山蒼蒼洛水浩浩玉闗諸戎朝貢之道北瞻九原稽顙膜拜猶當畏仰凛凛如在歸修臣職莫犯絶塞載在祀典與享大烝國有典常則徯寵靈詔乃後人盍觀此銘斑衣寮記蜀陳氏築第葉邑公允於第中南廡治小室為燕息之所謂客李廌曰吾三兄一弟皆宦學於四方吾獨安閑于家嵗時伏臘薦酒醴羔豚為母夫人夀日率子弟家人輩嬉於寢門暇則退休於兹自謂有老萊子斑衣之樂岸巾曵屨遡風于門笛一弄酒一斟邀明月而對之醉則偃仰是中吾不知天壤間復有樂於此者乎曰人子之樂無樂於奉親奉親之樂無樂於安鄉里居處舊廬而仰於先疇百須不外索而具雖君之兄弟仕於朝廷者游於庠序者亦有去家違親之累豈若君常燕休於斯耶天下之患患在乎有求無求則無得失無得失則無欣戚無欣戚則泰然而樂全况君之樂樂於奉親乎請以斑衣名之大觀二年十有二月二日贊皇李廌方叔記墓誌李母王氏墓誌銘廌少不天嘗游寓東越吾叔曰吾兄有志不就其孤過時不學則為門户羞乃具舟楫渉江湖躬至句章趣廌還長洲教字于家叔母王視遇廌甚慈撫憐顧復意恩周悉叔父之子國器砥行立名為呉郡望士嘗語廌曰吾無弟汝無兄伯父之子猶父之子也日以義方訓切之故廌今也雖不肖然亦能讀書學文敢與士齒實有繇焉叔母其先京師人曽祖祖父皆以材武從事戎馬得官叔母年十有四嵗歸李氏時我祖父乾州使君新殁事祖母元暨伯父居士能盡為婦之道蓋吾家自唐以家法名世非禮法之族莫敢通姻兄弟相承娣姒相賓率用法度家廟日饗俎豆如事生諸奉祭祀者冠帯簪帨不敢去身而又伯父律下嚴忌繩已亦切或小有過差則自箠於廟諸弟及其婦相與請罪乃許改事即出大鼎於庭命之曰斯鼎也一人扛之則莫舉衆人共之則甚輕治家亦然衆心同力乃有成爾於是内外百口肅然無譁然諸婦憚勞行之頗艱惟叔母奉以周旋始終無懈族人賢之叔父既居呉復以家法御其下家亦整治雖食貧索居昏嫁䘮葬必用舊儀蓋其性安于禮白首不變晚玩佛書能知大義屬纊之際心識了然時元祐六年七月六日也享年六十有八嗚呼昔者伯父之孫彧始生而母卒叔母鞠乳之以迄長大及進士第嘗分禄以奉之廌方兹應舉覔官求比於彧而叔母下世嗚呼其敢㤀乎叔父諱某生一男子曰逺乃國器兄也孫三人曰彦發舉進士好學有立志曰彦同曰彦逹孫女一嫁進士馬友直以元祐某年月日葬于蘇州長洲縣陳公鄉祔叔父之塋銘曰李肇贊皇昔我貳卿自彼陽穀朅來闗中古鄭南郭里宅協卜爰有幽谷松檟茂拱于山之麓念我使君以及諸父丙甲地蹙惟㓜孫廌夙夜疚念風櫛雨沐鄉曰將相里曰勲賢水惟檀谷元祐丙寅改徙東阡從者十六下逮諸殤祔焉罔遺墳墓遂族惟我叔父寓葬于呉留位候復既弗復止今我叔母抑又葬止佳城東西各天一方相望萬里魂氣游止無不之矣骨肉乃在于此
