body:
  text: 濟南集卷一宋李豸撰四言古詩月巖齊詩南山之北北山之南環岡繞嶺紫翠相參奔騰蹲蹴萬里䮝驂丘衍沃若靈秀所涵平巒蔽虧餞日西崦月生大東錯落夕嵐凝輝萬壑澄若淵潭有窶人室架楹維三其名實佳佳哉月巖窶人者何贊皇之黔伊誰名之宗伯子瞻嗟嗟窶人天民之淹昔也方將愚妄所漸喜功好名虎穴屢探輪殷緌墮却戰猶酣老不及人綿力弗堪飲冰食蘗處約已甘天匪靳豫事有莫兼俾豫有知錫福則亷餘齡數竒展也不占異時著書雖俟桓談心勞用寡逺愧周聃今師農圃穮蓘崇芟年登嵗樂糠稗求饜褐寬緼敝懷此不貪門子之責責我丁男我居區中如繭之蠶身外餘地烏用沉潛逝將掃迹於焉養恬披風遡景玩目嵌巉彼無獻嘲居之不慙五言古詩觀出日蒼崖觀出日依稀自扶桑初如浴咸池蒼蒼或凉凉漸若賓𤾉谷赫赫復煌煌海濵升霞彩貫地萬丈長攝提御天衢一照明萬方不願發五色不必呈九光無用現重輪無貴珥青黃吾心願吾君盛德如朝陽照臨冒下土威名燭無疆不復迭而微常進熾而昌蟻行理雖切丸跳比亦狂病夫喜壯觀蓬心遂恢張異時環堵宫但見生東牆宿峻極中院晨游開母祠暮抵紫虛谷千峯掛夕陽猶指中寺宿山空無人聲暝色滿草木亂石礙饑馬荒榛走驚鹿深林怪禽號絶壑山鬼哭照塗藉流螢呻吟愧僮僕乙夜扣禪扉孤燈耿幽緑猶疑夢寐中對榻眠空屋丙子嵗三月十有二日遊嵩山宿峻極中院時天氣清朗山月甚明因以隂壑生虛籟月林散清影為韻詩各六句陽崖轉窅窕層林蔽重隂披榛過輿馬緣雲得幽尋坐覺真境寂兹焉悟賞心平時峥嶸想局蹐在城郭言登諸峯勝幽情散寥廓焉能乘海桴終期老丘壑日背西嶺沒月嚮東嶺生殷霞未隱彩皓露已舒明斗柄坐可挹政恐河漢傾微雲起前礎出山忽紆餘風吹去何之間意滿太虛倚柱聊目送我生何滯愚廛居倦喧卑區中憎狹隘游目宇宙間山河真礪帶一嘯萬林端呼風作天籟風回荔蘿香意與塵氣别杳杳雲際鐘皎皎松上月觸焉感幽處䗶屐俟明發隂磴頑雪積老崖白雲深捫蘿陟鳥道揚塵落喬林下方有粟場俯見歸飛禽舍鞅陟層巘老步獨多歎笑談谷傳響松聲遞蕭散欲尋草堂池土室無僧贊松風憩俗駕撫心愧營營登臨念勝土烏用千載名願與婦子俱終焉住神清穿雲上虛無仿佛凌倒景微茫鴻鵠背指㸃衆山頂出日上扶桑徘徊萬林影西郊黃花作秋色槁莢作秋聲殘春有秋意奈此惻惻情喬木㸃新翠古壠集飄英午風薰徑草麥浪搖新晴脂車逐勝士訪友來西坰苦汗泣瘦馬流塵汙華纓囅然發孤笑屢醉輒屢醒聊歌干旄篇愧我未登瀛觀文恪王公樂道院巽亭在城上下臨潩水氤氲蟠巽隅峥嶸干斗魁蕪城佳氣𬗟茂林朱檻開竹月靜䕃扄松風緑搖杯開軒清流度隱几遙山來恪公昔優游弭節此裴回言念平生容翻然九泉哀張老頌趙寢雍門悲孟臺歌榭奄凝塵燕閣鬱生苔侈靡一轉盼金碧復成埃獨無不忘者安用爾為哉恪公古遺直徑氣騰九垓豈惟甘棠愛公嘗守許將與故國偕傳家有元凱上客盡鄒枚聊興勝士想愧無能賦才釣渚詩釣渚平過水筆溪清見底寒煙曉冥冥白石明齒齒目送歸鴻飛游心志鱣鮪手應心不疑物我相諾唯黃雀漫多驚白鷗來自喜之子未投竿我來頻洗耳盧巖徴君邈已逺舊隱鎖雲扄欲知敬遺德巖以姓為名永言配此山千嵗為德星雖無猿鶴在空餘泉石清想昔居此地笑傲輕冠纓入居伯夷室出效子真耕種德如古人養育逹周京惟能抱永正是豈其用卿黃楊林詩黃楊性堅貞枝葉亦剛願三十六旬久增生但方寸今何成修林左右映煙蔓良材豈一二所期先愈鈍臨溪檜青青弱草隂猶能䕃寒魚况乃葱蒨色百尺映扶疏月烟含清曠水氣相吹噓忽思大明宫垂楊拂丹渠豈無蒼翠色飄颻映茅廬日暮生幽寒寂寞意何如天封觀將軍柏衛懿恃昌富乘軒鶴有祿貴鶴賤用民身殘國顛覆楚子惜名馬終焉葬人腹爵封東山松侯比渭川竹時輕官秩紊辟妄作威福無益害有益褒賞逮禽畜所美非美然恩澤及草木或譏將軍柏無乃狃此俗曷膺千鍾養曷被三品服不為朝廷力竊號委空谷余知將軍心非悅世人目千年抱貞操徑節無屈曲不為嵗寒凋守此萬仭緑天武纍此名冥不知寵辱雖不助柏敬豈意慕軫轂吾儕之小人悟主惟欲速盜功仍茍容豈恥無道穀潭潭居紫府沉沉據華屋貪恩謀子孫占俸及僮僕膏肓病天下天下思食肉朝為四輔重莫作三危逐笙簫金谷宴翣柳北邙哭尚方屬鏤賜朝服東市戮君看古功臣牖下死為祝將軍如有心應笑世愈蹙拔萃真不羣虛名豈其欲胡不觀其旁滿山皆朴􅈪鳯凰臺舜韶奏九成鳯凰故來儀漢徹方秦政何乃誤至斯爾非雞與鶩出處當慎時送霍子侔還都真人造區夏民瘼傒以蘇戎衣振不格力舉覆地盂桓桓神武威自信人未孚當年羣嘯聚劔立猶稱孤天旋地機轉曠谷吹塤竽曈曈東方日揚光扶桑隅文明燭無疆煌煌中天衢曽孫太平君稽古追唐虞求賢用吉士隱淪來真儒股肱協帝躬腹心懷良圖庶事正潔矩嘉言規典謨欲將醍醐酪沾濯瘍垢膚又慮天下事學古太殊塗衆說折聖經丹青久將渝世稱淵華者春秋華實敷考之篤誠諶熒熠皆穿窬况復口耳學擲埴冥索途終身不知道死矣如蟪蛄無心時雨化蠲逖狂狷迂法言立定論章章如璠瑜專經務篤實使士知所趨欲皆抱道義如孔丘之徒士各重良貴豈若乘風鳬亦有倔彊輩索足行深涂如經風過耳不美七尺軀斯人雖云存衆昧不容誅振振文風聲得與帝載俱先生住毗陵才望振國都時方尚雕蟲如紫色奪朱獨專性命學已與衆欲殊窮年志專一立節如仲舒幾年困禮闈輿議久已需錦衾爛絺帷羈絆縻於莵滿衣京洛塵馬病僕亦痡前年彤庭下射策關雕弧如何扛鼎力不勝舉匹雛官卑府參軍知命安嗚呼青雲有伯樂俯識千里駒鋒斷吹毛羽氣節凌轆轤究之性天遺溟海不可㪺遂言黼座前此材誠楠楰方今搆大厦不可同朽株嘉言沃宸衷頓首帝曰俞汝其姑試之育士師東吳東州士氣懦徑草惟蓬蔞循循教不倦啓發親持扶義方逹逺邇來學皆奔驅瑞鳯止美竹飛翔鳴髙梧賢哉師道尊丘軻居魯邾巍巍數仭牆深邃不可踰宗廟百官富不見空跿跔三年就傅訓弦誦惟歌歈或謂我自然孰知如蒲盧濟濟榛楛茂皇州忽云徂士民惜其去夾轂爭挽軥老叟遮道留實篚携漿壺謂言感恩惠成我妻與孥去矣不忍還望塵猶歡呼嘗聞有美玉不琢鄰碔砆美質逄利器欲切惟錕鋘子時才力薄治邑民歡娛季路在大國止可治轉輸古有孟公綽知宏才有餘優于趙魏老不可為大夫皇皇魯聖人道困將乘桴才單敢兼人道蹇罹罿罦先生天與才貫溟包五湖昔否今已亨天扉有携揄行行近清祕召見延英廬一言悟眀主欽哉帝云吁朕方在潁邸鄉譽時已憮何其數年間下國猶劬劬朕意在教育如芑生新畬往惟教東邦朝野多美譽往矣勤勿怠潔白相連茹或然何其嘉宿憤得以攄上茍膺寵光不日升朝裾待詔金鑾殿著書文石渠不見潁隂叟拖紳腰金魚河湟少年將五載登台樞鹿門寺蓬萊鹿門道莽莽漢津渡川塗兩𬗟邈今古同此路德公厭州里翁媪是中去風流可引想千載豹隱霧浩然繞城歸羸馬琢妙句宿草被荒丘寒榛軼驚兔昔我懷登臨嵗晏屬凝沍兹遊愜于願春仲忽云暮杖策升翠麓喟歎憐老步冠雲得危亭臨世濯凡趣蒿薺俯青林繡繪辨紅樹他山照寸碧迂江泫晞露我生老憂患胸次貯百慮寓目宇宙間猛省忘外慕前瞻萬松嶺翠壁屹相顧輕飈觸纎柯虛籟森已度甓道繞危巔爽氣襲籃輿傳聞古道場臺殿若鱗布日者一昔灾楹棟皆若炬壞垣積煨燼况乃金碧處山僧勤朴斫堂構略已具童奴一萬指役作供指呼當有鬼運閘變現助持護蹇豫藏史後道骨天所付一為功名想誤落塵土汚華顛髮先縞黧靣顔色故惟有炯炯心從昔常自悟㑹當借巖谷投老寄冠屨吹雲飯青精煮石羮白芋神遊八極表諷誦大人賦鵾鵬或圖南為豫閬風御四逸臺異時常獨飲對月成三人已喜三士遊况遇金城辛洧淵俯龍室廢臺干白雲委徑已就荒九仭將遂湮飄然如四鶴躡屐披荆榛北岡翻波濤南岫列嶙峋登臺與佳名大筆書蒼珉占此泉石清坐使草木春諸公廊廟材我期兹隱淪關侯廟三方各虎踞猛將皆成羣屹然萬人敵惟髯稱絶倫仗節氣蓋世橫矟勇冠軍艱難戎馬間感慨竹帛勛鳯闕控蠻楚廟食漢江濆神遊舊戰地庭樹起黃雲白馬寺詩湠漫漢江臯迤邐楚山岫衡門掩半麓飛甍聳層搆髙林敞華榱雙泉逗瑶甃龜魚水中坻牛馬飲殘溜我卜關外居此計春可就參差菱荇香猗儺參术秀行吟池上篇來倒壺中酎墨池臨池苦學書池水為變色終朝坐忘疲掩卷每自得滋靈蚌孕貴飫餌魚腹溢回堂映茂草𤣥源潄白石祗恐驪龍飛蜿蜒上丹極伍子胥廟烈士可廟食么麼可悲夫誓心報荆郢忍恥適江吳功成期牖下旋聞賜屬鏤楚邦乃怨耦宿憤嚮已攄濤江厭波神魂魄遊故都存亡兩陳迹無用愧包胥題廟築巖傅胥靡耕野萃老農倏來坐廟堂談笑樹竒功卯金運徂謝孔明隱隆中誰言一丘壑卧此夭矯龍古來王佐才中間千載空之人輔𤣥德真有宰相風惜哉小用之功烈不復東嚮非三顧重白首田舍翁華嚴庵人生奧區中猶如繭中蠶欲窮無然心足力有不堪終南有五虎銜牙坐耽耽乃有忘軀人臨穴巳擬探干將古寶劍吹毛可揮䤴亦有躁戾者執刃求其鐔所得計所傷膽潰心憂惔况夫愛見魔悅如芻豢甘大士獨了然白月沉珠潭獨造無僮僕妙理去二三至哉天下樂端默坐草庵岑使君牧襄陽受代還朝某同趙德麟謝公定潘仲寶皆餞於八疊驛酒中以西王母所謂山川悠逺白雲自出相期不老尚能復來各人分四字為韻以送之某分得相期不老使臣撫南夏萬夫久以望道粹韻宇勝德滿聲譽香炳然龍虎文瑑此金玉相笑談府中居無為民自康我生世寡與所幸賢者知徽中山川意賞音有鍾期荆楚非我里從公甘棲遲今兹復舍去何以紓吾悲閭閻無居人傾城餞賢守擁車不得前遮拜奉巵酒民言荷恩勤拊育踰父母公不鄙我邦端能再來不公如照乘珠居朝作賢寶公如三秀芝後天錫難老聿歸供奉班漆簡探幽討懸應念傖父滄洲濯蘋藻劉表廟入自東郭門言拜景升墓墓樹半枯槎冥冥立晨霧鼎國昔未分蕭牆梗天步呼蒼復何用龍卧獨不顧紆餘檀溪水黯慘蔡州路登樓欲遣憂君看仲宣賦故諌議大夫鮮于公欲作新堂以傳世譜名曰卓絶唐人鮮于世譜有卓絶之語故云內相先生題其名曰蜀鮮于氏卓絶之堂某以此八字為韻作八詩蓋鮮于公頃嘗俾某賦之而三子以求其詩故原其古而美其今以頌美之商朝有仁人為奴恥榮祿九疇傳帝祕八教清濊俗苖裔散諸華慶澤鍾左蜀峥嶸多望人冠冕稱盛族左蜀富山水錦屏秀而鮮卿雲常氤氲佳氣所盤旋藴此天地靈並生文武賢稱忠著甲令節制控兩川天地西設險劔外分野殊君家萬里侯支郡許專誅威名讋華夷玉帛走易于韡韡常棣華煌煌駟馬車功髙翊戴重錫土仍命氏蟬冕舊傳家龍衮式增賁誰云五世澤久襲萬鍾貴非惟賴先慶奕葉藝忠義隱居嗣徽猷超世得古學行藏合用舍聞見守約卓清風激頽波精義興後覺天子不得臣鴻飛敻何邈先生王佐材蚤嵗常數竒平生經綸志白首初逄時經營此堂久乞身竚歸期堂成不及登魂氣今何之諸孤皆妙禀况乃承義方世濟商人美各是萬夫望拳拳奉先志誅茆建崇堂豈徒輪奐美卓絶當未央吾觀孔父鼎知有名世哲英英大諌公克世嗣前烈翺翔金鑾坡白首貫忠節後昆有斯人譜系愈卓絶趙玿赴成都府廣都縣尉以送君南浦傷如之何為韻送之作八首吾生常羇旅送客情更重嗟哉平生交今復萬里送愁端寓心目往感接魂夢窮途獨栖遲直道竟何用山河接巴徼關塞斷秦雲誰為萬里侯節制錦江濆彊項毋狥指曲鈎難致君勿因朝廷逺俯首俗吏羣昔余旅長洲寄傲碧江潭十年客風埃留滯困周南冉冉老將至兀兀漫窮探故人各變化漂零空自慙之子才如冰不應常負弩勿為為貧謀一意在阿堵廣都綺縠地當念珠還浦惟亷可立身勿使嗟供虜蜀人以東人為虜貨而歸翔風走塵沙草樹正𤣥黃煙昏路漫漫日冷雲蒼蒼杜公作詩處武侯近戰場陳迹勿驚心俯仰已堪傷蜀都藴竒氣古今生英儒歌童選何武狗監獻相如煌煌直金馬藹藹侍玉除歸入藝香閣無廢五車書傾城愛徑竹古士惟徽之而我獨愛君不見即相思今矧萬里游動為三嵗期索居念金蘭惘然傷别離蜀山如鳥道劔閣鬱嵳峩嗟君正朱顔奈此艱險何秋雨峨眉道春風濯錦波青山一羸馬古今應更多秋日雜興悠悠東郭道莽莽四海志晨光晞髙林泫露泣征轡巨防揚淥漪哀泉赴橫衛我生窘羈束感歎撫消髀青青陌上草秋徂故應省疾風試飄葉寒露猶湛潁冰霜來無時爾命詎堅永滋蕃奈爾何咄咄臨此景昔喜馬少游我馬仍欵假古云末路難百里九十半與爾皆調饑欲速輒愈緩長鳴徒勞爾終愧籋雲汗黍稷競登場荏菽復滿疇我羮雖不糝逄年亦解憂太平豈無象樂嵗觀有秋敢期飽糠核役車何當休秬黍亘廣隰整整萬戈矛旌旄亂風葉森森疑戰秋如聞髙奴塞將軍用世侯勝算應在目願解西顧憂范德孺之延塞芡珠乃籩實雞首真溪毛芥羽復丹幘凌波競將號蒼啄勝𤣥蚝百琲轉含桃驪頷有照乘海夫得應勞搖搖平岡雪芬薌蕎花白繁英未脫鄂鋭實已潛黑速哉不踰時幾何天地力寒耕暑方耘古人勤宿麥橫烟下平林間雲依袤嶺寓想髙鴻背游目凌倒景吁嗟老于行末路未遑騁晚嵗竟如何三歎心耿耿汝華巖秀法華居之夜夜聞山鬼打更道人居此巖誦經嵗云久鬼神夜護持空巖擊刁斗吁嗟已成塵藤蘿穿石牖與鄒浩志完㑹於王希聖家因話毗陵事是夕輒夢還松陵因述夢呈志完客夢還松陵寒江渺煙雨異時醉吟地依然記洲渚三髙平生歡倣佛遞賓主十年扁舟興一夕暫容與此樂曽未央覆瓿俄驚鼠隙月鑑我帷破窗風自語展轉誰晤言僮𨽻聊爾汝吾生獨何事寤寐仍羇旅送杭州使君蘇內相先生某用先生舊詩方丈仙人出渺茫髙情猶愛水雲鄉為韻作古詩十四首至人本無我與世初無方彊從金鑾游聊用示行藏忠清秉全德日月可爭光振衣千載上臨世濯滄浪至人孰可測跨世富英量千齡遘治運萬古真遐想三台接布武萬乘拱函丈辭榮明光殿乞身青天上世人期公淺云是真謫仙願公老台鼎白首冠貂蟬為之乃固有弗為愈知賢清風不可挹髙髙薄雲天紛紛競干祿汩汩第謀身先生獨任重憂道仍憂民精誠貫白日孤忠橫北辰求之千載上古亦鮮若人平生史鰌直往嵗展禽黜青衫竄長沙華鬢謁宣室重光照八極命世真賢出奈何江湖去獨為蒼生恤道德富瀛海百谷輸浩渺雲夢吞什伯坐映黃陂小斯文再炳蔚精義凌縹眇典謨追灝噩協氣充四表周公非汲汲仲尼豈皇皇吾道無若人孰能相維綱古今異倫軌英風自相望下民今喁喁造物太茫茫造物雖茫茫至人自囂囂雖稽具瞻意欲全千仭髙富貴一敝屣功名兩鴻毛獨知退為樂可憐夸者勞公去吾道辱公來吾道榮生民繫休戚國勢隨重輕先生如九鼎坐折姦宄萌天如欲平治用舍若為情先生如蓍龜萬事可告猶勳業輕黃屋得賢方解憂念昔彚征日民瘼庶有瘳莫賦歸去來衮衣或能留吳越控島夷東南一都㑹淫風舊倡靡懦俗無慷慨除弊在躬行報政可立待類非俗吏能千齡樹遺愛邇臣均勞逸方靣乃毗倚細人怙權寵補外習為恥餘杭股肱郡湖山真信美意雅如望之肯效倪若水小人雖嗜學嵗月空屢勤同門盡鴛鸞登瀛校書藝嗟余老西河索居久離羣從龍從上下愧彼油油雲四海李元禮龍門多俊良英英郭有道一揖遂生光畫鷁凌雲波仙舟水雲鄉此心徒皎皎千里共蒼蒼雨中宿超化寺暴雨如建瓴龍淵俄怒流逸哉我三士冒雨探竒幽古寺浮積壤危若萍與漚抱憂窮樂事斗酒聊重留遊超化寺常笑博望侯老死窮河源河源幾萬里天派垂崑崙支流播九逆砥柱疏三門行穿九地折怒溢千里奔樂彼洧水源近且具茨根寒泉發清池藻鑑撓不渾引為琉璃陂碧波媚蘋蘩逶迤入王城順下德可溫全此上善性利用豈無恩下有萬艘濟旁列千夫屯持此安且靜用鑑暴與昏頃年時聞龍淵室今應存秉蕑俗何陋濟輿惠亦煩誰知千載後佛宫枕溪濆喬木上參天緑竹盈短垣曽此埒金谷神龍依祗園物理自古今興廢復何言聊思鄭國僑殊勝漢張騫木文真人章聖朝合州進到其事甚怪至京其木中人呼萬嵗者三詔賜崇福宫犀視月通角蟬想丸目入果裸祝螟􅘾天風化隂鶂物變知品殊尚可易形質真人友造化故與物為一持此誠與神可貫金與石何為輒入木厭世未肯出衣冠儼如生隱若陸顧筆非同木居士聾俗競禳祓又非羅公逺戲隱逞幻術疑是青羊老合江聊示迹薄游附驛車靈宫居二室西丘西丘對秋風蕭颯如原隰木落景扶疏碧環天壁立餘霞拂暮散夕鳥寒更急獨有松上鶴不為鸚鵡粒豸葺介堂元聿作詩某次韻吾生一漂梗觸焉泊東周十年歎流滯吞默垂逺猷胸中猶汪陂萬頃蟠一甌輿羽欺鎰金寸木傲岑樓圖南平生志腐鼠詎能留寸心徒自憞雙鬢颯先秋物理有否泰奚為久休囚尚愛東方朔處汙能若浮悲鳴非不切嵗月老驊騮莫笑掃一室吾心若虛舟㑹當掃天下歸老卧滄洲百葉梅寒香本巳清真色初既好誰私化工力增綴愈姸巧繁葩貯春意幽姿照青昊獨無和羮實終應愧其表夫人城庸將昧竒正乘鄣罕書勛我登夫人城想見畚鍤勤攻瑕既遇堅坐制烏合羣異時古烈婦鮮以智勇聞褒稱勵愚懦敢諷賢令君作傳續烈女逺紹子政文壁間畫葆羽俾如娘子軍次和答張誾寄靈夀杖我生職貧病壯齡俄早衰朱顔不少貸白髮太先期故人獨閔余逺寄靈夀枝老景知有賴醒醉為扶持憶吾廬繆挾經世策蚤衰甘湮淪吾廬有佳趣一㕓良可親茂林修竹地青山白雲人塵埃付捷徑風波委要津吾心如皎日外物任浮雲久厭牛馬走欲令鷗鷺馴嵗月既荏苒功名定因循執鞭吾弗能得乘豈所欣畎畝樂可必糟糠奚用勤泥龜喜曵尾生芻恥屢陳束濕雖有術末路復誰因願為海底泥肯羡山上塵谷隱飲中以采菱渡頭風起策杖村西日斜為韻探得采頭二字東西南北人志向各有在一言契所適糾纒胡可解英英坐上客聲聞著寰海婆娑諸侯邦未去亮天縡顧余寸有長葑菲誤見采山空佛宫冷秉燭集飛蓋笑歌觸松風出谷作天籟後夜風雨時惟應鬼神㑹山川納商氣凛凛天地秋草木將𤣥黃詎肯烏我頭蚤嵗謬懷璧轗轍欲周富貴來無期舍鞅息林丘復棄農圃業為兹山水游來尋彌天釋軟語忘百憂夜傾雙玉壺禪詼互相酬試澆磈磊胸洗我千斛愁㑹居易齊分韻君子何樂胥清夜以文㑹篇章各紛拏錦組貫珠貝高談生清風石齒潄湍瀨安得樓蘭肉充庖餘炙膾啓母廟帝武啓宗周元鳥濬哲商塗山配神禹獨不嗣娀姜異時天與賢嗣子繄匪良欲肇天與子是用開厥祥鈞臺享羣后有扈誅叛方誰令謳與訟帝畀有夏昌推此方朱均巍巍真令王伯陽指株李阿衡降空桑龍踞生漢祖龍漦誕褒娼石裂何足問世語多荒唐若比望夫山雖怪猶有光筆溪張生古狂夫草聖稱豪邁縱橫意有得野馬御風快醉醒忽驚神自以不可再乃知髙世能至理適有在况夫窮年華朝夕精㨂汰期兹筆溪水色變崑崙派施柏花佳花香藹藹老柏意蕭蕭如何蒼翠質許附繁柔條仙人踏錦障襯步武夷橋願託嵗寒心凌虛上煙霄偃柏名園氣虛闊怪柏獨凝偃髙枝翳浮雲翻然志飄逺赤松來何遲黃鶴去未返蘇武遊虜庭矜傲何蹇蹇朔風吹寒枝日暮羊在坂乃疑髙堅材獨得造化本蕭蕭古池上不與凡木混霹靂琴老桐初無異憔悴輩散木良材固自信終嵗委空谷孤根聽霜霰厥命寄樵牧雖云具宫徴誰意望琴筑天公憐寃憤霹靂驅怪伏蛟龍出蒼幹電火燃裂腹造物一愍弔為惠在反覆神馳變廢物瞻賞改舊目裂為君子琴日奏太古曲因知物興廢尚爾轉禍福志士抱孤操來者恍未卜壯年昧籌算奚用定榮辱
