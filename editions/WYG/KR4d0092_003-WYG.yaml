脅蜿蜒束吾櫓怒聲如雷雷火烈腥風鼓天天如霧我觀蛟龍等一戱衆面倉惶獨無怖平生忠信天自知死葬江魚未應悞須㬰水天碧鏡淨順風入帆風若御歴陽古岸艤荒亭寒雲澹澹依江樹江南山水天下竒更在江山竒險處朱門玉窻帯青嶂想見君家傍煙嶼我今西來二十年夢寐江南見幽趣夫君何為抱竒術輕去故鄉踏長路胷中秀氣未甘蟄欲繼君平齊季主術髙不肯等閑售惟喜遨逰卜卿輔爾來山郭坐空館憐我困窮為推數閲人多矣君自信歸去來兮余已悟少年飛動已知非老來憂患寜堪顧壮時猶愧不如人豈復衰殘彊馳騖儻來軒冕任去留縱有功名逼遲暮箕山之隂潁水湄二頃荒田安畎畝曲肱飲水吾自樂乗堅齒肥烏足慕吾生貧賤吾自知不解脅肩求貴富我如富貴當蚤得已可通侯封萬户惟有退身可自如造物哀憐應不拒扁舟常繫屋南溪㑹當乗興江南去胡為乎行贈丘公美吁嗟憧憧之民兮何終身不靈耶不能揮毫縻青天耀白日胡為乎布衣韋帶事讀書不能坐窮廬運籌算胡為乎騎馬試劍輕其軀項籍耻作百夫勇禹行舜趣猶賤儒憊乎四支愁五臟不能成功竟何如胡為乎直待臨老空嗟吁盍歸乎來盍歸乎來長橋繫白鯉擺尾向天台風流李北海雄望摩九垓長卿向窮時尚為臨卭咍北邙古墓空蒿萊胡為乎須上黄金臺趙德麟中秋生日中秋月風露凄清光倍潔皓氣澄霄萬象沉孤光散彩繁星滅中秋潮江海鯨波此日髙倒巻東溟蕩平陸逆撼九江翻怒濤治平初年嵗執徐越王國邸生英儒虎腰燕頷巖電目鳯凖犀顱氷雪膚九天月華為爽氣識照古今窺聖秘胷中洞逹不容塵􅉷似太華無滓濊浙江潮頭為駿聲名滿㝢縣髙崢嶸詞源落筆波濤動馮夷陽侯皆震驚裕陵求人如不足蒐選羣材起巖谷網羅英雄至四海晚獲天麟在王族除書令上芸香閣中秘校讎専筆削辭榮寜作卿寺僚外遷肯入諸侯幕人嗟官冷久淹囬我知觧養王佐才聖朝方欲相宗室黒頭作公坐三台年年特班謝明主寳床禮物來傍午兩軍戱伎候掖門馬首迎歸入公府我雖無能世或取尚可與君為詔語以古畫觀音易眉子石硯歌疇昔翰林蘇謫仙溪藤寫贈眉石篇先生頃于南京嘗寫此篇贈廌欲尋此硯副此什婺源煙水空茫然君家寳硯多竒石一一𤣥圭與蒼璧此硯初來衆硯疑厠居末品真可惜寳林大士千億身吾家古畫妙入神欲持吾畫易君硯庶幾速證西來因我持君硯復何為嵩山之陽潁水湄茹藜咀藿坐蓬蓽潄流枕石書新詩萬事推遷皆傳舍世間孰是常存者畫硯伊余􅂓税駕冽泉亭詩古井嵌空下如屋寒泉馥冽甘如飴昔人傳是龍蜃窟睡未千歳人不疑雲蒸每見飛靂火沉綆或惹髯間氂安得海奴秉犀炬乘月夜照窺端倪東湖詩翠荇弄水時出沒紫蓴浸滑涎蜿蜒川光遙接行潦前野氣空濶浮寒烟常思郢客解刺舡豈解乘槎上青天又思吾兒能測淵豈能奪得驪頷蠙上昇却回復入海只恐澄海為桑田對春二首半隂半晴惱亂我不禁春意惟殢春黄鶯丁寜舌初轉楊花輕盈來弄人東家鞦韆多美女舞腰娉婷衣金縷彩索徘徊漸漸髙墻頭見人羞欲住栁下誰家薄媚郎立馬昻頭不肯去一㸃兩㸃催花雨章臺走馬無塵土少年去老能幾時買笑金錢不須數髙陽酒徒多白髪長安佳妓今老嫗共君把酒莫厭多作意彊作青春主文章放行多氣焰筆畫把捉無精神願得神王如六通日寫萬巻酬青春某頃元祐三年春禮部不第䝉東坡先生送之以詩黄魯直諸公皆有和詩今年秋復下第將歸耕潁川輒次前韻上呈編史内翰先生及乞諸公一篇以榮林泉不勝幸甚半生虛老太平日一日不知人不識鬢毛斑斑黒無幾漸與布衣為一色平時功名衆所料數竒辜負師友責世為長物窮且忍靜看諸公樹勛徳欲持牛衣歸潁川結廬抱耒箕隗前祗將殘齡學農圃試問瀛洲紫府仙精思觀崔道士授劍栢中劍常吼若雷隂隂老栢森庭牖外脱中空若虚缶崔仙授劍栢遂神劍氣騰天劍聲吼頃年天師受丹訣此地精思嵗華久玉函金匱發靈崖因使隂符誣虎口張天師道陵得九丹之訣於崖下於此地精思累年然後得之云殿中真人道𤣥筆筆妙飛揚傳不朽霜髮羽人逢白叟間嵗巳聞踰九九神游八極吾所願道骨仙風愧無有欲賦大鵬思子微恐爾年齡亦為偶梁觀主八十三嵗張居士歌并序張居士名拱字輔之誠信孝謹之士昔遇異人以蒸棗七枚食之云餌此當終身不食拱始疑而漫食之果絶粒二年行步輕㨗神氣冲澈拱云欲不食則便可不食不問久近欲食則日可兼壯者之食五人亦未嘗飫也拱善醫世家京師龔章之甥龔夬之表兄也凡夫㝠㝠不知曉刼塵流浪如沙掃上天宫闕隔青雲九原壠墓空秋草神仙有意憐下土獨取颷車出三島張翁陋巷貧且賢簞餉瓢漿久懐寳羽客飛來自何所蓬蓽相迎笑相勞髙談妙理妙道本定是青牛度關老仙丹無形有真氣一視傳靈入凡棗聊分七棗遺張翁一餌云充千嵗飽張公不食今㡬年齒如兒童顔色好我聞神仙本無滓諸漏皆空體𤣥道姑射神人飲風露淮南鷄犬依丹竈真詮自然本簡易不在勞形勤補腦封山航海漫殫費葉衣草茹空枯槁况乃紛紛五濁世粒食火化常熱惱余苦風塵衰太早緑髪蒼蒼半𤣥縞青春堂堂暗中去常恐餘生似潢潦何當刀圭借殘齡相與神㳺超八表鍾山鐘延平雙劍朝豐城鍾山之鐘挾以行延平春浪拂天地左右兩龍雷火鳴建隆真人君八極河伯效珍寳鐘出不似汾睢發鼎光泛泛逆流浮萬鎰詔賜閶闔濯龍宫聲掩景陽聞九重吾聞此鐘亦神物獨肯寒溪就埋沒舞陽令祝樂天再任庚寅十月二十五曉分黒帝臨丹府怒來鞭掠玉麒麟下降英靈佐明主廬江從此生竒賢便是竒人祝樂天鼎沸絃歌一百里雙鳬舞水又三年部民共獻長生酒鸞鶴荘椿只依舊我詠蟠桃别有春何須更祝人間夀元祐六年夏自陽翟之睢陽迓翰林蘇公自杞放舟至宋發軔嵩麓背煙巖觧維水程仍二三杞邦想見舊風烈許邑自知誠子男天地憂懐真過計文獻不足良可慚放舟適未覯君子白頭終期老江潭擬楚詞并序段文饒道充蒲城人也訪余於京師時道充将歸隠於渭濱故作楚人之詞以勸其歸其詞曰匠執斤兮道周稱百尋以弗用兮谷之幽屈輪囷以為杯兮孰謂賢於杞柳揉吾性以矯真兮寜全夭以為夀樂吾樂兮樂不汝違樂不汝違兮盍歸乎來哉犀何尤兮以角累象何咎兮齒為烖童牛夭兮職騂剛而繭栗龜告猶以灼兆兮寜泥中以曵尾珠綴旒兮悔夜光不祥玉為圭瑞兮痛山輝之為殃樂吾樂兮樂不汝違樂不汝違兮盍歸乎來哉蘭九畹兮芬薌芝三秀兮焜煌山嵸嵸兮呈姿川溶溶兮摇光風駃駃兮歴楯雲繽繽兮度梁葯為衣兮薜為裳椒為醴兮桂為漿樂吾樂兮樂不汝違樂不汝違兮盍歸乎來哉嗟美人詞樞宻直學士劉公希道久遷於外元祐天子方欲大用於朝而公薨余心哀之故作嗟美人詞以弔之嗟美人兮何之撫千禩兮增悲咎司命之匪仁兮弗庇下民故嗇數於令人兮俾弗儷乎常期既闓端之引大復柅止而縶維仰天衢而願騁兮羗為惠之罔終嗟美人兮懐思閟靈修而自珍兮寜燕婉而倚巾彼鵜鴂之早鳴兮欲衆芳之隕衰亮汝懐之匪良兮喜佳卉之具腓靈芝遑恤汝以自芳兮亦三秀而呈姿候蟲呻吟而競秋兮熠燿夕飛而流光蚊角翼而虎噬兮或負岳而成雷俄嵗運之徂征兮復爾齡之㡬何彼大椿之先秋兮意松栢之後凋屬嵗寒之太甚兮雪霜窘而煩威春歸來兮𤾉谷温條風發兮百卉菲土泉閉兮崔嵬獨𤣥黄兮就萎委長年兮澗濱匠初顧兮弗辰感佳時兮嗟美人蜕遺榮兮上賓天我籲天兮九閽如可贖兮百身驪山歌案此詩從宋文鑑補載君門如天深九重君王如帝坐法宫人生難處是安穩何為來此驪山中􅃨道連雲接金闕樓觀隠隠横翠紅林深谷暗迷八駿朝東暮西勞六龍六龍西幸峩眉棧悲風便入華清院霓裳蕭散羽衣空麋鹿來逰墟市變我上朝元春半老滿地落花人不掃羯鼓樓髙掛夕陽長生殿古生青草可憐呉楚兩醯雞築臺未就巳堪悲長楊五柞漢幸免江都樓成隋自迷由來流連多喪德宴安鴆毒因奢惑三風十愆古所戒不必驪山可亡國觀呉正獻真案此詩從宋詩紀事補載次公不許畫麒麟孝宣妙選知名臣拜公之像想風度乃是雲臺子顔之文孫元豐天子建原廟玉宇萬棟臨端門累朝名臣儼冠劍列聖御坐開乾坤修廊祕殿鎻春色彷彿音容皆駿奔相君相業皆元元旂常彛鼎定書勛儀形在歿侍神考英氣噩噩凝天閽嗣皇方思服原闕美欲考辟公觀列文君傳兹圖落人世世人遂得知瑜璠吾知袁公固有後能平楚獄竟無寃召公甘棠猶不伐衛武之德誰能諼君不見温公之像滿人間願廣此圖令並傳
