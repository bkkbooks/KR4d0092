body:
  text: 濟南集巻三宋李廌撰七言古詩汝州王學士射弓行汝陽使君如孫武文章絶人喜軍旅要知談笑能治兵戯教紅粧樂營女白㲲新袍錦臂鞲條脱掛弓腰白羽綵錯旌旗照地明傍花暎柳陳部伍須㬰觀者如堵墻彷彿如臨矍相圃一人中的萬人呼絲管呶嘈間鉦鼓臂弓上為使君夀遍及四筵樂具舉使君一笑萬衆喜堂上酒行堂下舞錦叚銀荷翠玉鈿意氣揚揚皆自許儻令被甲執蛇矛恐可横行擒賛普大勝呉宫申令嚴兩隊宫娃啼且怖闔閭臺上呼罷休将軍雖賢亦觕鹵豈知使君不忘戰聊以戎容娛罇爼夕陽巻旗去翩翩使君要客登畫船美人不暇别粧洗戰士結束圍華筵皆疑征南漢将帥樓船下瀬方凱還軍中不應有女子偏禆校尉何其儇使君湖光照樓觀一碧不辨水與天漸看瞑色著疎柳已見白蘋浮暮煙銀漢斜横北斗淡明月碧玉疎星聨舟人罷唱時弄􅅇艇子趂魚行扣舷隔浦熒熒見漁火意中竹籬青斾懸雖無荻花與楓葉全似送客湓江壖亟令周娘作新曲周娘琵琶京洛傳不惜千呼與萬喚便時轉軸仍撥絃馮夷陽侯或靜聼穹龜大魚或後先且言白傅時落寞草草㑹遇仍嫣然使君聞名滿臺閣虎符熊軾􅂓周旋風流樂事雖可記皆過孫白二子前㑹看和戎竟先列鐵騎百萬臨三邊報功女樂賜二八粉白黛緑皆婵娟青雲乞身歸舊里汾城故地依林泉琵琶亭中望汝海無忘飲中今八仙題郭功甫詩巻山人跨魚天上來識者珍重愚者猜或呼文舉異童子林宗獨謂王佐材蚩蚩衆目如瞽矇白馬羽雪皆皚皚古有仁賢不愚者舉足㚄路心徘徊桐城明府住姑孰􅁭裾蕭灑天與才䜛言屢改耻自雪政事報成羞援媒臨川先生久知已十年執政居公台横飛後生盡豪俊徃徃扳越自草萊洪爐造化豈一端如何不與珽填坯盛朝能詩可屈指少師僕射蘇與梅少師新為地下客蘇梅骨化成塵灰金陵僕射今已老班班絲雪侵頥腮當今儒生迂此道如使杞柳為棬杯好古愛詩惟有君獨使筆力驚風雷清音繞齒嚼鳴玉爛光滿紙如瓊瑰古原夜燒光奪月立使萬物有灰煤清泉漱石白鑿鑿湍落急瀬成淵洄才雄句險駭人膽九月秋水灔澦堆有時清貞叩𤣥闗至誠直可歆郊禖公才頴栗公望異牢落下位命何乖豈無白虹夜貫斗猶使寳劍豐城埋㡬年令尉困下國板簡青衫趨郡堦猶将富貴委脱轂茍不知命安為懐竹溪逸人杜陵翁當年得意稱壮哉直言時病傲宫禁謂可立致青雲階公行孰避蹲草虎由徑不畏當路豺輸忠獻䇿恃才藻宰輔切齒全班排遂離黼座謫千里翻疑方直為禍胎杳如躡雲上幽頂文石嵲屼懸虛崖下視黒潭鰐魚窟山雨潤澤浮蒼苔臨危惴惴懼石隕况更歩滑粘青鞋上愬逄怒下見誚愠望寜與羣小偕秋江接天夜如練桂宫隠見瓊瑶臺泛舟夜披紫綺裘興發鼓枻傾金罍岸人疑是王子猷美女揶揄言謔諧滄浪水深波浪濶醉謂止可探一柴徜徉濯纓傲巨浸掬月不得翻委骸上皇雖悼屈平善千載乃得為朋儕秋霜何草不𤣥黄蜀山戍削青崔嵬馬如蹇驢不慣逺陟險色變成豗隤閣道繁霜曉成澌古壑暴雨飛隂霾散闗野哭夜悲怨倐見鬼燐明巖隈長蛇食象留齒骨猛虎噬人餘釧釵故人招庇豈惮逺軍謀宥宻惟参陪春雨霡霂興槁苗膏潤不及枯根荄正風寝熄雅頌廢吾言來自單于垓古今廄馬詎為匹驊騮駰駱駑與騋力良調俊惟騏驥李杜故得其梧魁前軰攀轅讓馳道下石夾轂謙爭推二公當年走聲價日月左運天旋囬方今明時廢聲律将使湮淪如燼煨非君鼓吹力主持是道不世将傾頽闗西鄙夫懐此憤白石空煉如女媧命違時否口常鈍如掛風鐸環堵齋安得獻言彤庭下出入金馬如臯枚秉鈞廟堂司惨舒建旌立節如張裴九齡説休度古云能詩多坎軻茍或信矣良可哀儻使文章敵天下再使神禹驅秦淮三月三日柳眼脱殻花将飛麥梢弄黄青穗肥鵓鴣翩翩避舟去燕泥悞落沾人衣樹外浮陽湖水渌漠漠不動含晴暉沙暖浴鳬遺翠羽岸深老蚌吐明璣黄河昔我初為入秦客殘雪埋闗閉長陌黄河二月凍初銷萬里凌澌流劔㦸西風細巻浪花催日射寒光明瑟瑟歸時細雨正溟濛冷落闗河已秋色驚沙惨惨塞雲黄逺樹昬昬秋水白濟川壮志愈衰遲日送煙波問河伯自陜州渡黄河歌流浪滄浪二十年三江五湖一釣船江神海若諳忠信此身常在蛟龍淵欲渡黄河濱小兒語相玩鯨鯢嗜人正饕餮忠信難憑彼方悍我嘗夜泛子胥灣錢塘大浪如銀山崇明海門水如墨况此相望一葦間為吾鼓槳為君歌氣凌河伯驚黿鼉醉披紫綺傲風波濟川遲暮柰天何上林道憶昔驅車度函谷觧鞍訪古驪山麓華清雖有亡國恨繡嶺猶存舊時木無情草木競爭春不問興亡自紅緑漢家上林更蕭瑟宫殿荒基走麋鹿可憐喬木亦已無五柞長楊今樸樕琴臺廣陵散成不忍傳淵明援琴葛為絃乃知此樂潜聖賢直與天地通其𤣥我兄能琴人所先我非知音知自然或聞一曲山月前輕颺如坐春水船逆隨河源上青天口膠不語生醴泉鼓舞和氣如陶埏至樂黙黙坐忘年少華山少華連延翠煙永細路縁雲上髙頂竒峯西犇入秦蜀幽谷南通接荆郢昔年蛟龍忽變化怒蹙山巔壓州境山靈吐怪助豪彊地軸狂推如轉梗盤龍七社萬户餘卵覆巢傾伸臂猛近來又説神羊嶺六里横開罅如井居民惴惴已憂疑惟恐蛟龍怒還逞勿令岸谷復顛移鼓鑄神功煩禹鼎囬心嶺萬仭嵩峯接天逺妖武登封艱歩輦初登峻嶺已囬心何事艱難能黽勉亦似徽之泛剡溪想見王陽臨蜀坂老子山林興不淺興盡中塗猶欲返古人戒在末路難九十常為百里半世上風波更可憎心不可囬聊自勸次韻荅張誾張閣見寄我思佳人在何許太行之陽濟川上結茆賦詩臨清流我情摇摇日西嚮盤谷秋來隂復晴谷口與誰來耦耕賣刀買犢便能爾功名付之勃與平嗟余追逐老閭里吟詩作賦不直水韋編鈆槧幸忘憂甘與牛衣同卧起相從當及壮年時莫年多感定多悲此身安歸送歸客豈堪登臨行路岐萬事紛紛戰蠻觸不須白眼憎時俗但願如公無榮亦無辱臨流賦詩老亦足田舍女田家女兒不識羞草花竹葉挿滿頭紅眉紫䄡青絹襖領頸麤􅀈流黒油日午擔禾上場曬也喜年豐欲還債傭工出力當一男長大過笄不㑹拜有者四十猶無家東村定昏來送茶翁嫗喫茶不肯嫁今年種稻留踏車蚩蚩氓之蚩蚩不足數四月五月濛鬆雨閉門縣榻二十年不見孺子與文舉趙令畤德麟作襄陽從事丁丑季冬出行南山三邑某同謝公定曾仲成潘仲寳携酒自大悲寺登舟過峴山宿鹿門明日復自峴首目送縁絶壁而徃上船山下相與酌酒而去德麟賦詩次韻和之鄒湛葛疆徃過此幕中佐曹畏簡書習池峴首自今古故時悲喜成空虛越王之孫府從事惡人亦作俗吏呼日從雲間二三子醉吟嘯傲相携扶王孫才髙倦覊束濕紙詎可包於莵興來鼓櫂碧江去把酒賦詩聊與娯野人相逄荷傾蓋坐上作客慚食魚紅塵化衣對玉樹白髪茁鬚如霜蕪飽聞襄陽好風土喜見山水相盤紆久憐消髀厭覉旅便欲卜隠如林逋著書雖可自覆醤志怪猶為鬼董狐兹㳺起我丘壑興豈復自為形迹拘山中一㕓可托足裘葛畧具便有餘結茆耒耜老巖谷豈學少室隨駕盧老妻汲澗芼葵蕨丁男負芻仍掃除諸公富貴或肯顧結駟野服來吾居謝公定所寳蕃客入朝圖貞觀中閻立本所作筆墨竒古許贈趙德麟而未予廌作此詩取以送德麟君不見燕然易水波桑乾東連鴨緑西賀蘭古來戰地骨成土赤棘白草沙漫漫漢築朔方置上郡晩嵗欵塞惟呼韓貞觀文皇力馴制諸蕃君長充王官玉門不闗障無候驛道入参天可汗蠻夷邸中諸國使旃裘椎髻㳺長安我恨不為典屬國望古遥集真可歎今觀此圖寫職貢要荒種落䝉衣冠獸蹄鳥喙或鬼色想見膜拜皆盤跚聖朝賢良謝夫子勁氣烈烈霜風寒目眵脣焦萬巻爛筆頭成塜墨成灘南陽勸駕一封傳入對三道朝金鑾萬言階對萬乘喜聲名一日青雲端行當遨逰廟堂上坐令四國相交歡羽書不馳烽火冷鳴雞吠犬何敢干借令跳梁出巢穴當用斧斤摧髀髖戎亭喋血無噍類藁街縣首如狐貛君當自畫凌煙閣縱有此圖何必觀同僚華原貴公子求公此畫公無難乃知功名丈夫志不惑玩好勞肺肝憐渠孜孜畫成癖心欲速得如羽翰不如遣佐篋中品猶勝棄捐終不看德麟自南邑至鄼相㑹作詩次其韻脂車欲入南山路馬首忽西真有數此生兀兀老江山曩事紛紛過風雨君行嶺上正穿雲我向津頭欲呼渡石門秀絶冠荆楚萬壑千巖供指顧赴澗哀泉咽復流出岫閒雲散還聚遥應寫懐逺憐我瘦馬饑童傍江霧平時追隨若形影異縣相望忽如許他年兩翁各賦歸思山便可拏舟去千齡檜岡頭老檜不記年古父約以千齡傳髙枝凌兢倚北斗低枝猶藏萬嵗煙蟠根直與地爭固不許蚓穴通黄泉隂森古恠神物附雨晦毎見蛟龍騫賢哉樂天真逸者手植蒼檜今宛然元和元豐五十紀婆娑下委纔及肩信此千齡尚虛云㡬見海變丘陵遷乃知不為斤斧夭不在澗底與山巔鼎足檜巨根盤亘㡬百尺髙榦植立参天長蕭蕭氣清霜月白雲根桂子飄秋香松陵髙士風骨竒灑然臨流傲滄浪油雲委地墨欲滴霾風拂雨炎天凉鄼留執䇿信秉鉞軍中舞劍語激昻幽林俯見皆樸樕反視茂質獨蒼蒼樂圃先生最珍玩如神偉象豈等常夢松蓋有三公兆蒼檜鼎峙寜非祥樛枝檜檜今老矣何兢兢樛枝下屈如不勝左松右栢非爾朋繁霜茂雪徒驕矜鞠躬不敢騫其肱午隂凄凄緑鬅鬙六月爽氣飛秋氷縈紆茂宻羅附藤猿猱臂絶愁難升老龍銜雨将飛騰矯首欲舉逄饑鵬題王摩詰曲江春逰圖咸雍山河互王覇涇渭為隍城塹華曲江臺沼備豫㳺秪與畫師供入畫長安城西山萬重昆明烟浪繞新宫新蒲細柳春風裏萬户千門佳氣中我生不及開元時猶喜此圖今見之蒼莽烟綃横短幅眼中終南倒溪渌傾城士女巷無人三月三時曲江曲老稚妍􅎀賤或貴來者携壺歸者醉筆端造化有能事各肖人人樂逰意如今此地空塵迹石鯨縱在如銅狄宜春五柞更蕭條無復榛中得遺甓我願吾王明六符不蹈漢唐耳目娯池籞假民任畋漁無令畫師為畫圖王實洗兒歌樂道觀文長子昔聞吉夢占羆熊今見得子如阿戎先正舉世稱至忠垂慶百世皆萬鍾山川秀氣久結融今復俾君生此雄五侯七貂十八公當有八元為八龍愧我塵埃非太真難使此兒名作温勸君大作容駟門作詩聊代添金盆盧泉之水次韻晁克民贈隠人盧泉之水名何長裂臍不到空莽蒼讀君詩句心已凉便覺滿耳清浪浪彼方逐臭如竊香肝膈䑕飽神鷹揚有客飲水衣朝陽睥睨不語中何傷過從得君想更樂直欲造化窮微茫何當相從老此水桀跖夷齊均是死邊城四時曲送盛瑋東玉之官平凉邊城冬日日黄埃飛朔風䓤嶺雪深埋古道河岸氷厚與天通可汗牙帳青海東壮士巻甲趨竒功公孫卿材名将種横槊賦詩海濤湧作吏宜思故家勇早取靈鹽𨽻秦隴詠齋詩古昔詩客長風騷雲間野鶴鳴九臯六丁極天十萬遭攝提執䇿窮牛毛𤣥珠罔象誰能及或長壮麗稱雄豪九原殺氣横天髙朔風吹雪沾霜刀銜枚束甲夜渡洮軍中壮士秉白旄忿怒不可㧞一毫白狐㡬腋成一袍東溟一釣連六鼇二長不同各有勞吟咏至審公譏褒詠齋之樂真陶陶君毋獨樂愈自髙亦當以手援兒曹寄楊十三虞卿前年君去時覆水坳堂中三年君不歸昨夜風雨驚破屋不知生蛟龍壮士恥隠忍㧞劍刺潰癰三杯然諾許君死魚腹置匕首直入呉王宫抳鐔靂火飛吐氣成長虹義名如皦日英氣凌秋風秦覯少章寄寂齋臣門如市心如水漢宫觧識尚書履形若槁木心死灰東郭子綦初隠几明珠走盤