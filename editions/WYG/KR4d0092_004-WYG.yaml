body:
  text: 濟南集巻四宋李廌撰五言律詩方竹杖和功逺性稟方外正人憐節瘦輕持擕防水潦殺活奈山精直以中圓稱名因義類清若将靈壽比未可賤書生同張公碩梅耕道訪董畸老郊居白水㺯青秧晨煙著栁行覉懐正飄泊陂路轉微茫蘋際鷺鷗下塍邊菱荇香相從尋勝事蕭颯興何長㶏水官橋路将軍甲第新緑沉閒結鏽棐几浄無塵下榻喜賔至問田憐我貧相逢便傾倒晩嵗定情親靑雲兩髙士肯伴老夫游方駕相追逐通宵復獻醻詩書嗟失計農圃話良謀日後耦耕伴懸知總白頭秋菊春花富紅紫黄菊與秋宜風勁幽香怯露晞寒艶滋孤標雖獨步呈秀此何遲欲待羣芳歇専榮占一時秋郊郊原千里望好是暮秋時欲盡登臨興惟應杖屨宜鶚鵰方得意燕雀彼焉知黄犬蒼鷹去誰家年少兒出城岸走舟安穏逍遥若步虛晴烟迷白鷺春水見浮魚桑樹連坡種人家夾水居年豐村舍好稚子學詩書秋山山色帶晴雲雲山逺莫分寒林逈蕭散秀氣自氤氲定有丘園士彼同麋鹿羣弓旌訪巖谷誰為上方聞寂歴古闗道二首寂歴古闗道早秋生曉寒空濛朝雨細憔悴客衣單事逐煙鴻逺情隨雪鬢閒蕭蕭倦游意天際路漫漫寂歴古闗道曉煙寒未分愁情滿秋草歸思隔黄雲客路自多感宿酲猶帶醺蕭蕭倦游意况乃乆離羣秋鶯詩秋日生春意林間聞曉鶯奈何時序晚不及候蟲鳴摇落無多感芳菲㑹滿城好音宜自黙反舌可無聲秋扇和之道過時悲既往適用復相先世事蓂生隕人情月晦圓寒凉非爾適衰歇豈余捐嵗事待秋歛農夫期有年續題郭功甫詩巻詩道今蕭索騷人古困窮夜寒金殿冷秋静蜀闗空廐𨽻縻宛馬壇巫誄守宫採珠探水府絲黍慎蛟龍戲贈史次仲世俗匪吾謀嘉篇常見投舊交皆炫曜夫子獨淹留禮樂尚虚器衣冠何自囚秪應凉冷後蕭颯更清秋秋曉秋色已飄零凄凄曉更清蕪城宿殘靄雲日遞㣲明瓦冷寒霜色庭空槁葉聲悲歡更盈耳簫鼓和鐃鉦青泥雪中和徳麟韻君笑吾癡絶吾知自不癡逺游陪勝士歸槖有新詩笑覺山途近寒因酒力遲相從畏嘲謔别後復懐思秋蝶粉蝶爾何知秋深尚戲飛憐渠迷節物猶若㺯春暉露葉今非昔霜叢疇可依籬邊菊無幾薄命寄餘菲宿路北晩日明青嶂春風送馬蹄數朝秦嶺北今夜洛陽西禁水緑波滿蕪城碧草齊客心歸更速解轡恨棲雞分題得古香爐分韻得遲字質為浮休棄形惟好古宜埏陶異甓礫香火近神祗冷暖非恒徳興衰彼一時舍茲何所適爾意勿遲遲和次仲硯詩聞道端溪好疑應為土風彼人非博識此語未為公野客雖云美才華恐未同濡毫滋墨外文渙亦徒空秋溪秋溪已澄徹山色貯溪中雲度前洲白霞生别嶠紅波瀾寒自鑑魚鴈共逰空棄置功名念羊裘作釣翁釣臺釣國固有術直鈎寧漫勞吾常鄙龍伯豈復羡琴髙濯足風波地遊心虎豹韜誰云無是子天下自囂囂此地有天險雙臺千仞岡眼寛知世窄望極使神傷慘澹諸峯立縈紆一水長振衣懐古罷新句入斜陽秋風萬籟靜中起扶摇風怒號半天鳴劍㦸平地巻波濤鷁退宋都疾鵬摶溟海髙賀蘭吹不盡何用戰蓬蒿陸龜䝉有戰秋詞范蜀公挽詩十章蚤嵗青雲近英聲四海馳能懐天下寳獨讓月中枝既已登龍坂咸觀入鳳池如何老清禁偃蹇卧明時公禮部第一不效前人廷試乞超等仁人宜有勇無欲故能剛凜凜回天力危危極諫章一言扶日御萬古正乾綱首犯龍鱗意淵衷亮未忘首乞立嗣慶寧雖首議濮廟一何公君子初無黨賢臣惟盡忠死生全大節社稷倚元功疾彼梁丘子依違秪尚同公力爭濮廟荆舒昔未懲抗疏誓身爭衞鞅雖難屈桑羊屢請烹危言知不用脱屣謝浮榮豈戀三台近全無萬世清直氣犯荆舒承明下玉除禁林餘諫藁蜀道擁安車自謂三宜去吾知衆莫如誰為忠義傳事事舉堪書王荆公自為制落公致事嗣皇思故老趣詔侍筵經駟馬空頻駕髙鴻本自㝠蒼生雖絶望盛徳愈流馨出處俱全節輝光並日星元祐天子起公侍讀不起關雎久盈耳魏闕亦游心不廢江湖樂親調鐘磬音九重初擊拊千代正哇淫器在人忘矣哀哉淚滿襟公奉詔脩新樂重望晉随㑹清明越大夫忘身安社稷寄傲老江湖黼冕固已逺黄金猶可模旌賢宜異數願上孝宣圖八十雖云壽吾嗟未及期方之昔衞武猶不至期頥幸處仁人里叨膺國士知空餘戀軒想况復九原悲衆樂西南圃從公數共游清無馬融帳榮預李膺舟河漢徳星隕山川英氣收孤生築塲意索寞向新丘光禄朱卿挽詞十首自信仁由已深知道滿門才華輝曰域嘉譽達天閽坦腹方趨進亨衢迓駿奔欲令唐晉後不獨羙姚温要路多知已期公集有庸行趨青𤨏闥榮拜紫泥封帝室常虚席侯邦久卧龍空餘遺愛頌安得鏤斯鏞省寺官聨貴曽升社稷臣雙瞻觀日月接跡望星辰錫爵雖開國封侯未富民天扉如可到直擬問通津南國舊書生今誰老更榮朱轓頻補郡白首到名卿牧守惟司命官曹任老成道孚姑已矣何患不聲名疇昔始龍館能聲到海隅兆民方菜色境政獨蒲盧尚賴徳彌邵安知今也無猶聞江左郡荒政徯來蘇七十古云稀公忠况未衰言常思悟主老更惜明時雪髪丹心被君恩寳劔知如何天不憗直道竟何施樂圃林泉好藤蘿䕃古臺仰攀髙節處豫約掛冠來凉月空堂影新霜百草荄凄清行樂地履跡滿蒼苔滄海夢悠悠闗河壮氣收魂歸傷委蜕壑迥失虚舟月暗菰蒲夜山空木葉秋可堪頻悵望松梓繄新丘五十雖非壽休嗟不憗遺賞延姑可待子貴竟何遲異鵲驚蟬蜕凄風落木芝乘驄千里客歌罷不勝悲蚤悟多金累惟修儉與仁考終雖㒺愧直道未容伸地想流謙徳天惟賚善人昭昭錫繁祉餘慶在振振賀蘭先生詩同陳恬叔易和節度使王漢忠韻陿隘區中世殷勤招隠篇應居小有洞幾見大椿年菴廢雲埋谷琴亡聲在泉至言曽悟主持此合昇天菴臺在嵩山承天觀鳴琴泉上顔魯公祠堂詩朅來游汝海初識魯公真盛徳宜䝉祀英姿儼若神典刑雖異代勛績在蒸民憶昔艱難際生逢厯數屯羯胡來薊漠戎馬度咸秦河朔皆朝虜平原獨挺身蠟書通帝所羽檄論邦鄰許國心無二孤軍氣復振弟兄同義烈生死劇酸辛巳怪酬庸薄那聞左降頻江湖銷嵗月省闥牾經綸相國心多忌軍容憤復伸同朝縁妬媢㗖賊俾邅迍輒墮姦邪計剛期跋扈馴咥凶令履尾納諫為嬰鱗假手雖云智擠賢太不仁茹氊蘇武餒决眥藺生嗔誤問長安使寧為叛將賔一時全大節千古仰清塵緬想神如在推遷跡已陳謀謨存汗簡字畫徧蒼珉論世吾求友之人徳可親詎云黄壌隔猶勝白頭新端欲希忠義常期齒搢紳今雖逢聖旦止願作良臣惟冀尊王室寧思秉國鈞儻令冠獬廌猶可畫麒麟古寺今如昔泉扄夜不晨何人同李翰紀事比張巡感慨瞻遺像􅏰然淚滿巾程髙承議赴䕫路轉運判官求詩聖主躬仁政羣方布詔條洪恩温海嶠嘉頌滿芻蕘聚斂除姦吏依違屏具僚鈞衡無碩䑕城社絶餘妖皇化思無外王心逺欲昭咨詢黄閣老選命紫宸朝丹禁傳天詔飛星下使軺書旌分蜀道攬轡步煙霄急峽瞿塘險孤城白帝遥巴山連浪逺漢節拂雲飄按部清時好觀風樂事饒詩成思老杜鬼哭想殘蕭巳佩黄金印當簪七葉貂不應淹僻陋從此上扶摇上翰林眉山先生蘇公佑聖生賢佐天心在撫民昌期膺治運穀旦降元臣四序功成晩三台耀拱辰嚴凝氣剛勁謇諤性忠純凛凛風霜操優優雨露仁髙才暎今古妙學洞天人黼黻文華國淵源徳潤身四朝師令望百辟仰清塵射策明三道觀光耀九賔咸知帝賚説復誦嶽生申視草金鑾殿登庸鳳詔春䕫龍名不隕魯衞政相因交蔭槐隂茂聨華棣萼親廟堂熙帝載衮繡並天倫政柄勞無憚侯邦逸久均偃藩心固樂調鼎味宜新上宰虛黄閣除書下紫宸百神懷景福萬化入鴻鈞隂徳施黎庶休功格昊旻自當侔帶礪詎止約松椿賤士睎髙躅趨風愧下陳願言千萬壽獻頌敢辭頻小蘇先生九三丈自司諫拜起居郎權中書舎人廌作詩以賀孝治依文母皇圖錫聖王虚心思啟沃妙選盡忠良近侍崇儒術先生被寵光周邦柱下史魏闕紫微郎禁殿聨常棣天池浴鳳凰揮毫青瑣闥簪筆御爐香徳鎮千鈞重文輝萬丈長昌時逢式穀吾道喜彌彰視草嚴宸暮論思子夜央槐邊星轉角花底鷺分行豈但居華省行聞上玉堂終期衮衣拜慰此士夫望贈錢之道子武昆仲青㝠聨翼鵠志節傲雲機凶變家多難年荒嵗愈飢運乖生事拙貧病壯心違蚤嵗憂虞少今春弟妹歸氣悲縻駱馬心感動摇徽徽旌識也命矣無傷已時哉歎式微自從中夏瘦半减去年肥氣槩摩天鷙文華耀日翬飲川容鼴䑕障日讓犁犩南畝時躬稼虚堂晝掩扉有秋縁力穡髙節本知幾路入東城逺人行北道稀樹頭雲藹藹草際蝶馡馡古岸連樊圃秋城秀蕨薇斷洪流滓濘獨木過欹巍䆉稏香紛馥菰蒲緑暎圍訪君非旦旦相見亦依依為問奚為樂言他復謂譩孝思誠辟色傃隠始深譏不見前賢者何嘗慮世非浩歌行拾蕙雩詠浴于沂儼雅誠詩社凄凉近釣磯夜階鳴蟋蟀秋砌響蛜蝛竹塢留殘月林虹帶落暉龜翻朝露葉魚動落蓮衣詩句時評品曹劉幸發揮鮫人龍頷寶海客蚌胎璣子意將全美余心久所睎衆人皆捲舌髙論獨其頎掩月蟾蜍泣飛霜蕙草葳鯨魚翻海濁水碧帶魚飛正可夷崧岱公何愧隠扉剛明文豹節升降二龍旂月滿星藏彩霞升燎有輝愁魔攻肺腑危坐復歔欷七言律詩和楊元忠主簿觀魚輕瀾沔滿帶維舟新雨羣魚藻際浮既亦非知梁上樂敢嗟彼有釡中憂漢江水濁斑衣獺楚岸烟深雪色鷗未作金鼇莫驚惕月澄清海漫如鈎過昆陽城昆陽城下黍苗稀寂歴荒墟隠翠微逺想龍蛇方鬬野解驅虎豹使成圍烏知將擁河流斷定喜能令屋瓦飛白水真人今物化舂陵惟有荷鋤歸和錢之道遊虎丘二首輕雲細雨放花時才過清明已夾衣􅂸得酒時教盡醉可題詩處莫空歸丁寧鶯語機關巧輕薄楊花氣力㣲閶闔晚來行客盡稚烏相趂入城飛石頭槎牙占官道松樹老怪枿斷雲驪龍睡隠潭水黒雨積糞壤生朝菌山光繚繞林樸􅈪野氣空闊雲氤氲歸來月落天色莫水邉游女濺紅裙商髙宗陵廟詩築巖胥靡繼甘盤此道寥寥不復存古廟秋風塵黯黯故陵烟樹月昏昏君臣難遇真千載岸谷誰知舊九原魏尚端能似頗牧獨無新夣到天閽厄臺今古俱無忌憚情厄臺猶敢尚為名裔孫不復重瞳聖俗目俱同瞽叟盲陳舜之後見愠仲由空骯􅗣膾肝盗跖尚彭亨聖人道大故難用誰聴弦歌兕虎聲宿大賈村僧寮行過横煙杳靄中低低􅈋舍繞蒿蓬譍門見客僧如鹿席地圍爐火自紅隙壁射床千里月破窓吟紙一川風僕夫宻勸休安枕聞道穿窬是主翁哀都官王申壠上弓旌降鶴書戔戔璧帛賁鄉閭漢宫入奏賢臣頌蜀道榮觀駟馬車誰謂諸侯老賔客歸來華髮伴樵漁泮宫陳迹神游否絳帳門生多石渠大雨中遊嶽寺忽見微雲别嶠生急縁危磴下峥嶸勢傾海岱千巖黒力巻江湖萬葉聲碧瓦依稀人暗喜急溪湍漲馬初驚老僧宴坐朱門底應笑狂夫冒險行鏡屏詩二首曲玉回輝瑩可觀秋冰壁立動涵瀾每嗟許國酬身晚忽覺餘光照膽寒暎座未容華表客整簪空慕鵕䴊冠雲車一去橋山晚寳鎮于今下古壇凝澄不動水淵槃風拂泉生或細瀾月影透簾朝日薄龍輝繞匣夜光寒𤣥冥借魄知神物男子無聞已弱冠照我精誠至麟閣緩随弓劔上仙壇和二兄書事三首諱逺字國器居蘇州時痞疾未平年少看書恥未多壯心今嵗沛中歌帶江黄幟有蹻跖舉國白頭無絳何為我忠謀能有幾匪人阿比敢言他手攀荆葛藤蘿近敢把新凉取次過逋逃内潰古云多楚塞羣雄尚感歌血饗彼猖神苟幸廟謀非壯士誰何將軍威信當詢衆决勝神機豈謂他試把香􅌩問少子淝川投䇿夜潛過功名於我實何多祗為浮華未浩歌兩月病痁誠已甚半頭白髪似無何詔惟選籲將從衆學貴師心在匪他當世聞人知不少片言敢謂衆難過和鄭十三東齋言事二首為貧軒冕未忘情寧使棲遲抱六經安得神仙斷鯨劔拂開雲翳露天青霧濃𤣥豹終朝隠氷薄猜狐抵夜聴昬墊直疑皆飲鴆沉𡨕何苦辨清醒春光故故惱人情新葺茆茨欲醉經積雨水衣龍頷滑晩晴山翠佛螺青月邉栁色踈踈見風外梅花細細聴半夜白雲生石枕潤珠蒸濕醉魂醒答孔榘處度見贈我似覊縻遐徼州君如霸府大諸侯如何鼎食素烹飪乃謂溪毛堪薦羞駑馬但能追十駕鈆刀奚可斷千牛鄙人粗亦知臧否敢誚東家故日丘嵩頂六月芍藥初發誰言天地一無私底事陽和到頂遲暑氣已交五六月雲中初見兩三枝可憐下土炎蒸日却是青霄爛漫時苐有榮心莫嗟晩物情先盛復先衰和人寄㓂昌朝韻久料騰驤空冀北如何留滯困周南聞君載酒訪狂客把酒為君當劇談上國分攜今已乆丹砂未就我懐慙六蜚駕馭須天馬吾恐驊騮備兩驂楊十三虞卿在希顔上人房納凉余時在村舍歸和諸公韻土渇山焦獨在阿考槃孰與世相過皇皇夫子猶傷鳳碌碌蒼生尚執柯頭白已驚為學晚余十九嵗頭近半白日長贏得讀書多北禪釋子應相笑樹癭多年變木鵝暁行聞鶯花梢未動雨中聴催徧園林百果成六月不知春色盡五更來伴夏雞聲樹頭蕭瑟長風過馬上瞢騰短夢驚勸汝無言歸舊谷先秋畨次候蟲鳴雨中游法王寺詩雨脚如麻未肯收雨中還作法王游雲埋輦路煙初合水濺松巖雪亂流心畏險途常恐失寒侵病骨已知秋羣峯聳峭猶無畏為語山僧不用留少林寺詩禪老家風古少林道塲遺跡蔽烟岑山遮石脚斜陽早雲礙鐘聲出谷深隻履度闗天杳杳九年面壁海沉沉欲知苖裔能傳法栢樹猶明聖主心習池詩陳迹相推今古同池邉倚杖送歸鴻童山尚接千巖秀穉樹猶傳萬壑風春意物情迷野興水光天影共青空雍門有淚應承睫繞墓行吟弔習公習郁死塟池上次韻劉厚之乆隂未雨欲作豐年幾日霖宻雲委地結繁隂莫疑造物收功晚自是陽和著意深且具黄雞傾白酒更求青李與來禽掃除萬古窮通想付與南薫一㺯琴過閻氏橋亭緑芰紅蕖照眼新池塘風軟起青蘋逺山碧映重林暮委徑香傳别洞春五月獨為長道客滄浪自有濯纓人誰知雅意在丘壑慚對箕嵩愧路塵范蜀公得請再致仕蜀公作詩命某次韻老戀林泉拒衮衣髙山景行衆思齊乆膺重任當先覺獨以清風激衆迷越相家聲千載後商公舊隠白雲西坐令貪懦趍忠厚寄語狂童勿芥雞謝王生贈弓矢将軍材氣舊無雙老矣猶思强挽强金廐願乘千里馬玉闗歸奉萬年觴受降城下沙場雪無定河邊木葉霜贈我良弓借餘勇君應真勝楚人亡和人九日詩三徑就荒陶令宅兩峯髙並杜翁情悲秋不奈黄花好落帽誰憐白髪生逺岫薄雲收細雨晚林丹葉㺯新晴登臨俯仰寰區隘欲駕風輪更上征表髙氏石公之墓黄金照地晉将軍劔履盈門萬石君獨以徳名追逺裔盡将富貴比浮雲璚田種藥期公壽夜壑移舟忽夢分彷彿平生阻瞻覿一詩三嘆漫殷勤再上閭丘通牧少卿東邦濵海帝憂勞慎迪名卿禮意褒板簡拜旌前憲掾雲駢驂馭舊仙曹庭柯露下回春色夜浦珠還息海濤隂恵日隆天眷異蓬萊東去近金鰲吕朝散挽詩二首宗傑殊重平生邴曼容退身能勇自為雄盛衰付與枕中夢福禄猶嗤塞上翁松菊漸荒三徑合鶴猿悞怨故山空蒼苔滿地塵凝席惟有蕭蕭蕙帳風金馬玉堂髙步宜中年遂與水雲期太冲早擅三都賦叔度難量萬頃陂夜壑蔵舟今孰在白駒過隙事堪悲南園從此無行跡老檜髙松知未知送黄集虚赴任知州并序故汝州刺史黄公辛余先君子之友也惡衆人之曲邪而以正直自立非士氣之偷懦而以忠義自任慨然與古人為徒而恥浮沉俯仰狥媚世習雖轗窮年動輒得咎而居貧守道愈困愈堅君子韙之始三子皆布衣公将致政一嵗之中皆登仕籍君子以為為善之效果不終窮乃在其子孫也吾友集虚公之仲子也志義闓爽其文行有公之遺風今将之官桐廬故作是詩送之以寓意焉桐廬古郡淛江東山色溪光藻鏡中後夜相思千里月髙懐為寄一襟風欲紆龜紐黄金印且學羊裘老釣翁忠義傳家君勉勉清名不必問窮通楊元忠和葉祕校臘茶詩相率偕賦風駕已馳供御品霜郊未巻喊山旂七閩地産猶為寳兩府官髙故不遺須藉水簾泉勝乳也容雙井白過磁江南雙井用鄱陽白薄盞㸃鮮為上東堂退食公宫晩金鼎新烹欲沁脾宋英寳宣徳自杞至邑将復東還見遺途中詩次韻和之以見惜别思君仍嵗此相逢後夜夢魂無復東白紵淚痕何處恨故園花信幾畨風歸来可喜似新燕惜别預愁如去鴻老矣柰何春半老悠悠萬事付盃中又過陳叔易隠居相拉同遊超化寺詩文範今亡見嗣卿潁川應聚異時星清風特為吾曹至畏景寧憂日御停踏雪曽穿東郭履移文今忤北山靈烹茶且酌南溪水第欠金山第二􅍽再領玉局昔東坡在翰林作詩送戴䝉有玉局他年第幾人之句後自嶺外歸遂領玉局予復官亦得之坡今亡矣悵然有懐東坡因地夙相親玉局終為繼戴人祿仕豈知承末軌恩光又許襲前塵青蠅附驥元非援白玉無瑕晚更真泉下有靈應首肯不随凡劣易緇磷次韻東坡還自嶺南憑陵嵗月固難堪食蘗多來味却甘時雨纔聞徧中外卧龍相繼起東南天邊鶴駕瞻仙袂雲裏詩牋帶海嵐重見門生應不識雪髯霜鬢兩毿毿谷隠寺書事詩雲如戲我舒還巻雨似欺人去復來學道忘憂從老至持盃得意使顔開驪駒喜飽嘶猶戀猘犬誇獰吠欲催三日山中果何有賦詩滿得錦囊迴某與鮮于綽元勛共約同習制科趙括癡兒漫喜兵他年自料困長平将軍各有萬人敵下士難先二子鳴盧駱楊王何足算江黄六蓼豈勞征英雄少貶雖慙愧且徇區區月旦評謁中嶽祠嶽鎮中天司下土名山宫殿鎖雲扄固知正直作威福豈徇徃來惟醉醒封禪今無秦漢侈降生誰是甫申靈何當弭節朝雙闕一曲鈞天夣帝庭諸葛菜并序蜀諸葛亮每行兵處必種此菜以志之邑中元開州家有此種僕求之以作羮甚美作詩求之武侯戰地記他年戰後猶當似率然㑹向渭原驚仲達尚應江磧感桓𤣥背山左澤甘如彼傍砌繞籬今可憐莫問興亡進羮茹書生贏取腹便便將至嵩山逺觀瀑布晚晴紫翠溢平川三十六峰凝霽煙匹練依稀分秀嶺玉虹摇曳舞危巔寒光定是連明漢清氣都疑貫九淵可笑夜來風吹後亂溝斜澗亦涓涓和人游嵩韻嵩髙峻極壓三川周視方輿見廣員絶頂固知天下小泰山為占海隅偏白雲散盡千林月急雨收回萬壑烟莫笑層巒髙似岸舉頭一握是𤣥天友人董耘饋長沙貓筍廌以享太史公太史公輒作詩為貺因筍寓意且以為贈耳廌即和之亦以寓自興之意且述前相知之情焉案此詩從厲鴞宋詩紀事補載節蔵泥滓氣凌空薦爼寧知肉味重未許韋編充簡䇿已勝絲黍誑蛟龍短萌任逐霜刀重羙榦須煩雪壤封他日要令髙士愛不應常共宰夫供遊寳應寺案此詩從厲鶚宋詩紀事補載雨後秋風入翠微我來仍值晚凉時山遮日脚斜陽早雲礙鐘聲出谷遲故國空餘煙冉冉舊宫何在黍離離興亡滿眼無人語獨倚欄干黙自知賀小蘇先生柱史承恩正紫微玉皇優詔碧雲詞欲知伯仲文章職對掌絲綸内外司雨露偏濃常棣蕚煙霞常駐鳳凰池共扶吾道邪歸正同振斯文盛不衰白首並逢千載運登庸皆是十年遲靖共介福由神聴告爾多方代帝咨膴仕初逢賢者貴徳名當問國人宜夷齊抗世清何早元凱登庸事可期貧賤久思楊得意龍光今喜鄭當時應憐下客塵埃甚慙愧雷門獻此詩崔先生所守甚髙其為人表裏澹泊然其文􅁮如有自然之羙可喜也因還其詩巻題其末别久相思今見君近詩盈軸語彌新雄妍不用近時律温厚初還上世淳少與多仇身踽踽樂天知命志申申才髙所寓皆髙趣氣古斯能似古人句有萬鍾辭禄意衣無一㸃汚人塵中山可鄙魏公子谷口全如鄭子真珍重遺音清廟瑟蕭條寡和郢中春誰同杜老知無敵㑹有君山謂絶倫白首定交雖自愧夜光投我豈無因欲知慰此無聊賴萬斛愁懐為一伸五六七言絶句二士石榻在中院之北巨石如榻有自然石枕可卧二士和大受韻憶昔登封日山蹊困六飛我來猶舍杖共坐拂雲衣荼䕷洞無華真國色有韻自天香臨風難自持為舞白霓裳春日即事九首藹藹花絮亂紛紛蜂蝶多今年春復爾不飲奈愁何新緑隂将就殘紅在亦稀雨中千㸃絮來伴落花飛怒風吹老屋急雨閙空庭莫歎林花盡懸知隴麥青毛桃猶帶蘂青杏已團枝老不禁春惱應知老易欺但喜朝朝醉那知夜夜風老人貪睡羙春夢五更中化國有餘暇豐年多醉人典衣謀一飲對酒却慙春悵望白銅鞮醉聴金縷衣花間愁落日老更惜春歸嬌馬寧馨郎氊車薄媚娘蕭蕭兩蓬鬢愁入少年場逃閒閉闗坐忽有賣花聲老大自多感依然京洛情雪紙窗明晄晄雲日暗暾暾半夜寒添被清晨雪擁門晚晴微陽掛木杪孤鳥下雲淀廣墟遺稻粱鸛鶴伴鳬鴈隂壑留殘雪林虹帶晚霞孤煙障漁市不見兩三家臨穎縣日永行人漸困路長飢馬頻嘶驚起一雙白鷺背人飛向前溪楊花詞三首特地飛來有意等閑却去無情若比邇來時態秪應時態猶輕全似秋空白雲不應日堕紅塵樓上何人逺望黯然無語銷魂苦恨紅梅結子生憎榆莢悠悠解送十分春色能添萬斛新愁夜坐且喜屋無穿隙雪未愁漏盡滿鞾霜紙幃布被從牢落賴有希牙齒頰香道中即事呈岑使君吏部次和徳麟韻三首日射西山爛爛光低雲遮岸水風凉從來鞍馬倦行役笑語不知岐路長稻塍粟壠緑相連野老欣逢大有年人意物情俱自適溶溶佳氣滿江天白叟黄童話使君買牛買犢諭邦人今年菽粟倉箱滿仁政常為七縣春春日偶題寄友人低雲不斷風仍急細雨無聲晚更稠千里思君常在眼黄昏天意自春愁吕顔野飲醉中寄五絶句次其韻醉鄉天地一何寛不問金壺與玉山蹔得陶陶太古意醒來應亦惡人間酒在盃中惟恐盡事來眼底只嫌多一壺醉倒春風裏萬斛窮愁奈我何醉後詩成筆似椽客來傾酒酒如泉憐君常得酒中趣愧我經春只慘然手持金盞灔斜暉目送歸鴻萬里飛還似習家池上日醉中倒載接䍦歸醉倒南山卧白雲滿天詩思不勝春黄雞白酒真堪樂誰道蓬蒿有此人題孔氏東園三首何處移來薝蔔花琢成玉葉静無瑕天香不合人間有只是祇園居士家桐已參天栢已蒼昔年曽見似人長樹猶如此人休怪賔主相逢鬢各霜濃緑隂中黄栗留醉鄉遲日厭鳴鳩青春去後百花歇賴有枝頭安石榴題唐洲東寺訪友人不值詩三年漂泊老荆州重過淮安舊驛樓地上謫仙天上去故來蕭寺想風流眼前風景似襄陽松柏參天竹滿崗鶗鴂一聲春欲去雨催新杏漸嬌黄渼陂晴山如黛水如藍波浄天澄翠滿潭身在玉壺圖畫裏心随飛鳥過終南失題羡君走馬踏千山却笑吟詩不肯閒寫得清風入嘉句盡擕爽氣出雲間吟袖衡雲滿筆端馬蹄霜跡破朝寒據鞍何必須横槊自有新詩似建安觀音亭錢唐西湖三百寺芳草畫橋烟靄中寳陁大士本無相一亭聊慰伏虵功綠鴨亭澄波奫淪鴨頭綠秋水清於春水明芰裳已逐秋光盡藻帶暗藏春意生竹亭詩繞岡脩竹小亭深風榦雲梢照碧潯安得茂林帶左右祗應蕭爽似山隂送元勛不伐侍親之官泉南八首巻中識盡古來人筆下文章日日新萬里從親海邊縣要令南國見麒麟君房言語妙知名元凱春秋癖已成作者風流公莫讓要令江海聴文鳴看罷吳山看越山一帆千里玩風瀾令人頗憶羊裘老為釣桐廬七里灘解知身世兩鴻毛肯羡一鈎連六鰲有口惟宜醉醇酒時時痛飲讀離騷梅雨晴時荔子丹絳囊青幄共檀欒按圖讀譜嘗珍品大勝闗西苜蓿盤泉南南浦是南溟瘴霧熏人不用醒想對文書搔首罷刺桐花下學蘭亭甌閩接壤氣多同只恐泉南有􅄓風撅虹見時定翻海禦寒裘褐要重重粤藤玉板澤於脂歙婺隃糜理勝犀歸日錦囊詩幾許七閩當有數千題送蘇伯達之官西安七首好去西安蘇縣丞千年求友近嚴陵江山如彼君如此正似玉壺寒露氷湖山主人玉堂客爾來華髪故應多安石雖云江海士元元蒼生将奈何苦憶君家兩恵連樓居應作水中仙静看河畔青青草應有池塘春夢篇問訊東海秦釣客秦覯從先生行爾來聞已覇風騷緡明餌香我知愧愧爾一鈎連六鰲寄語松陵與太湖煙波風月爾何如故時景物應如昔復有當年張翰無横江一葦聴潮來江月飛霜落酒盃寄語錢唐江上月可憐寂寞照潮迴千里隋堤榆栁風輕花薄莢正㝠濛離情解逐仙舟去欲過三江震澤東和陳恬思其叔子思有書齋在山中二首古寺愔愔映夕岑谷風凄勁觸霜林曩時蕙帳知何處不見山人來苦吟嗟我衰遲行老矣與君生死尚情深屈平賈誼何須舊敬弔先生淚滿襟從徳麟自中盧游靈溪記事各執梅枝不執鞭涉溪穿竹過林煙景純夢裏經行處直到青溪古洞天青溪翠壁瀉琮琤洞府猶傳鬼谷名幸有六經堪送老不思唇舌慕從横裂崖泉射便成溪溪畔虚巖匹練垂玉濺珠跳千仞底隂隂衆木媚清池次韻秦少章蠟梅底處嬌黄蠟様梅幽香解向晚寒開故人未寄嶺頭信先報江南春意來徳麟以書相招云已與潘仲寳在中盧可自酇來同游靈溪石門雙池等勝處某作六詩率張㑹川作氷溪雪嶺赴詩盟我媿難先二子鳴莫憚登臨助餘勇欲令萬戰遇竒兵靈溪閟洞鏁華胥地脉旁通分野殊莫憚登臨探竒險恐君他日亦蔵書千仞雲崖聳石門古傳此地聖凡分我曹自愧羣峯誚未必山靈解勒文地上雲居有梵天碧池靈脈瀉雙泉不應勝地能埋没政欲因君佳句傳雲外泉聲度碧林瀏縈累帶作清深吾纓已分令塵染欲借寒光去洗心異時倥偬此時閒甘在塵中可厚顔天為好山生勝士莫因便懶負雲山題峻極下院列岫亭詩早訝年年狂士來每來亭上獨徘徊山應又喜添知已去後山容似死灰山色滿亭亭倚空與君俱在畫圖中解道龍騰青壁斷令人却憶漫浪翁聖俞詩云絶壁龍騰青壁斷極天神降白雲空筍籜筆詩琅玕夭嬌排霄去敗籜平堦聊貯儲付與管城湯沐地何須毛穎號中書雪中汎漢江呈徳麟漢江莽莽雪浮浮逺想山隂汎剡遊髙興共成何更盡子猷安道喜同舟將至酇城和徳麟韻緑勝章臺楊栁街青羅斗帳净無埃五株何用詩頻説安得韓公到此來曉至長湖戲贈徳麟桐實離離秋帶長玉鞭驕馬度垂楊黄茒野店人争看籬上紅眉粉額粧和李端叔大夫從參寥子游西湖十絶幾處鞦韆愁日暮一聲鶗鴂喚春歸紅稀緑盡尋常事不用長繩繫落暉草已芊綿桞已柔落花重疊不須愁風光流轉等閒過又是一年春事休百物争春竟可憐清池緑浄但沉天浮萍細碎從渠長憎見差池㸃荇錢西疇新買數塍田便掃空囷俟有年欲坐𤓰菴吹豆葉風翻黄浪麥秋天風頭皺浪開還促雨㸃圓紋亂更多何似無風亦無雨碧天千里在澄波癡兒挿地栽楊栁楊栁無根插便生我亦無根常作客四年漂泊大梁城股大如􅆎立已憂不須登閣始三休道人尊足元無病莫取形骸向裏求夢為蝴蝶恣飛飛飛入花叢處處迷不是提壺强呼起尚應栩栩展江西詩翁詩思與春争落筆風雷紙上生雪棘滿頥心尚壯君看巖電射人明池南池北亂蛙聲不問官私處處鳴昨夜一犂新雨足無煩科斗更滋生釣臺竹岡深貯一溪雲溪灣路盡釣磯新魚鳥相忘自相樂使君元是狎鷗人山東太白謫仙人筆捲天河氣拂雲百代公卿嘲哂徧清溪石上想嚴君興王不患無功業賊亂常憂在嵗寒能緩阿瞞移鼎手長鋋此日愧漁竿中春輕挨殘花香簌簌旋剥新筍白纎纎傷春煑筍買春酒短褐破碎人家嫌春日風雨晚題低雲不斷風仍急細雨無聲晩更稠千里懐人常在眼黄昏天意自春愁王子立寄三絶句云常詣夏頥吉卜云宜見君子子立作詩廌次韻乆依鳳翼與龍鱗萬里青雲可致身聖主求賢如不及夜光豈復怒無因富貴自知當自信耆鮐福併固脩長隂陽可測非天理男子人知亦易量三首新詩慰病軀萬金何必是家書隔年已有游嵩約玉趾何時過敝廬寒食案此詩從宋詩紀事補載千株蜜炬出嚴闉走馬天街賜近臣我亦茅檐自鑽燧煨鍼燒艾檢銅人飲襄陽沈氏家醉題侍兒小瑩帬帶案此詩從宋詩紀事補載旋剪香羅列地垂嬌紅嫩緑寫珠璣花前欲作重重結繫定春光不放歸興安道中雪晴見羣山偶成闗山千里湧銀濤晩日烘雲欲動摇滕六自知遷客近前驅一洗瘴煙消雪晴山凝秀色螺成髻溪走寒光珠在盤更欲呈姿作清巧暫粧梅栁雪中看飛閣飛閣凌波浮𣺌茫碧山白雲坐相忘好風歴楯泛我袂興來取纓濯滄浪未曉出雙池小雪作怱怱蓐食過重丘炬影通林見逺流雲物瀾飜煙羃歴細風吹霰上征裘瓦廟柱側簷欹瓦欲飄斷垣苔澁樹蕭蕭滿庭荒草無香火惟有禽聲伴寂寥詩餘虞羙人玉䦨干外清江浦𣺌𣺌天涯雨風如扇雨如簾時見岸花汀草漲痕添青林枕上闗山路卧想乘鸞處碧蕪千里思悠悠惟有霎時凉夢到南州菩薩蠻雙松庵月夜賞梅城隂猶有松間雪松間暗淡城頭月月下幾枝梅為誰今夜開罇前簪素髪自擁繁枝折疑是在瑶臺寳燈擕手來清平樂送别落梅嗚咽暗淡城頭月吹滿江天驚夢蝶喚起畵樓傷别簾風輕觸銀鈎梧桐玉露新秋底事瑣窗深夜素蛾常伴人愁
