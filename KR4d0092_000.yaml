body:
  text: 提要濟南集八卷别集類二宋臣等謹案濟南集八卷宋李豸撰豸有德隅齋畫品已著録文獻通考載豸濟南集二十卷而當時又名曰月巖集周紫芝太倉稊米集有書月巖集後一篇稱滑臺劉德秀借本於妙香寮始得見之惟文粹中載遺文一卷而已永樂大典修於明初其時原集尚存所收頗夥採掇編輯十尚得其四五蓋亦僅而得存矣豸才氣洋溢其文章條暢曲折辨而中理大略與蘇軾相近故軾稱其筆墨瀾翻有飛沙走石之勢李之儀稱其如大川東注晝夜不息不至於海不止周紫芝亦云自非豪邁英傑之氣過人十倍其發為文詞何以痛快若是蓋其兀奡奔放誠所謂不羈之才馳驟於秦觀張耒之間未遽步其後塵也史又稱喜論古今治亂嘗上忠諫書忠厚論又兵鑒二萬言今所存兵法竒正將才將心諸篇蓋即所上兵鑒中之數首其議論竒偉尤多可取固與局促轅下者異焉案吕本中紫微詩話極稱豸贈汝州太守詩而今不見此首又其祭蘇軾文所云皇天后土鑒一生忠義之心名山大川還萬古英靈之氣者當時傳誦海內而亦不見其全篇則其詩文之湮沒者固已不少其存而未佚者固尤足稱矣乾隆四十六年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:536f1959047f96b1bbde46cb9a3ef0cbcb185c8a6c2c32edf32c429a90e5ddcf
