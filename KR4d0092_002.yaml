body:
  text: 濟南集卷二宋李豸撰五言古詩同德麟諸公觀秋風閣自賦詩臺乘月泛江虛閣凌縹眇危臺俯湠漫憑檻眺落景倚柱送歸翰空濛暝色合戃恍天宇寬皎皎明月上炯炯青林端寂歷四郊靜隂森清夜闌秉燭下草岸回船遵栁灘繁星粲湛彩白煙隱微瀾夷猶放􅍽溜暗淡數煙巒絺衣涼風發角巾滋露漙心適醒亦狂樂極清更歡叩舷過龍室抵掌驚水官仍思爇犀炬下欲窺蛟盤風雲襲毛髮氷雪澡肺肝慨歎念前哲興懷成壯觀蹇豫棄甽畝放意逺遊般合鞅昔徂嵗維舟今戒寒佩服良友義論言畏塗難兹遊興不淺冒險夜未安風波彼何懼忠信邪能姦又九月十四日登秋風閣以餘霞散成綺澄江靜如練為韻分得餘靜二字繆蹈江海迹吾生靡懷居役車窘隂雨蒸腐敗衣袽晨昏霤聲中我懷何時舒秋陽出頑雲杲杲照我裾言登秋風閣乘興安可徐猗紆下銅鞮縹眇凌紫虛錦葉眩林表金包垂霜餘棲苴寄榛莽潦痕在菰蒲我遊獲所適况乃弗為魚放意宇宙間所至皆吾廬山客水不覿蒸雲日如甑陵陸混泥沙黯慘度朝暝晨霞送晴色喜見天面瑩江光劒歸匣雲收四山靜髙閣眺空無復見前日勝回思困塗潦戃恍如昔病登臨勿太息秋風漸焱徑搗帛石婺女織玄綃欲作六銖衣空山搗寒月傳聲徹雲閨可笑綺縠女不識砧與機同德麟仲寶過謝公定酌酒賞菊以悲哉秋之為氣蕭瑟八字探韻各賦二詩仍復相次八韻某分得哉蕭二字楚女唱桃葉楚巫歌竹枝壯士撫長鋏語闌亦興悲君看拱把松中有千嵗姿蕣華不及夕柯葉漫成籬葳㽔晚秋菊芬菲忽齊開緣階上古壘粲若黃金臺搔首念霜髮擷英泛羽杯頺齡恐能制夀侯安在哉白髮諳冷暖蒼皮貯陽秋中年已如此一飽更何求把菊悼飛葉微行遵逺流此非柴桑里乃有淵明儔痛飲可一石寧辭手中巵挹斗自斟酌澆胸定為宜心如虎在圈事若羊觸籬執鞭吾弗能放意從所之青松多陳根女桑漫柔枝虛心任寒暑寧與鐵炭期旨酒有妙致青山多令姿醉遊卧丘壑於豫復何為松菊徑勿荒政欲善鋤治參商菅蒯中髙韻自超異區别雖少勤寶此吾臭味勿言大鈞中與彼同一氣霜風隕髙木零落臨艾蕭幽芳枝孤秀華心慰無聊堂中老元亮日賦歸去謡杖屨樂三徑為爾甘折腰風騷本無作強為憂患出菊荒思卧陶江渾歎沉屈吾觀思王詩復若清廟瑟斯文幸未墜且進杯中物神松嶺即嶽神為圭禪師一夕自北嶺移者初聞百梁村拔自天池井今知萬松岡一夕趍北嶺顧兹挾山威何心罔知警二士避雨巖遇險思共濟胡粵無異心而我與夫子義烈真斷金隂崖避飛雨羣龍方怒吟巖中歌式微相和相知音送元聖庾縣丞之官泉南漫郎老猗玗紫芝于蒍于二元皆國器位卑德有餘嗟公有祖德官况復不如平生志引大英爽凌太虛胸中有武庫羅列千卷書攘臂班馬間豈但突黃初謂宜在妙齡持槖承明廬何為沉下僚蹭蹬青雲途三調南曹選雪霜稍侵鬚又佩墨綬去不得黃紙除憐公批敕手乃判稅與租閲世悟休戚勝負如梟盧達人自通脫於何較錙銖平治不平氣俯仰自走趨剛忍素所遇時乃烈丈夫南安極南粵控帶荆與吳南涯即滄海北渡竟重湖回首望嵩潁邈焉天一隅南州例卑濕海錯富蟲魚作客萬里外善保千金軀加餐慎興寢三年賦歸歟故園有老伴林下要為娛德麟約遊西山某自鄼來會行李阻修成此詩初無聲利想獨有山水癖慨然嵗月逝名山喜投迹書來拜嘉招吹火自蠟屐戒期西山邑奔命通書尺君詩如齊楚凛凛兩大國吾詩比邾滕惴惴甘服役千里奉詩盟敢愛股肱力方舟絶清漢舍棹上層壁梅埡排青雲四覽衆山脊僮肩困負笈馬喙不停息趼足上崔嵬欲進轍已植喘喉如鼓槖開闔振胸臆仰愧升木猱俯羡歸飛翼天曛未敢止行行望仙舄見山岡詩髙岡勝虛閣晚景澄寥廓遙潢浸廣野危峰柱碧落雲過半山隂蟬聲夕陽薄勤勤學飛仙海上尋黃鶴三醉石詩伊昔三逸人醉卧捫白雲其間歐醉翁翊戴建殊勛山靈豈羡爾應復勒移文中隱菴和趙孺韻退之以文鳴師友得侯喜聲名力與俱雖尊未勇耳黃池距青山孰辨都與鄙菴成誰振之句出閙如市千仞寧我髙充實信吾美坐令菴內人前車云可軌禮樂有先後後進則君子執方而昧圓俱野那復史伐柯固執柯疇克求諸邇蒸之既匪薪采焉又非芑近交韓與侯步驟亦常耻一醫消息盡布毛自何起要須六月息不息不為已敢問二詩人如何得意旨答周行已相贈行已端慎太學諸生忌之佳人寓雲端餌霞服靈煙舉手謝時人信爾非我緣誰令山中瓢酌此闤闠泉捨爾芝蘭薌一染漸餘羶鉛黃強為容孰竟謂子妍眷焉反初素此道自古然習家池詩言登峴椒亭南望髙陽池習君漢徹侯種魚千石陂川光涵翠阜倒影媚清漪伊昔典午世山公已遊嬉子孫安在哉獨樂寧可期蕭蕭宰上木長風蕩餘悲習鑿齒宅習侯有世德冠冕襲鵕鸃裔孫富六藝鑿齒四海知蘇嶺陟家山髙陽浮故池著書山水間秀發胸中竒間從彌天釋善戲間廋辭尚友雖異代斯人可夙期龎德公宅詩荆山雲蒼蒼漢水波瀰瀰山川意髙淡宜有隱君子德公卧鹿門老不踐州里潔身逺憂患豈復存愠喜藐然姑射人胡為市門倚諸郎有鳯雛輒與卧龍起過具茨諸山始達嵩少初踰千峰時千峰各呈秀抵兹嵩髙前始覺衆山陋恃此一柱力天地敢分剖四維既張弛穹壤託髙厚卿雲羃上國秀色連楚藪衆峰無聳峭配此真培塿固將倍十百何止吞八九余身一草木乃欲擅去取出類復何言聊貽澗濵叟登嵩頂丈夫有竒氣坐井直鬱鬱朅來古嵩州擕手登太室中峰到絶頂北嶺太峭壁山河在股掌帶礪何足述星分九州野塊列七雄埸放懷宇宙間想見天地闢下觀雲雷變愍爾龍鬼役下方萬仞底草樹靄蒙密愈知天下小助我浩氣直平生四方志登臨聊感激嗟嗟封禪媪遊豫朝百辟誣辭與慙德可笑乎四嶧廟社尚不閲財用遑肯恤萬兵樹豐碑數丈壓􅍶崒豈知市朝變輦路蔽荆棘同登八仙壇再題三醉石君無笑余怯登臨常股栗為寶千金軀夷路猶恐失存我厚蒼生豈效伯昏逸歸卧聽天雞扶桑觀日出求志書院詩四首陳師道履常之所居也癯稿巖下士迹隱心捷徑汗顔塵中夫諂笑幸遊騁賢哉陳夫子兩不傷厥性潔身風波塗獨若萬鈞錠辰極不改北滄溟日輸東聖道亦如是昧者自異同哇鄭迷世習舍魚當取熊蓍龜期吾子此語聞先翁君氣久已浩君志復何求同聲久絶和一見忘百憂藜藿鄙膏粱絺綌傲狐裘德輝下可覽安用翔九州漆開辭未信顔回恃有田為貧仕何愧得已非自賢破褐坐窮閻聲華飛日邊苦節勿匏瓜仲尼任蒼天靜齋詩題盛君明之室也人生乃動物萬事皆動端隂陽造化汝賦汝以五官五官各治職愈治當愈殘非苦動所擾烏知靜為安非惡動所戕未貴靜為完百年夜分半夢想仍妄暪動多靜常少竟為動所干回光一自照萬事無悲歡居士何早達動境能反觀寧為玉在璞不為珠在槃虛室生朝白青璅凝暮寒聊持動時想攝入靜中看寶幹山茶山茶乃凡木寶幹始為竒婉雅瑞荷花扶疏連理枝傾心相爾汝和氣生怡怡清隂亦可愛惡木正離披上姑丈閭丘通牧少卿天下一大器安危繫平傾哲王慎民監措術如和羮辛甘或偏長非可制割烹五味既可口君子嘗曰平方今太平君戒欹如持盈乞言用龜鑑履德均權衡庶民雖蠢愚一或非所營視之如已內塗汚千仞坑是用選賢德告戒敷至誠曰雖一人良萬邦咸以貞尚賴爾庶牧禆朕來聰明分符授虎節專政千里城朱車輪兩轓畫戟門十旌禮文既光華逺煜如杕英良圖沃朕心蠲瘼求民情如意運手足乃與朕力并朕所戒假樂難慎惟守成願昭先人功奠枕臨周京羣方政咸乂惟海隅蒼生魚鹽機巧利涼德多矜爭版圖庶彚徵雉壘侵荒荆矧乘荐飢後魴鱨尾多頳古既無罪嵗此獨何所令明明普天下孰非聖人氓當求善仁政如解中山酲時公罷仙班入覲中天閎帝優老成人錫祉升名卿吏能素嚴翼公望方峥嶸物賴山愈靜川納海益竑齊安漢中治政迹如韶莖剛明濟清淨錦組輝瓊瑩果毅將慎智佩玦鏘璁珩英英衆人師落落天地晶是用簡上心僉議如預盟公辭臣老矣已與世纍輕東吳富山水煙霞氛紫清樂郊適所願逍遙挂塵纓賞延及孫子榮慶并弟兄智恬欲相養為夀期老彭帝云東州民思濟求令名窒如相忘魚煦沫涔轍泓瘁如旱麓木枯稿需春萌朕意慎許可當賴王國禎如翩皆飛鳥遴集惟鷦鵬無辭逆朕意欽哉卿惟行公承帝眷異竭節期有亨郡民幸其來爭以先見榮實篚擕漿壺馬首拜且迎謂言前掾曹執禮無私評逺兹三紀歷位重德愈宏下車始授政季秋末徂正囹圄屢空虛盜止無黥刑康莊夜達旦户敞民不驚柔逺戒慢令荒政先緩征榛楛已濟濟莪蔚將菁菁熙熙春臺樂苾苾太室牲嘗聞至仁化政立可去兵又聞公明心罰罪能驅鯨古云州縣勞此語非凖程韓侯功固髙羞比於絳嬰光初必凶終進鋭多反瞪如徹禮飲酌強酒奠兕觥雖云快壯心泰至多酗醟孰知安行健履坦非掀橫圭璋賤珉玼山川貴剛騂良弓豈茍飾利用關以弸斯為古循吏業廣惟勵精孤生何所罹自幼憂患縈遭家屢不造省始離􅈱喤邇復逺所恃羈迹如漂萍操心但書危固户賴巧甍曲蒙惠私重哀愚斯獨􅑱字撫得不違俾就三龍黌曰余欲玉汝誰何吝金籯愚非茍恩者鋭志思迅鏗為修不敢殆希彼農夫耕勤勤慮寇至豫蓄終嵗盛戰戰與心競中林亦丁丁淵崖視鳥道履氷越深瀛剛克素自許竊亦輕申棖永言念眷勤願以堅白鳴作詩謂云何姑以紀頌聲曉發鄧城和德麟韻遙岑掣殘電炫轉雲篩碎長庚送曉色澒洞初見地飢馬戀櫪鳴呞牛繫林睡橫塘寸魚跳魚跳石雙翠敢嗟衣化塵且喜風泛袂蚤懷功名心經濟豈無意老軀既骯髒柔態漸嫵媚棹舟江南去白酒謀日醉絲蓴芼雪鱸欲飽三尺喙半生客荆州兩渡北津水尚友有若人獲我心所契行李念淹留感此秋蟬嘒掃除向來想漁釣真得計塞翁已無心得失無欣喟鄧城道中懷舊時德麟相拉至江北三縣昔從郡丞遊餘寒春未回玄雲蔽冷日朔風捲黃霾枯榛擁殘雪疏籬橫野梅季夏方溽暑後乘復與偕青秧舞白水赤日飛紅埃牛馬暍俱喘蜩螳嘒相哀值此寒暑變感豫羈旅懷行行江湖去舉棹向天台老婦膾魴鯉丁男滌尊罍霜橙薦紫蟹水藕浮瓊醅念公復行縣秋光當獨來豫時定相望持酒上髙臺石經殿漆書置蘭臺筆削猶敢擅真名鏤遺編定知伯喈篆未校藝閣書成此石經殿天門泉詩俗名救命泉今巳涸昔聞天門泉石竇注澄徹行人口生煙可救萬夫渴為惠胡不竟吾來值源竭捨身崖蛾眉備百姓怨女填六宫捐軀委崖谷隕生因爾容匹婦多白髮婦怨實無終太華太華復何如名山控西極忽從天地分屹立三萬尺天維西北傾扶持藉為壁風雷出毫末日月轉兩腋秦川散餘秀長空借殘碧支離别周甸指掌觀禹績因知方嶽重奚覩介丘憶蒼旻仰猶髙厚載真有力三岡亭在邑西南三十里秦昭王使謁者王稽使魏夜與范雎言先生待我於三岡亭之南是也賤人敢圖柄時哉天步艱相爾簀中意三亭寧靦顔佩印能幾時網成已入關宣言往代汝天道真可還東津夜飲送岑穰彥休赴闕東門何煌煌驪駒絡金羈朱顔照秋鞠炯炯青雲姿往登藝香閣編書給隃麋豫方滯江漢發軔將安之風林舞危葉霜畦殺青蕡車馬如上州朝天逐髙雲行邁豈不勞欲書竹帛勳嵗晏重感慨我獨念離羣曹華國之子贈詩次韻答之平生曹華國志意多感慨塵埃迷俯仰骯髒遊方外余嘗賢若人心以古人待食蘗甘有味舐蜜遇潛蠆賫恨沒九原長屯竟無泰宿草掩一丘長夜遂千載喜君好男兒贈語頗剛快弓裘解傳業門户兹有賴文章第美身長門不須賣來詩有賣長門賦之言邃經堂男子宜讀書讀書須五車紙腐唇自裂豈為刳心魚吾子少年時青雲得意初英華發清端賦筆凌相如自試文石陛佇召承明廬孝隱二十年復與志利疏軒裳不挂眼鐘鼓悅爰居歸來邃經堂志惟與道俱架上數萬卷偃仰時卷舒使彼夙昔人微言幸發攄春洲生蘭苕寒溪脫紅蕖逍遙適所願未可詠歸歟上方宵旰暇夜殿誦子虛伯原曽進東都賦送李德載公輔之宣城王子敏遹之寧陵秦少章之仁和先生位管轄四海在陶鈞顧我門牆士於焉益情親眷言給鼎味旨酒侑芳珍粲粲春服成暮春及佳辰載詠先生道興懷感昔人三子果藝逹從政宜牧民維舟萬里流喜色照通津豸也不速肖農圃老此身同門各鶱翥索居獨離羣諸公廊廟器行當䇿髙勛念此今日歡無忘病且貧結駟儻肯顧促車清潁濵送王仲求飄風非焚輪觸石生孤雲逍遙王真人行行傲世紛齋戒斷葷臭日誦浮屠文敝袍遊江海耻與狐貉羣吐納全真氣鬢髮垂如銀十年臨池學自許登右軍謙謙卑自牧處約人皆欣扁舟忽云徂欲扳心殷殷丈夫重訣别兒女徒云云常聞釋氏説精進在殷勤紅塵易汩沒跋涉憊力筋不如巢華山修煉如老君送秦少章建勳各有志而我齒已疏除書喜之子試吏東海隅滿懷貯忠義陳編陋嚴徐平生困末路龍蠖意不舒定交青雲表凛凛國士徒執顔肯顧我曾未鄙非夫破愁有斯人我鄰知不孤危言解補天決折已非圖成名聊爾爾國器自時須收功從兹始良驥騖修途開樽稍黔突慚愧飯與芻閉户待子歸看我所著書同諸公餞望元因宿谷隱以何當風雨夜復此對床眠為韻分得對此二字雨氣天末來暝色江臯起層林蔽樓觀黯淡水雲裏匹馬何所從翩翩五公子異時天一方相遇忽在此溫言各慰惜道舊半悲喜熠熠螢度幃泫泫礎流泚他鄉念羇旅况復餞行李一笑未易闌相望迹千里秋江冒后土餘潦滿溝澮行人泥沒輈腐黍亂荒薈結客山中遊風雨在顛沛峥嶸栜宇下磊落宜我輩還同竹溪逸笑傲盼庭檜繁隂阻杖屨曀曀幾弦晦誰能決頑雲共此明月對大木山十洲三神山廣厚蟠地軸不知髙幾尋滄溟及其麓遊心如太空視彼何芥粟君家三木山包裹一握足銛鋭曰竒鋒坳巖云峻谷攝心如蚍蜉觀此乃陵陸髙􅋻作九地何啻戰蠻觸老蘇記木山萬里在右蜀立之置庭除屹嶫可映屋小大雖相懸真贋此其族因形生強名等是千嵗木君家襄城野繞郭山抱緑巍然復嶺外自有真六六孟浩然故居旰食羮不糝肺腑窮雕鐫襄陽妙人物我獨憐浩然禁中拜天子布衣可逢年一言類􅔵望明主乃棄捐凄涼鹿門道舊隱空雲煙漢水不世情猶有槎頭鯿上山登山蓋有道迂叟真名論不困在徐行不跌由足穩斯言可銘佩萬事為節撙推之為躬行天下國家本從德鄰至鄧城訪魏道輔故居懷道符孟春屬佳辰駕言從郡丞蓐食戒徒御篝火事徂征方舟絶橫漢適彼樊侯城緬懷昔封君能使晚周興千齡想風概慨嘆岸與陵故城若墟落邑屋袖可憑盤飱倦舉箸幅幅氣拂膺古寺蔽榛甓破舍餘殘僧人言魏徵君於焉常曲肱窶居三十年蔚然以詩鳴人憂不改樂信哉賢者能常聞有四友作堂在郊坰我雖樗櫟材臭味亦其朋會當從飛蓋清夜一來登李良相清德碑良相百藥四世孫也天寶中為尉氏令邑人立此碑旌廉以廉寡樹碑勵貪夫後人慕前躅當令德不孤苐無愧屋漏斯能逺苞苴番禺惟飲水合浦自還珠阮步兵廟在縣東南四十里今墓在焉旁置廟祠之今諸阮之裔甚多而竹林猶存千齡一丘壠誰復記主名苾芬百世祠賢哉阮步兵廟旁故墟里竹林蔽郊坰裔孫仍南北胡能師九原蔡澤廟燕人蔡澤相秦宣言往代范雎者墓在邑旁有廟從橫事捭闔揣摩相抵巇兹為富貴術咄嗟乃自知相形直誤人俾無百年期遂汝齒肥心廟食飽牲犧羊叔子廟緬懷吳晉氏天壤非異宇賢哉羊頭鎮一用惠慈撫髙懷寄山水餘事整軍旅當年峴首歎奄冉隔今古遺民爼豆之廟貌壓江滸誰令望碑人墮淚若兒女杜元凱廟書生昧籌算罕立橫草功征南日耽經帷幄明指蹤胸中有武庫矧與豎儒同賢哉秉節度不制蜀阿童沈碑雖好名要是真英雄寥寥萬山路爽氣搖松風和錢之道仲尼聖之時豈蔽不恭隘知命識大憂嗣世宅已壞不閲父母邦遑及為蒯瞶依仁罕言利執禮不語怪汙墁泥中轍脂舝速遄邁難乎其有恆取善僅餔饋茍非言抑揚大道或幾賣峽有食象蛇常苦螻蟻嘬昭昭神禹功鑿水疏九派刋隨神明疲新水螭蜃快志士每喪元時靡可究屆剃草宿草競春力階除日青青何心願滋茂剃去輒復生一氣養萬類蘭藥盡勾萌何當紉余佩采采擷芳英同仲寶風雨中過德麟留宿以夜未央為韻分得未字并和二公夜央字韻悲風送寒雨遙夜俄總至草木雖戰秋渠能保柔脆杯盤照青燈哦詩久無寐安能決雲開坐見參橫未秋徂風雨多欲作雪霜迓况乃地氣偏寒暑或相借溫涼久未定裘葛易無暇慙愧平原君客至列盞斚日為文字飲短晝繼清夜嗟豫寡世偶癡甚已如霸有田未歸耕無䇿敢求射耽詩近知味疑從果螺化敢友天下士轍環之四方適願得所向偶如鐘應霜交態久未定市道良可傷君看江漢水安流日泱泱張康節家西軒竹張福夷兄弟求詩種花鄙弱植種栁惡連隂主人種竹意闓爽見靈襟猗猗復徑節凛凛况虛心晚嵗示貞操清風應好音扶疏髙軒下衆景為蕭森世襲萬户封奚取千畝林夜坐東郭新雨餘日入涼氣佳長風吹天維坐見參斗斜默默羣動息寒螀先秋譁清談互絶倒豈復憂過差谷隱寺挈巢江湖去端為山水癖朅來谷隱遊契我賞心適寒江渺平楚復嶺轉層壁誰與龍象筵一掃狐兔迹綵雲布樓臺迎日麗金碧堂髙磬聲邃壑逺松響激山光晚相照空翠濃欲滴行當就墟市幽棲買泉石日詠招隱詩時過彌天釋題蔡君謨墨迹後古人托一技身死名不滅賢愚置不論筆畫觀可閲嶧山刻秦銘斯篆屈金鐵雖在衆憎惡恨不頸荐鉞禇令狷且直還笏首叩血魯公秉忠勤白首抗希烈獨有虞永興當年稱四絶賢哉蔡莆陽直氣亘南粵入為楓宸侍遇事挺竒節揮毫霸當年粲然星中月非惟驚代能乃是名世哲嘯臺步兵遊方外棄禮真太簡過差生杯酒况復能白眼蘇門鸞鳯音戲技猶赧赧當知愧孫登不獨嵇中散步兵真曠達與世故浮遊平時哭途窮鬱鬱宇宙幽浩氣獨不掩築臺凌清秋一嘯已望我况乃爾汝儔斯人固遺世世亦不汝收得非青白眼鈞銖牾時流聊為招魂些釋汝故時憂言登阮公臺興來聊獨遊因為爾時嘯景物故清幽奄冉古今意凄瑟天地秋阿戎迷簿領况復五君儔王實為監倉不至北眺度遐想遺音浩難收登臨感陳迹雲散惜風流軔車此裴回何以慰百憂乘流忽遇坎豸以馬病不行觸焉遘兹遊紆餘上雲壘禪房忽通幽水光浮西澤草樹颯已秋豈無竹林友腰印不我儔異時東山約興盡輒復收飛蓋想清夜華月湛西流何當共巾履一笑破羣憂我登步兵臺緬懷昔來遊英聲入萬壑竒氣盤九幽轉盻迹已陳况今仍千秋鸞鳯吟蘇門奚用愧彼儔堪笑劉越石幸勝功遂收登髙君能賦乃是子安流作詩已可人洗我萬古憂七夕某觀晉漢以來七夕詩數百篇皆用俗説某以為牛女之會不然故作此詩七夕知何夕云是牛女期俚俗具瓜華階除兒女嬉繁星爛煌煌流月湛沉輝羣兒望鵲橋橋端七寶帷倣佛想言笑薌澤疑煙霏人間光隂速天上日月遲隔嵗等旦暮會遇未應稀願言停笑歡察我心所祈我欲賜新巧智術妙通微金針度綵縷寶奩卜蛛絲我嗟兒女愚勤勞徒爾為巧拙天所賦乞憐真可嗤故拙不可厭吾寧鈍如椎借云得新巧無乃醇愈漓吾觀天垂象列星有攸司牽牛常服箱織女不下機牽牛教人巧積倉嵗無飢織女教人巧笥篋餘裳衣伊誰詢兒女組繡窮毫釐年年渡河漢秋至次舍移宣淫五雲上此論乃吾欺吾為牛女辨欲判千古疑元祐六年夏自陽翟之睢陽迓翰林蘇公自杞放舟至宋放舟杞國岸汴渠正東注湯湯舟下水適與舟相遇泛泛水上舟與水共東去舟水詎相離曾不遷故處世人迷動靜順流疑若遡不然逐流浪汩沒為所誤吾作放舟詩明此流水住老矣耄何為聊用持世故石棧河在洪閘奔騰龍嶠麓深壑斷如截石棧架寒溪盤陀卧精鐵從衡布方楚片段髮文裂平如中唐甓罅密不容泄南巖盡竒險萬狀森羅列或如巨獸蹲或類巴蛇囓哀泉瀉飛磴流沫常噴雪山骨靜無塵泓澄碧潭徹魚龍不敢宅中有千古月壯哉天地間此險詎勞設乃知山水心自欲為勝絶我陪勝士遊兹名因不滅足亭張康節南亭也臺數尺亭在其上人生天地間海中一浮漚欲求無厭心無乃不勝求知足有真樂不然多悔尤淺儒急名譽夸人矜智謀語默偕蟪蛄生死等蜉蝣不如知足者淡然樂忘憂袖手閲萬變默坐觀九州衆舍吾獨存同波終異流君看至足處無得亦無修萬物固皆備反照靡不周昧者強務外巧偽日嚮偷昔飢止願飽既飽思膳羞昔寒止願溫既溫思狐裘非徒漫自苦動輒成贅疣相圃有足亭可見好善優公孫皆秉哲克念踐先猷欲種豈弟德求異恩澤侯秀嶺聳蒼玦寒溪搖翠鈎雲傳鄧林雨月送滄浪秋曉暝竹煙暗午薰花氣浮涼颸泛南榮返照過東疇所遇皆可樂觴詠友浮丘豈必朝玄圃弭節夕瀛洲永懷樹亭意足焉此優遊鳴琴泉此水自山石中來水石相激於暗竇琮琤有聲如琴故曰鳴琴今為道士深池遂塞其竇水滿則不復鳴矣吁可笑也昔聞流水操想見流水音况復山泉聲聲自如鳴琴可笑山中人強作碧沼深暗流不復鳴遺聲杳莫尋近聞石鐘山蘇辨正古今酈元與李渤地下當噤喑惜乎不聞此使我徒登臨道人笑謂余胡不求琴心何勞絃上聲况此非徽金下第留别舍弟弼繆承名卿後煜煜贊皇裔閔途遘伶俜勉力濟顛墜百年能幾何三十已一世胸中經綸䇿偃蹇未獲試衰殘蚤二毛坎軻窮五技探珠極溟海耻逢驪龍睡辛勤禹門浪千仞復中躓吾道有用舍無乃天所否巖廊與溝壑榮悴同一戲俱非本來物吾無窮途淚季父勉問學弓冶付吾弟營營米鹽慮役役裘葛計雖服貧賤勞無損剛大氣慎乃百勝術早拔萬夫萃老去重别離悲歌感棠棣下第留别陳至明緡釣香餌彼取亦已微金丸往抵黽我用一何卑余生宇宙間動輒多願違天王十二間玉勒黃金鞿奈何驥與騄不使備六蜚鹽車初未脫伯樂苐興悲寧甘生芻餓不為埸藿嘶京都足風埃士氣隨亦淄君於萬夫間獨若三秀芝浩氣久已定得喪亮難移對之忘忿戾淡然移安夷論交有斯人是用久敬之吾生三十年二十九年非末路各相望奮庸會有時貴如未可求守余北山薇嵩陽書院詩束髮從政事佩綬曳長裾守令有民社裂地皆分符問之爾何由必曰因業儒自致或世賞因儒升仕塗一朝希斗祿輒與故步殊佞夫專媚竈要路事馳驅俗夫抗塵容勾校迷墨朱自謂尚市道不若效賈區何必念故業易地有蘧廬嵩陽敞儒宫逺自唐之盧章聖旌隱君此地搆宏居崇堂講遺文寶樓藏賜書賞田逾千畝負笈昔雲趨勸農桑使者利心巧阿諛飛書檄大農鬻此奉時須垣牆聚蓬蒿觀殿巢鳶烏二紀無人迹荒榛誰掃除桑羊固可烹縣令亦安乎令主尚仁政美利四海敷仁賢任阿衡天地一朝蘇已責復蠲斂肉骨生膏腴疲民悉按堵此地尚荒蕪淮西髙夫子為政多美譽百里政肅雍民不困追胥憤彼釋老子遺宫遍山隅吾儒一何衰廢迹可嗟吁連箋叩洛尹移文諷使車義有子襟耻功將泮水俱興衰雖在天此意良可書却思鬻此者於儒與何誅又思昔縣令亦昔儒之徒興儒有美意無忘髙大夫史次仲錢子武與余在報恩寺納涼分題各以姓為韻天地怒氣散凱風若顛喜吹彼枳棘墟不入邃屋裏北風何其涼雨雪雱不止卒嵗無衣裘穴處猶凍死六月如蒸炊執扇猶秉燬芃芃黍苖花吹落不結子老農悲不穫飛鳥喜自恣雖難答天恩願天投木李豸寓龍興仁王佛舍德麟公定道輔仲寶擕酒肴納涼聨句十六韻宿雨且初霽微涼吹廣庭嘉賔忽相遇方午夢驚扣扃長松森翠影德修竹參青冥飄雲度空急仲殘日穿林明幽牆隔江浦公逺嶼定風舲城市厭煩暑道山樊念伶俜角巾代公紱方草具踰侯鯖園實摘的皪德厨醖斟晶熒烹鮮縮頸大仲海錯著器腥笑談得真樂公採擷逢幽馨雲隂剝初霽道夕嵐收逺青窗卧憶元亮方詩成懷景升日須河朔飲德當解髙陽酲煩襟頓忘釋仲嘉詠不少停闉闍發嚴鼓公穹碧垂繁星一笑跨鞍去奚論楚人醒道啄木鳥小蟲蠧堅木自意吻頰剛蟠身宅幽竇心期千嵗藏爾非虎而翼何乃巧取將剝啄繞樹腹卷舌利鈎芒一身禍衆命曾未厭飢吭流怨入胡琴美人借餘商鵜鴂相唯和次第歇芬芳吾生獨何事有喙三尺長富嵗常苦飢不能饜糟粳寧飢忍效汝豈復思隨陽已卯春許昌湖上酬王實仲弓作紫荷媚曲塘青秧舞平畦晨光泫晞露衆木含華滋咸驚物外慕歸休及良時封禪碑魏公如管仲封禪止文皇侈心晚猶在厥婦故敢猖誣彼七十君哀哉為民殃文選樓案此詩從宋文鑑補載申轅應楚聘鄒枚適梁苑藩侯喜賔客賢賢易鷹犬黃綺遊漢廷羽翼矰繳逺秦府十八公攀附名益顯昭明衆才子文囿俾搜選髙齋切浮雲雉堞俯晴巘尚應愧河間筆削非大典
