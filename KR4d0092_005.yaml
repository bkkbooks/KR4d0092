body:
  text: 濟南集卷五宋李豸撰賦藉田祈社稷賦王者躬藉千畝治農上春載耒耜之稼器祈社稷於元辰播種始修願備粢盛之實吉蠲昭告䖍恭土穀之神蓋以藉是天田借夫民力躬稼雖勤於率勸隂相乃臻於蕃殖吾欲宜物生之理故控誠於社稷載耕一墢敢違東作之時欲致三登實賴柔祇之德春既應候物將發生農祥正兮隩者析土膏起兮勾者萌田既有籍親當勸耕金根而縹軛絺冕而朱紘三推之儀既服勞於墾闢五祀之本亮來燕於齊明誠欲屢獲於豐年矧敢黷煩於上帝惟爾次祀可祈嗣嵗受霜露風雨也既達氣於天地能聰明正直也宜饗誠於牲幣撫兹御耦意顯示於農先用以太牢敬幽通於血祭於是王后獻種甸師清畿宰夫庀事祠官致祈推精意之匪懈惟明靈之具依今詠載芟兾三時之不害願歌良耜終百禮以無違夫然重彼民天始吾帝藉惟方壇設堳埒之敬則神倉有坻京之積著於月令則邦典無曠非尊地類則嵗功何獲考文景之明詔遵禮攸行思龍棄之有功配祠來格厥後田鈎盾以為弄耕上林而匪恭既緩民事寧修禮容伊常祀之弗舉何靡神而不宗彼周室之中興猶廢大事隋儀之講惟祀先農异哉事雖勞於王躬化遂行於天下咸知貴於官稷矧敢厭於方社然則民和而神降福焉繇祀與農而致也五榖皆熟然後制國用賦年榖皆入而制邦用國欲制用榖宜有年俟農功之皆入乃邦財之敢専嵗杪必登已審有無之數政柄在我允釐多寡之權原夫邦本惟人民天以榖受之田而俾養取以制而無瀆征求有藝既具在於積倉經費是程實有資於稍祿蓋以地利有荒而有治天時或和而或乖故無禾無麥而不一鮮多黍多稌之孔皆視耗與豐惟謹成于嵗事量入為出自允協于民懷若乃時三登而政平食四釜而家給外有大田之稼內有萬箱之入多不為虐雖明上熟之饒度以賦民豈過取盈之急於是賦者斂者裁之制之物乃惟其有矣民寧至于殆而司徒令貢於土均示恭乃職太宰節財於九式亦貴其宜斯乃以民為心隨時立制因成隆殺之節相夫上下之嵗循九一助之法固以適中以三十年之通斯能無弊彼或用侈為政弗仁佐邦利雖利矣而王制已壞國非國也而民心匪降李悝以平糴取名第期昌富楊炎用兩稅變法愈革淳厖异哉冠百辟之攸司輔一人而御統位獨崇於民極職乃均於邦用惟仁人共其心而無忝厥官可臻輿頌金鑾賦并引蘇先生自中書舍人拜翰林學士門人李豸以金鑾賦賀之其詞曰惟金鑾之閟宇兮承明廬天門九重兮直帝居青雲邈為後塵兮紫清絳虛履泰階以布武兮瓊闕玉除侍上帝兮友真宰贊造物兮俯璿樞視下土以為滓濁兮徜徉乎河洛之圖書代上帝以有言兮作典謨曷誰尸之兮疇咨明世之真儒惟令聞升聞于帝兮有臣曰蘇客曰是超然之先生耶惟超然之先生冠百世而稱傑操忠而秉哲執義而全節文章鮮儷于古今德行爭光于日月昔下士之興讒智相遼而欲軋不量厥才徒自黥刖純然粹玉久苦埋涅濯之愈明始鄙羽雪於穆皇王登崇俊良爰自謫逐乃命作牧乃命為郎乃置紫微乃居玉堂佩服粲以有輝輿衛儼以煌煌潤色太平黼黻𤣥黃非先生之有榮實吾道之有光猗歟先生處斯金鑾為龍為光莫匪具觀饋天餉於寶床下晝漏於花磚錫尚衣之宫錦分御座之金蓮縉紳具云內相惟賢嗚呼官隨人以重輕職因時而貴賤爰置翰林近在貞觀伎卜雜進名同實眩吳筠太白久待詔兮競無官封公輔樂天苦俸薄兮求兼府掾惟眷遇之無常故榮滯之相半乃若叔文執義隂狠陽媚濳妖伏禍城狐山鬼二吳爭恩甚於火水恃為巢社公肆姦宄惟兹金鑾兮待太平而後重惟兹金鑾兮待賢者而後貴猗歟先生處斯金鑾方江湖之放逐望魏闕以如天呌九閽兮靡訴濱九死兮永歎惟厄窮而處忌雖忠憤兮奚言今也侍帷幄兮朝夕納誨卻視象魏兮敻以在外况舉天下之重兮自任遘兹辰兮嘉㑹無使目為私人無止習為三昧夙志可宣兮時不易得時不易得兮蒼生跂踵而希澤將錫圭兮賜衮聊假道以兹職金鑾後賦并引元祐元年冬今餘杭龍圖先生初入玉堂豸作金鑾賦四年夏小蘇先生九三丈復自地官二卿入翰林為學士豸故作後賦欲以見儒者之榮兄弟之美而以尚之故曰後賦云其詞曰噫皓穹之祐民兮必降賢俾保釐雖降賢必有神兮詎俾下土而測知惟帝意兮靡忱故或儷兮或奇或千嵗以相望兮或接蹟於一時或千里以相遼兮或同胞而連枝惟忠義以合符雖千一以共規卿雲景星醴泉靈芝晷瑞圖兮偶應矧常數兮可推維伯仲兮俱賢異千祀兮膺期難乎伯仲之俱賢也粵若三叔謗旦有􅋻傲虞禽冇膾肝之盜跖肸有鬻獄之叔魚義琰有義琛之劣世南有世基之諛瓜甘蒂苦源清流汚蠧或毁堅瑕多敗瑜惟物情兮相戾焉人理兮可誣故有髙陽之凱高辛之元並稱才子皆相賓門稷契之功萬世之隆莫之與崇夷齊之節萬世之烈孰並其潔漢酈商寄因緣勳勞楚季心布義俠名豪建慶兮以謹貴賢𢎞兮以讓褒上郡淑吏二馮藹聞吳都風流妙禀機雲民庸兮襲志襲譽戰多兮萬均萬徹彥博大雅兮謀謨真卿杲卿兮義烈或武或文惟德惟哲伯仲俱賢才難道缺冀有於斯千載願閲惟二先生驚代稱傑坤維一方堪輿效祥兩蜀鍾靈二江儲英峨眉薦祉並生世程凛然擢秀蔚在妙齡觀光來賓掞藻王庭三道奉宸忠貫杳冥言揚帝所日月俱鳴騰芳上國馳譽八紘間關仕版顛沛周行忠義為質皎皎相望永矢不渝用行舍藏聖塗並驅方駕抗衡圭璋璜璧韶濩雲莖世知俱賢莫能重輕放逐江海梗轉蓬飄白首兮于行雅意兮在朝嵗不我與偃蹇下僚天定勝人德久自昭松柏兮御寒貫時兮弗雕雨雪兮霰零杲日兮睍消偕來兮寶文回翔兮紫霄凌厲兮列缺閬風兮逍遙柱史兮載筆紫微兮贊書黼黻兮洪業鼓吹兮聖謨婆娑兮淵禁布武兮天衢金鑾兮玉堂絳闕兮清都明光帝居北扉禁廬璇題雕楹青璅金鋪文林兮極寵命世兮真儒故二先生迭處更居昔在有唐危葉亂根懿之禕之容身摛文通𤣥通微言翕訿爭恩雖曰伯仲尸職金鑾朋邪比媚德忝厥官方我二蘇俱賢實難彼二龔二鮑兮惟僚二疏二謝兮惟族勢醜兮位均名齊兮義篤矧我二蘇同氣異息惟學與文並造聖域惟忠與信皆貫金石否泰慘舒皆共消息非聲氣兮偶同適與命符兮心迹名非實違名乃在德周旋嚴近代掌翰職朝廷昌兮屬承平一門慶兮兩名卿王國兮多賢儒冠兮預榮先生兮固有在寵兮弗驚方將比德兮稷契儷德兮元凱並時登庸咸熙天縡羽翼兮王躬塤箎兮帝載鋪張兮所藴康濟兮四海儻末光兮肯分庶餘暉兮永賴武當山賦并序僕聞武當為名山舊矣元符改元之二年屠維單閼自酇之平陵越明年上章執徐正嵗元日自平陵往游世家古鄭故自以為太華逸民而均陽乃南鄉古郡於是設平陵丈人為對問以賦其事云太華逸民適乎南鄉值平陵丈人植杖道周敬修容而問焉曰僕旅荆州歷楚囿按載籍諏耆舊遊遨鳯闕嘯傲峴首睨碑征南之坂捫鹿習池之岫策箠梅埡之巘飲馬雙池之瀏雖清潤之可喜實奇雄之未覯比泝滄浪至于鄖郊卧岡走阜復㳫平坳布若聚米沸若翻濤藏溪隱木險于幽都夾漢為塹隘比成臯邑或巖於鄭制獸或彊於齊獳雖弗逮乎鴈門已可方於虎牢第陵陸之可踐恨形勢之非豪何一山之巨麗俯列岫以彌喬卓犖倔起造天其髙如鳯于翼如麟于毛如人之傑如士之髦居衆莫掩拔于其曺吾弗知其何山也耶丈人曰此吾邦之武當也惟兹奧區叟之所詳天樞隨旋四七相望夀星步之角亢曰夀星乾緯是綱天根昭回抵于龍亢氐為天根蒼龍左角距夫明堂房心為明堂下臨豫野故韓之邦自河及荆綿亘沮漳方城為郭漢水為隍楚以之為北鄙晉以之為南鄉河汾沃翼叔虞之唐逮重耳之主盟此周索之所疆篳路啓林芊熊允荒洎變夷而為夏輒由子而自王東姬不競霸府代强載書㰱血胥會衣裳乃封郵之徼境惟奔命之靡遑干戈間興以爭尋常介二邦之兩間兹屢為乎戰場秦噬六國拊背扼吭席卷方輿括于一囊韓社既墟徙治南鄉卯金典午下暨齊梁僑立始平名誣實違鬱悒百代今遘盛時以聖繼聖七葉重熙西越流沙東漸嵎夷北撫幽都南控雕題際天所燾率郡縣之惟南鄉之故民其苗裔之所遺陶冶道化舊俗丕移昔尚豪夸侈靡以嬉今服禮訓惟儉惟儀昔喜任俠使氣敢為今鄉義方謹畏自持知射利之去本咸盡力于耘菑悟漁獵之暴殄悉弦誦于書詩此並山之民其風聲性習之梗槩也兹山曰參設險自古或曰天中氣之所祖或曰仙室以真靈之攸處繄漢皇之訪仙遂名之以為武自我朝之御極常默輔於民主嘻為祥風噓為時雨薰為豐年兼此荆豫上原下隰墳壚壤土千流秩秩膏我黍稌漆千章其幽幽枲萬圃其膴膴水浮艅艎雲積廪庾良功纎纊無苦絺紵貢篚灌輸充牣王府農服先疇市藏大賈擾畜皆蕃於五牸素封或比於萬户惟靜重而安宅故無私而利溥此並山之地其土宜物性之饒美也子嘗窮山之所以為山乎肇自混茫初有太極腪胚結融元化埏埴清濁剖判坤闔乾闢大塊載持以土與石磅礴兩儀天地之骨無山其間何恃為力彼佛藏之文暨道家之書辨須彌與鐵圍矜蓬萊與方壺或以為西天之所治或以為列仙之所居既莫究其信誕又安議其有無盍考乎職方所紀輿地之圖天孫惟東旁帶醫閭龜䝉云亭鄒碭之罘祝融司南九疑蒼梧五嶺延袤百粵三吳金天太白股引天都終南褒斜連亘坤隅冀方常山上黨飛狐天下之脊燕冀之郛太室軒轅四顧諸夏太行伊闕襟帶洛社各據方而稱嶽以形勢之可詫觀此山之形勢敢論嶽以諭借勿論岱宗能小天下擬秀厚於恆嵩埒清雄於衡華可顔行而差肩或並驅而方駕彼設位之既尊此宜處乎流亞昔吾子之所觀徒闒茸於千里蔽翳者岵童顛者屺蜀者特寡而惸惸嶧者屬連而靡靡襲至于三者惟名之以陟成止于一者惟名之以伾密則其奧也如堂之可處盛則其袤也如防之禦水曰章者下欹而上正曰隆者宛中而四起雖大而卑也以坡陀而為扈雖衆而小也以瑣細而為巋厥類參差而不一是皆界邱而邐迤大頂居中衆山來宗屹如長人撫摩諸峯獲附麗而邇者遂夤緣而亦崇卻顧醜夷莫之與隆傍立而九若分職佐理者曰卿寺之列前嚮而三若視品同秩者曰槐府之公侍側若承顔而溫敬者則以為世子居內若儷體而順附者則以為後宫曰主簿者曲拳有文墨小有司之意曰將軍者岝㠋有介胄不可犯之容堆曰萬斛若倉箱之積崖曰竈門若膳羞之饔鋭前端方若柱史則惟筆鋒擁後合沓若車騎則惟五龍曰朝趨者或右或左或南或東若子男若附庸若臣若屬若賓若從若冕辨劍履之序立若旗斿和鸞之會同此三十六峯之形嶪嶪乎與五嶽之同倫也泛觀兹山韻粹氣整巑岏奇峯嶻嶪峻嶺植若宿邸之主隱若塞門之屏騰凌閬風滅沒倒影斗柄垂焉而可挹日御過焉而莫騁俯其陘則截然而斷下欲臨乎無地仰其椒則聳然而上升恐摩乎有頂參斗龍湫宅於絶境類括蒼之鑑湖同太華之玉井雲移一勺可雨萬頃浸脈千仞下為天池天池洑流瀵乎巖陲懸若匹練散為明璣飛流濺沫走派成溪黑谷冥冥翠壁巉巉笮棧履空繚通下巖徑若窮而復永石欲墮而相銜樅檜栝柏豫章楩楠萬牛莫曵匠石所瞻蔦蘿轇轕篠簜紏攙細大蓊鬱紫翠相參蔽虧掩苒曛晝凝嵐林集孔翠穴産鸞鷟鴥晨風擊鷙鶚菊花黃鵠輪目異鵲息運海之鵬巢唳天之鶴蔚然蓬蒿棼然叢薄亦有乎搶榆之鳩啄場之雀鶖鶬徘徊烏鳶栖託也赤草楂枿醜石磽確𤣥熊嘷蒼兕攫虎吟風而振迅豹隱霧而溟漠囓鐵芒毛之貊噉獸鋸牙之駮介然之蹊坦然之壑亦聚沐猴亦隱狐貉鼪飛而鼯啼鹿奔而兔躍也天地寶藏振古逮今璞韞萬鎰之玉礦化三品之金璀璨琅玕陸離璆琳丹砂納錫文犀為琛蘭芬薌而盈畹芝赩翕以成林紫蔓玉膏則有仙花之薯縹莖雪指則有肖人之參檿桑簵楛可以足武庫之弧矢梧桐杞梓可以中清廟之瑟琴若乃據洞谷之勝玩林泉之幽暑袗芰製寒擁羊裘飯糗以為食捽茹以為羞欲礪齒則潄石欲滌耳則枕流著書自怡遁世無求此癯儒肄業而巖以孔子為名者也悲朝菌之晦朔慕靈椿之春秋媾龍虎於丹鼎餌日月於玉樓友廣成揖浮丘蛻迹林壑于焉淹留此戴生不返能繼徐福之迹關令求道終從藏史之遊而幼安希夷之徒各以其居而名其巖也面壁作觀問法立雪觀墮空之落蕊悟澄潭之印月境靜心虛身間相絶不染色空究竟生滅此忠公安禪定之心𤣥奘注釋經之說而七師佛子之徒各以其居而名其巖也飛錫御風隨錫而東越䓗嶺踰崆峒來駐于兹若將從容神祈徙處回鴈南峰錫摧狼嶠故巖遂空此思大之禪庵也苾芻誦經有叟日聽曰吾非人實處東溟敢獻宅室為師户庭潭空巖出上下杳𡨕此俞公之龍室也凡兹諸巖或完或隳悵昔人之安在棄舊隱以如歸或蒼苔之封户或垂蔓以穿扉匪直時遷而事異抑亦物異而人非但餘梵宫炫煥翠微碧瓦鱗布朱欄翬飛蓋故唐太一延昌之舊剎蕭代二帝用以奉國師之隆儀我宋太宗益宏故規錫以宸翰耀於璇題定陵昭陵復寵賁之頒天章日星之集拓寶文龍鸞之碑湛恩波于河漢燦光華於斗奎草木欣榮天龍護持裕陵妙天人之學聽臣民之祈詔其道場俾奉禪耆多方開士海會雲棲四后之德民曰惟宜與山俱傳與天斯齊此皆山中之故事圖經之所紀吾子可閲而知者也雖然書生執迂方冊是取烏知簡編筆削罔據惟咨故老折證古語圖經可恨弗載真武雖祀烈威名字弗著子其志之傳信自汝惟昔神君隱耀屏處實錬陰陽游息洞府惟勇義而果德誓馘毒而禦侮功聞𤣥天白日仙去上帝將之升列四輔統虛危而肅殺直元枵之凝沍躡靈蔡以靜鎮馳率然而猋怒寶旌六纛天騶萬旅𤣥冥奉輿豐隆先路巨靈右戎夸父為御伐鼓崑崙弭節𤣥圃敷福施刑調節寒暑遊徼下方歸侍帝所時顧舊山千載旦暮當考玉文祠以琳宇無文咸秩矧此宜舉祀典報功匪私其人扞烖禦患興雨致雲或功垂於後世或德感於蒸民事雖既往其迹已陳利及方來其澤日新民俎豆之其情則親抑有太山之麓大川之濱國為祗而載祀實異時之名臣主錢塘之潮汐乃胥門之伍員掌洞庭之重湖惟伏波與靈均夀亭享於玉泉西鄉祠於郢津制一江於灌塴祭氷子而自秦伊南州之孔明乃威力之兹神偉歟是公惟人之龍夭矯玩世卧於西隆游心羲皇之域味道周孔之宫鄙千駟輕萬鍾憤阿瞞之大猾藐景升之狂童繫用舍於彼天閟經綸而弗庸何𤣥德之合契因徐子以為容卻雖再而猶顧我幡然而肯從曾不陋乎庸蜀欲儷迹於漢中礪一州而抗八卒鼎峙以爭雄觀夫戴后牧民撫軍董國以義行仁以刑輔德喜焉以禮樂為具怒焉以干戈為飾託孤不欺無愧於曲阜行罰無怨愈賢於駢邑馭英雄則關張奮其武登雋良則龎蔣善其職兵銜恩而效戰木運糧而足食決籌算於帷幄付笑談於巾幗彌年耕渭而卒走仲達五月度瀘而屢禽孟獲功髙任重心勞身瘠委塵編之國誡遺濤江之陳蹟公歸九原德名彌白豫觀此山去天咫尺名曰太嶽必以峻極儲英育秀宜産賢特豈是公之生也於焉而降神及厭世而歸也於焉而廟食同符甫申可貫今昔與荆蜀之共祀非宇宙之異域故威烈之殊號乃武靈之同蹟愧文獻之莫徵矧人神之敢惑今天子治鑒太清道法自然合明於日月體德於坤乾文德充四表武節暢八埏仁動植昭天淵豐登屬續珍符羅駢神璽出地榮光燭天山中之民或以謂瞻象瑜之烜耀與卿雲之眇綿巖出器車澗流醴泉蓋以當五百嵗之運邁七十二君之前藪有四靈之畜貢有三脊之菅是宜舉巡狩之典稽封禪之篇嘉告丕績升中名山輯圭瑞奉牲牷泥金檢玉燎槱升烟市納賈邦興賢考律厯禮髙年雖駐蹕於方嶽亦望秩於山川惟吾民之望幸豈此山之無傳惟吾子其賦之以俟夫采詩之官太華逸民曰諾僕將言於是結衽蠟敝屣披荆榛褰裳泉石緣雲而升弗遑食息趼足龜手悸心殫力遍詣其處浹日乃悉歸謂丈人叟語可績告成紀功詞臣有職草野賤儒所不敢識松菊堂賦賦曰冉冉兮運征物隨化兮俱逝雖品類兮萬殊率變遷兮一氣矧草木兮代謝制隂陽兮榮瘁惟凡木之柔兮松則有心惟衆草之弱兮菊則有芳鍾靈氣兮異禀挺正操兮能剛若乃金行正秋玉律司商清風戒寒殺氣霣霜菅茅蕭艾委靡𤣥黃蒹葭蒲荇慘黯蒼蒼菊於斯時敷華芬薌呈孤芳於樊圃明麗彩於秋陽葩花葳蕤附屬苞蕚寧共槁以摧仆詎紛披兮搖落如幽人之素履傃所遇而無怍保永正以終始善長處乎約樂若乃氷堅風壯日道北陸雪霜總至水泉下縮椅桐杞柳柔脆先衰枳棘栲杻堅緻何支松于斯時充茂蕃滋衆奄奄兮早雕獨青青兮自持柯葉締固貫時無易自咫尺兮彊立干雲霄兮蔽日如至人之游世罔拘纍乎信詘既才全兮德盛閲萬變兮如一粵有達士秉德安育訓義方於庭壼振惠慈於邦族行素封之萬户間蛾眉於列屋敞樂囿以娛賓峙宏堂而游目飾榮觀於臺沼萃衆芳之草木函枝莖於汴雒遷根荄於吳蜀森喬林兮紫翠眩珍叢兮紅緑憎性遷而質變獨知心兮松菊春向闌兮芳歇火已流兮暑徂觀百卉兮左右閔將槁兮株枯俯連錢兮黃金仰修蓋兮紺羽擷露英兮泛醴折雲梢兮代塵想魯詩于徂徠睎夀侯于南陽湔秦封之濫爵徵于夢之佳祥追元亮之風誦天隨之章聊日涉兮觴詠樂成趣兮未央方善頌兮善禱豈三徑之就荒也邪龍魔賦陟神嵩之岝㠋兮背東址之陂陀躡緣雲之磴以左旋兮上有絶壁之嵯峨畜雲雨之液以瀦聚兮不為斯干鍾煙嵐之秀以藴結兮菀為卷阿幽然九潭黯然澄波爰有九龍各居其淵龍姥字之故馴以訛維龍之姥神變實多或為封豕或為長蛇或為大厲或為姣娥匪噬匪毒喜為戲魔潭濱之民習於見聞匪苟為魔必魔令人比有大士習於桑門精進甚勇嵗月已勤誅茅為廬介於潭濱龍忌且媢義弗肯賓肆其憤心噴為怒雷雷電馳騁風霧糾紛日月藏輝宇宙為昏俄為巴蛇千尋雪鱗搖毒怒視煙飛火燃鋸牙舟腹巨象可吞欲魔若人望户以奔首大於户進不可前舌如虹霓其利如鋋忽搖搖而入户兮噬頂領而垂涎彼方屏氣聽息宴坐安禪游心於無我寄我於自然天地皆定萬物不遷何生何死何喪何全觀者為栗定觀自安龍悟其妄輒悔而悛恍兮忽失蓋慚以旋嗟夫天用莫如龍兮介蟲之君動與天通兮致雨而興雲以變以化兮乃為魔而甚勤妄喜妄怒兮何自悔其能神恃不可以制畜故恣戾而匪循烏在其能濳能躍能飛能伏而比德于聖人潭濱之民曰凡魔之族詎止龍哉紛紛斯世多惡端正令能相競名能相勝勢相盛功相病其魔有甚於龍姥厥口善汙於賢聖或忌人德或惡人修翕訿張侜覆用為仇四國流言於姬旦宋桓施厄於尼丘市人毁參而疑曾毌臧倉沮孟而止魯侯樂侯喪成功於即墨武安賜槃劍於杜郵乃及絳侯安漢疑行縣而為亂條侯襄難謂地下之必叛董相禍興於步舒賈傅被抑於絳灌陳甘沮功於稚圭蕭劉邅讒於恭顯燕蓋毁霍薏苡誣援在唐名臣亦多間隙無忌元舅敬宗罔以大逆鄭公忠良彥博凂以形迹德宗猜忌武曌羅織盧杞薦賢髙閹譖白李西平之勇智延賞敗其謀贊皇公之剛明僧孺毁其績故小人之為魔惟必纍於正直魔正直之一二勝庸凡之纍百其心曰魔於庸常我魔匪彊惟魔正直可使彼傷彼方砥礪日務自異魔之何如恐異於已魔之遂屈乃協厥意魔之益勵終異厥類吾聞是言有感余志以魔為師維魔之畏俯仰天地奚怍奚愧仕而優則學賦君子之仕優則為學仕欲行道功期致君既政優而能裕當學殖以惟勤初委質以在公有兹餘力宜潛心而師古益務多聞且夫志於聖人不苟之君子謂昔以學優也故得從政今以仕優也復將窮理雖匪懈於夙夜貴念典於終始臣工無曠巳就列而效能天爵弗忘庶存誠而為巳位既不忝政宜克施智明效速兮才有游刃心清事省兮日寧廢時幸燕安而暇豫忍偃仰以棲遲業欲廣也學宜聚之敏則有功已臨民而易簡達不離道矧役志於嬉隳然則砥行以立名非苟容而從仕求益則不如學也持祿則徒勞人爾朝雖聽政兮晝則訪道而不厭夜則安身兮夕猶修令而未巳居之綽綽固無從事之獨賢進以乾乾豈俾古人之専美豈不以仕惡妄進學當敏修彼外物也或不可必此放心也獨不知求况已置周行之貴又期聞大道之優經籍益耽美成功之杜預弦歌不輟歎治邑之言遊以故雖吏事之猥并用儒術以緣飾經義可决於訟獄官府奉行以法則馬融絳帳傳授詎廢於牧民董氏書帷講誦奚聞於弛職若乃大官大邑也身何以庇有社有民也學何必為被其服而德不稱尸厥位而事罔知鄙無逺謀動有面墻之誚暗于成事夫何製錦之宜於戲君總萬幾道期先覺猶遜志以愛日尚儲精而務學矧臣工仕優而無所用心可不思於約卓擬試車服以庸賦臣有功者錫之車服君不僭賞臣惟有功錫車服之邦禮飾威儀於爾躬軒冕有輝允示龍光之著事言可績用昭閥閲之隆臣有膏澤加於生民勳勞被於天下賜以弓矢鈇鉞未足旌其能矣紀於旗常彛鼎未足稱其美者惟命車命服分寵賚於本朝可賞善賞功俾榮懷於諸夏夫以巾車陳六等之制司服辨九章之儀樊纓采就之蕃飾絺繡藻繪之彰施金輅象輅兮功異小大衮冕毳冕兮義存等差凡所别者將因表之不可假人固慎持於名器用以蕆禮實顯答於猷為以爾為民軌儀是用錫之車以爾積民粟帛是用錫之服安其體以佚豫章其身而吉燠駕彼元牡則儀衛威重副以赤舄則禮容敬肅得輿為美方將世選爾勞在笥無譏時乃自求多福四嶽羣后九官庶臣言敷納而咸在效明試而具陳膺此異數示於衆人錫命文侯爰示東周之烈褒賞申伯非惟元舅之親彼蓋求於侯也貢之則非索於市也粥之何有吾既重於施報汝毋輕於授受輜乘寵桓榮於少傅師道攸尊黻冕拜士會於中軍君恩益厚若乃以訟而受服䑛痔而得車負乘致寇者在是不衷災身者有諸鶴乘軒而厚祿鵜在梁而晏居載驅無禮義之心以盛為辱采菽刺侮慢之意雖豫猶虛异哉聽彼和鸞觀夫襲裼慕崇賢之令典勉勤王之嘉績致爵位而安富尊榮行見尚方之申錫湯刑勸善賦湯之用刑亦能勸善古有哲后時稱聖湯能用刑而俾義致勸善而知方法欲禁非惟馭威而審克民皆厲節遂化性於循良原夫民初秉彝心知好善勸必加賞也賞或不給勸必見利也利之或鮮况乃肇修人紀始建刑典惟明德而慎罰不爽厥麗故砥行以立名咸知自勉彼以法主忠厚意存哀矜重有致於無赦薄或示以小懲改過則畏而弗敢遷善則恥夫不能釋彼無辜自俾非心之格殖夫有禮咸期美行之興實由禁令有倫奇邪勿縱以聖敬之明也斯固不濫雖孥戮之誓也夫豈輕用善亦期於無刑必也使之無訟警于有位訓䝉士以恭行在豫一人率多方而康共然則刑所去者示之使避善之取者道之使思知其畏而戒懼也因其警而誘掖之義征葛而用甲兵攸徂相慶仁祝網而及禽獸罔或遐遺夫惟彰信以無私胥然而咸勸迄遍為於爾德在簡孚於常憲克用三宅庶不犯于有司無陷十愆宜敬修其可願若乃制短長之命妄輕重之刑非惟中而克允第淪胥而不庭彼且咨怨尚何輯寧異時革夏之寬剛柔匪濟後世從商之論名實匪輕异哉稽古之君御邦立辟慎所施而必中俾允懷原闕銘匏壺銘匪金匪玉匪繪匪飾用因汝器器本汝質汝質惟虛天畀汝德毋因所受妄矜為實實勿勝虛實勝當溢盈虛無常人自損益毌敗虛德是惟汝則燕勺銘獨核木燕中物也北海之濵不周岧嶤不周何有厥木惟喬製為長勺匪飾匪雕堅理錯節紫質纎杓單于修貢以奉王朝公劉草創酌之用匏顏氏屢空飲之用瓢逸民困窮用汝匪驕相我獻酬以勞漁樵貞明古劍銘并序李道士有朱梁貞明中古劍一口貞明乃友貞之年號余以此劍雖奇不足貴作此銘以誨之孰曰神物神不可屈匪人而用匪時而出義不苟全寧缺寧折汙亂而全為妖為孽鏌鎁悲鳴怨處豐城既離古獄遂躍延平赤帝之精久憎晉㝢武庫焚如穿屋飛去貞明之梁實惟寇攘父子兄弟推刃相傷汝當斯時不躍不飛弗屠全忠弗割友圭文章燦然雖寶奚為後當慎旃過為汝掩屬兹平代兵氣消斂槃水奉汝可警羣諂全汝靈氣閟汝芒焰肅保天威永拒姦僭小用不祥為天下劍芝杯銘病木之節拳贅弗枝盤英結液磊砢離奇剖斫擎承宛若靈芝制為野杯逸民是宜右嵩左隗箕隂潁湄德秀吾廬巢許是期惟巢與許挹兹酌兹三秀之德汝當象斯毌若兕觥毌若漏巵貴之比玉敬飲弗揮蟠尊銘惟汝輪囷匠石舍旃不材為幸宜永厥年孰來相之以汝為尊刳心就刑遂戕汝天輪囷為纍視醜為妍來自百粵登我素筵毌慕犧象青黃絢鮮郊廟之用溝中之捐暨汝在兹悉非故然南有澗濱未知孰賢
